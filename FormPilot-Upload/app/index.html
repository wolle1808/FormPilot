<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="referrer" content="no-referrer">
<!-- Content Security Policy: bewusst restriktiv. default-src 'none' blockt alles Nicht-Aufgeführte.
     'unsafe-inline' ist nötig, weil die Beta eine einzelne Datei mit Inline-Skript/-Styles ist
     (keine Inline-Event-Handler, reine Event-Delegation). Die Server-Version (webapp/) nutzt Nonces
     ohne 'unsafe-inline'. frame-ancestors/Permissions-Policy/HSTS werden per HTTP-Header gesetzt
     (netlify.toml), da sie in <meta> unwirksam sind. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; base-uri 'none'; form-action 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; object-src 'self' blob:; frame-src 'self' blob:; manifest-src 'self'">
<title>FormPilot — Dokumente. Daten. Freigaben.</title>
<meta name="description" content="FormPilot ist der persönliche Assistent für Daten, Dokumente und Anforderungen. Testversion — Feedback willkommen.">
<meta property="og:title" content="FormPilot — Dokumente. Daten. Freigaben.">
<meta property="og:description" content="Daten einmal hinterlegen, Anforderungen schneller erledigen, Freigaben behalten die Kontrolle. Beta-Test.">
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill="%2312324A" d="M12 1 3 4v7c0 6 4.5 10 9 12 4.5-2 9-6 9-12V4Z"/><path fill="none" stroke="%231FA38F" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" d="m8 12 3 3 5-6"/></svg>'>
<!-- Kein externer Font: vermeidet Drittanbieter-Request (Google Fonts) und hält die CSP strikt.
     Systemschrift-Stack statt Inter — datenschutzfreundlich, kein Referrer-Leak. -->
<style>
:root{
  --ink:#0B1F30; --marine:#12324A; --night:#071927;
  --teal:#1FA38F; --teal-light:#58C7B4; --teal-surface:#E4F4F0;
  --bg:#F7FAFC; --line:#DCE7EF; --grayblue:#9AAFC0; --slate:#5F7485; --body:#33475B;
  --ok:#1E7D4F; --ok-bg:#E9F5EE; --warn:#9A6200; --warn-bg:#FBF3E3;
  --err:#B42318; --err-bg:#FBEDEB; --info:#22608C; --info-bg:#EAF2F8;
  --nav-active:#EAF1F6;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--body);font-size:15px;line-height:1.6}
h1{font-size:28px;font-weight:700;letter-spacing:-0.5px;color:var(--ink);line-height:1.3}
h2{font-size:22px;font-weight:700;letter-spacing:-0.3px;color:var(--ink);line-height:1.3}
h3{font-size:17px;font-weight:600;color:var(--ink);line-height:1.4}
h4{font-size:14.5px;font-weight:600;color:var(--ink)}
a{color:var(--teal);text-decoration:none;cursor:pointer}
a:hover{text-decoration:underline}
svg{flex-shrink:0}
.page-head{margin-bottom:28px}
.page-sub{color:var(--slate);margin-top:4px}
.section{margin-top:36px}
.section-title{margin-bottom:14px}
#skip-link{position:absolute;left:-9999px;top:8px;background:var(--marine);color:#fff;padding:10px 16px;border-radius:8px;z-index:100;font-weight:600}
#skip-link:focus{left:8px}

/* Layout */
#sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:#fff;border-right:1px solid var(--line);padding:22px 12px 16px;display:flex;flex-direction:column;z-index:30;overflow-y:auto}
.side-logo{padding:0 10px 18px;border-bottom:1px solid var(--line);margin-bottom:12px}
.side-logo img{width:172px;display:block}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:8px;color:var(--slate);font-size:14.5px;font-weight:500;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;border-left:3px solid transparent;margin-bottom:1px}
.nav-item svg{width:20px;height:20px}
.nav-item:hover{background:var(--bg)}
.nav-item.active{background:var(--nav-active);color:var(--marine);font-weight:600;border-left-color:var(--marine)}
.nav-count{margin-left:auto;background:var(--err);color:#fff;border-radius:999px;font-size:11px;font-weight:700;min-width:19px;height:19px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px}
.nav-sep{border-top:1px solid var(--line);margin:8px 2px}
.side-foot{margin-top:auto;padding:14px 12px 0;border-top:1px solid var(--line);font-size:12.5px;color:var(--grayblue)}
.side-foot a{color:var(--slate);font-size:12.5px;display:inline-block;margin-top:4px}
main{margin-left:240px;padding:36px 28px 110px}
.content{max-width:960px;margin:0 auto}
.narrow{max-width:640px}

/* Cards */
.card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:22px 24px}
.cards{display:grid;gap:16px}
.grid-2{grid-template-columns:1fr 1fr}
.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px}
.card .meta{font-size:13px;color:var(--slate)}
.card-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;flex-wrap:wrap}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:46px;padding:0 20px;border-radius:8px;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;font-size:15px;font-weight:600;cursor:pointer;border:1px solid transparent;white-space:nowrap}
.btn svg{width:18px;height:18px}
.btn-primary{background:var(--marine);color:#fff}
.btn-primary:hover{background:var(--night)}
.btn-primary[disabled]{opacity:.4;cursor:not-allowed}
.btn-primary[disabled]:hover{background:var(--marine)}
.btn-secondary{background:#fff;border-color:var(--line);color:var(--marine)}
.btn-secondary:hover{background:var(--bg)}
.btn-danger{background:#fff;border-color:var(--err);color:var(--err)}
.btn-danger:hover{background:var(--err-bg)}
.btn-danger-solid{background:var(--err);color:#fff}
.btn-danger-solid:hover{background:#9A1C13}
.btn-sm{height:36px;padding:0 14px;font-size:13.5px}
.link-btn{background:none;border:none;color:var(--teal);font:500 13.5px 'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;cursor:pointer;padding:0}
.link-btn:hover{text-decoration:underline}
.link-btn.danger{color:var(--err)}

/* Badges */
.badge{display:inline-flex;align-items:center;border-radius:999px;padding:3px 11px;font-size:12.5px;font-weight:600;white-space:nowrap}
.badge-ok{background:var(--ok-bg);color:var(--ok)}
.badge-warn{background:var(--warn-bg);color:var(--warn)}
.badge-err{background:var(--err-bg);color:var(--err)}
.badge-info{background:var(--info-bg);color:var(--info)}
.badge-neutral{background:var(--nav-active);color:var(--slate)}
.badge-teal{background:var(--teal-surface);color:#0E7A6A}

/* Forms */
.field{margin-bottom:20px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--marine);margin-bottom:6px}
input[type=text],input[type=date],input[type=number],input[type=password],input[type=email],input[type=tel],select,textarea{width:100%;height:46px;border:1px solid var(--line);border-radius:8px;padding:0 12px;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;font-size:15px;color:var(--ink);background:#fff}
textarea{height:auto;padding:12px;line-height:1.55;min-height:150px;resize:vertical}
textarea.small{min-height:90px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--marine);box-shadow:0 0 0 3px rgba(18,50,74,0.12)}
input.invalid,select.invalid{border-color:var(--err)}
.help{font-size:13px;color:var(--slate);margin-top:6px;line-height:1.5}
.error-text{font-size:13px;font-weight:500;color:var(--err);margin-top:6px}
.check-line{display:flex;align-items:flex-start;gap:10px;font-size:14.5px;color:var(--body);cursor:pointer;padding:6px 0}
.check-line input{width:20px;height:20px;accent-color:var(--marine);margin-top:2px;flex-shrink:0}
.radio-line{display:flex;align-items:center;gap:10px;font-size:14.5px;color:var(--body);cursor:pointer;padding:7px 0}
.radio-line input{width:19px;height:19px;accent-color:var(--marine);flex-shrink:0}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
@media(max-width:560px){.form-grid{grid-template-columns:1fr}}

/* Switch */
.switch-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding:14px 0;border-bottom:1px solid var(--line)}
.switch-row:last-child{border-bottom:none}
.switch-row .sw-label{font-weight:600;color:var(--ink);font-size:14.5px}
.switch-row .sw-sub{font-size:13px;color:var(--slate);margin-top:1px}
.switch{position:relative;width:46px;height:26px;flex-shrink:0;margin-top:2px}
.switch input{position:absolute;opacity:0;width:100%;height:100%;cursor:pointer;margin:0;z-index:1}
.switch .track{position:absolute;inset:0;background:var(--grayblue);border-radius:999px;transition:background .15s}
.switch .track::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:999px;transition:left .15s;box-shadow:0 1px 3px rgba(7,25,39,.25)}
.switch input:checked+.track{background:var(--teal)}
.switch input:checked+.track::after{left:23px}
.switch input:focus-visible+.track{outline:2px solid var(--marine);outline-offset:2px}

/* Notes & banners */
.sec-note{display:flex;gap:9px;align-items:flex-start;font-size:13px;color:var(--slate);line-height:1.5;margin-top:16px}
.sec-note svg{width:16px;height:16px;color:var(--teal);margin-top:2px}
.info-banner{display:flex;gap:10px;align-items:flex-start;background:var(--info-bg);color:var(--info);padding:13px 16px;border-radius:10px;font-size:14px;line-height:1.5}
.info-banner svg{width:18px;height:18px;margin-top:2px}
.info-banner b{font-weight:600}
.warn-banner{display:flex;gap:10px;align-items:flex-start;background:var(--warn-bg);color:var(--warn);padding:13px 16px;border-radius:10px;font-size:14px;line-height:1.5}
.warn-banner svg{width:18px;height:18px;margin-top:2px}

/* Progress */
.progress-wrap{margin:18px 0 26px}
.progress-label{display:flex;justify-content:space-between;font-size:13.5px;font-weight:600;color:var(--ink);margin-bottom:8px}
.progress{height:6px;background:var(--line);border-radius:999px;overflow:hidden}
.progress>div{height:6px;background:var(--teal);border-radius:999px;transition:width .3s}
.mini-progress{display:flex;align-items:center;gap:10px}
.mini-progress .progress{flex:1}
.mini-progress .mp-num{font-size:12.5px;font-weight:600;color:var(--slate);white-space:nowrap}

/* Rows / lists */
.row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.row .grow{flex:1;min-width:0}
.row .title{font-weight:600;color:var(--ink);font-size:15px}
.row .sub{font-size:13px;color:var(--slate);margin-top:1px;overflow-wrap:anywhere}
.row.clickable{cursor:pointer}
.row.clickable:hover .title{color:var(--teal)}
.row.unread{background:linear-gradient(to right,var(--teal-surface) 0,transparent 120px);margin:0 -12px;padding-left:12px;padding-right:12px;border-radius:8px}
.doc-icon{width:40px;height:40px;border-radius:8px;background:var(--bg);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--slate);font-size:10.5px;font-weight:700;letter-spacing:.3px;flex-shrink:0}
.mono{font-variant-numeric:tabular-nums}
.unread-dot{width:9px;height:9px;border-radius:999px;background:var(--teal);flex-shrink:0}

/* Key-value (Profil) */
.kv{padding:13px 0;border-bottom:1px solid var(--line)}
.kv:last-child{border-bottom:none}
.kv-top{display:flex;align-items:flex-start;gap:12px}
.kv-label{font-size:13px;color:var(--slate);width:230px;flex-shrink:0;padding-top:2px}
.kv-value{flex:1;font-size:15px;color:var(--ink);font-weight:500;min-width:0;overflow-wrap:anywhere}
.kv-value.empty{color:var(--grayblue);font-weight:400}
.kv-actions{margin-left:auto;display:flex;gap:2px;flex-shrink:0}
.kv-help{font-size:13px;color:var(--slate);margin-top:5px;line-height:1.5}
.kv-meta{font-size:12.5px;color:var(--grayblue);margin-top:3px;line-height:1.5}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--slate);padding:6px;border-radius:6px;display:inline-flex}
.icon-btn:hover{background:var(--bg);color:var(--marine)}
.icon-btn svg{width:17px;height:17px}
.edit-box{margin-top:10px}
.edit-actions{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}

/* Upload */
.upload-zone{border:1.5px dashed var(--grayblue);background:var(--bg);border-radius:10px;padding:34px 20px;text-align:center;cursor:pointer;transition:background .15s,border-color .15s}
.upload-zone:hover{background:#F0F6FA}
.upload-zone.drag{border-color:var(--teal);background:var(--teal-surface)}
.upload-zone .uz-title{font-weight:600;color:var(--ink);font-size:15px}
.upload-zone .uz-sub{font-size:13px;color:var(--slate);margin-top:4px}
.uz-secure{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#0E7A6A;font-weight:500;margin-top:12px}
.uz-secure svg{width:15px;height:15px}
.upload-item{padding:12px 0;border-bottom:1px solid var(--line)}
.upload-item:last-child{border-bottom:none}
.upload-item .ui-top{display:flex;justify-content:space-between;gap:12px;font-size:14px;font-weight:600;color:var(--ink)}
.upload-item .ui-top .st{font-weight:500;color:var(--slate);font-size:13px;white-space:nowrap}
.upload-item .progress{margin-top:8px}

/* Chips */
.chips{display:flex;gap:8px;flex-wrap:wrap;margin:20px 0 8px}
.chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 14px;font-size:13.5px;font-weight:500;color:var(--slate);cursor:pointer;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
.chip.active{background:var(--marine);border-color:var(--marine);color:#fff}

/* Checklist */
.check-item{display:flex;align-items:flex-start;gap:14px;padding:16px 0;border-bottom:1px solid var(--line)}
.check-item:last-child{border-bottom:none}
.ci-status{width:34px;height:34px;border-radius:999px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.ci-status svg{width:17px;height:17px}
.ci-ok{background:var(--ok-bg);color:var(--ok)}
.ci-warn{background:var(--warn-bg);color:var(--warn)}
.ci-err{background:var(--err-bg);color:var(--err)}
.ci-info{background:var(--info-bg);color:var(--info)}
.ci-actions{display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap}

/* Table */
table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
th{background:var(--bg);text-align:left;font-size:13px;font-weight:600;color:var(--slate);padding:10px 14px;border-bottom:1px solid var(--line)}
td{padding:12px 14px;border-bottom:1px solid var(--line);font-size:14px;color:var(--body);vertical-align:top}
tr:last-child td{border-bottom:none}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(7,25,39,0.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px}
.modal{background:#fff;border-radius:10px;max-width:480px;width:100%;padding:26px;box-shadow:0 8px 24px rgba(7,25,39,0.12);max-height:calc(100vh - 32px);max-height:calc(100dvh - 32px);overflow-y:auto}
.modal.modal-lg{max-width:760px}
.modal h3{font-size:18px;margin-bottom:10px}
.modal .modal-body{font-size:14.5px;line-height:1.6;color:var(--body)}
.modal .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:24px;flex-wrap:wrap}
.preview-box{background:var(--bg);border:1px solid var(--line);border-radius:8px;overflow:hidden;text-align:center}
.preview-box img{max-width:100%;max-height:64vh;display:block;margin:0 auto}
.preview-box embed,.preview-box iframe{width:100%;height:64vh;border:none;display:block}

/* Toast */
#toast-root{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:60;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;width:max-content;max-width:calc(100vw - 32px)}
.toast{background:var(--ink);color:#fff;padding:12px 22px;border-radius:8px;font-size:14px;font-weight:500;box-shadow:0 8px 24px rgba(7,25,39,0.22);animation:toastin .25s ease;max-width:100%}
@keyframes toastin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Success */
.success-panel{text-align:center;padding:44px 24px}
.success-icon{width:56px;height:56px;border-radius:999px;background:var(--teal-surface);color:var(--teal);display:inline-flex;align-items:center;justify-content:center;margin-bottom:18px}
.success-icon svg{width:26px;height:26px}

/* Empty state */
.empty-state{text-align:center;padding:40px 20px;color:var(--slate)}
.empty-state .es-icon{width:52px;height:52px;border-radius:999px;background:var(--bg);border:1px solid var(--line);color:var(--grayblue);display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px}
.empty-state .es-icon svg{width:24px;height:24px}
.empty-state .es-title{font-weight:600;color:var(--ink);font-size:15.5px}
.empty-state .es-sub{font-size:13.5px;margin-top:4px;max-width:420px;margin-left:auto;margin-right:auto;line-height:1.55}
.empty-state .btn{margin-top:16px}

/* Summary blocks */
.sum-block{border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:16px}
.sum-head{background:var(--bg);padding:10px 16px;font-size:13px;font-weight:600;color:var(--slate);border-bottom:1px solid var(--line)}
.sum-item{display:flex;justify-content:space-between;gap:14px;padding:11px 16px;border-bottom:1px solid var(--line);font-size:14.5px}
.sum-item:last-child{border-bottom:none}
.sum-item .l{color:var(--slate)}
.sum-item .r{color:var(--ink);font-weight:500;text-align:right;overflow-wrap:anywhere}

/* Timeline (Verlauf) */
.timeline{margin-top:6px}
.tl-item{display:flex;gap:12px;padding:0 0 18px;position:relative}
.tl-item::before{content:'';position:absolute;left:5px;top:16px;bottom:0;width:2px;background:var(--line)}
.tl-item:last-child::before{display:none}
.tl-dot{width:12px;height:12px;border-radius:999px;background:var(--teal-surface);border:3px solid var(--teal);flex-shrink:0;margin-top:4px}
.tl-body{flex:1}
.tl-date{font-size:12.5px;color:var(--grayblue);font-weight:600}
.tl-text{font-size:14px;color:var(--body);margin-top:1px;line-height:1.5}

/* Bottom nav (mobile) */
#bottomnav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);z-index:40;padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10.5px;font-weight:500;color:var(--slate);padding:7px 0 5px;border-radius:8px;cursor:pointer;border:none;background:none;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;position:relative}
.bn-item svg{width:21px;height:21px}
.bn-item.active{color:var(--marine);font-weight:600}
.bn-item .bn-dot{position:absolute;top:5px;right:calc(50% - 16px);width:8px;height:8px;border-radius:999px;background:var(--err)}
#mobilehead{display:none;align-items:center;justify-content:space-between;padding:14px 16px 4px}
#mobilehead img{width:148px}
#mobilehead .mh-actions{display:flex;gap:4px;align-items:center}
.mh-person{font-size:12px;font-weight:600;color:var(--marine);background:var(--nav-active);border:none;border-radius:999px;padding:6px 12px;cursor:pointer;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Gate (Login/Start) */
body.gate #sidebar,body.gate #bottomnav,body.gate #mobilehead{display:none}
body.gate main{margin-left:0}
.login-wrap{max-width:440px;margin:7vh auto 0}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo img{width:190px}

/* Personen */
.person-block{margin:0 2px 12px;padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:var(--bg);cursor:pointer;width:calc(100% - 4px);text-align:left;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
.person-block .pb-label{font-size:11.5px;font-weight:600;color:var(--grayblue);letter-spacing:.2px}
.person-block .pb-name{display:flex;align-items:center;justify-content:space-between;font-size:14px;font-weight:600;color:var(--marine);margin-top:2px;gap:6px}
.person-block .pb-name span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.person-block:hover{background:var(--nav-active)}
.avatar{width:42px;height:42px;border-radius:999px;background:var(--nav-active);color:var(--marine);display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0}
.avatar.big{width:52px;height:52px;font-size:18px}

/* Onboarding / Ziele */
.goal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.goal-grid{grid-template-columns:1fr}}
.goal-card{border:1px solid var(--line);border-radius:10px;background:#fff;padding:16px;cursor:pointer;font-weight:600;font-size:14.5px;color:var(--ink);text-align:left;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
.goal-card:hover{background:var(--bg)}
.goal-card.sel{border-color:var(--marine);background:var(--nav-active)}
.goal-card .sub{display:block;font-weight:400;font-size:12.5px;color:var(--slate);margin-top:3px;line-height:1.45}
.steps{display:flex;align-items:center;gap:6px;margin-bottom:22px;flex-wrap:wrap}
.step-pill{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--grayblue)}
.step-pill .n{width:24px;height:24px;border-radius:999px;background:var(--line);color:var(--slate);display:inline-flex;align-items:center;justify-content:center;font-size:12px}
.step-pill.done .n{background:var(--teal-surface);color:#0E7A6A}
.step-pill.cur{color:var(--marine)}
.step-pill.cur .n{background:var(--marine);color:#fff}
.step-sep{width:18px;height:1px;background:var(--line)}

/* Unternehmensbereich — klar getrennte Shell (marineblauer Akzent) */
body.org #sidebar{background:var(--night)}
body.org .side-logo{border-bottom-color:rgba(255,255,255,.12)}
body.org .org-brand{padding:0 10px 16px;border-bottom:1px solid rgba(255,255,255,.12);margin-bottom:12px}
body.org .org-brand .ob-eyebrow{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--teal-light)}
body.org .org-brand .ob-name{font-size:15px;font-weight:700;color:#fff;margin-top:3px;line-height:1.3}
body.org .nav-item{color:#AEC2D4}
body.org .nav-item:hover{background:rgba(255,255,255,.06)}
body.org .nav-item.active{background:rgba(255,255,255,.10);color:#fff;border-left-color:var(--teal)}
body.org .nav-sep{border-top-color:rgba(255,255,255,.12)}
body.org .side-foot{border-top-color:rgba(255,255,255,.12);color:#7E97AC}
body.org .side-foot a{color:#AEC2D4}
body.org .org-switch{margin:0 2px 12px;width:calc(100% - 4px);text-align:left;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);color:#DCE7EF;border-radius:8px;padding:9px 12px;cursor:pointer;font-family:inherit;font-size:13px;display:flex;align-items:center;gap:8px}
body.org .org-switch:hover{background:rgba(255,255,255,.12)}
body.org .org-switch svg{width:16px;height:16px}
.org-eyebrow{display:inline-flex;align-items:center;gap:7px;background:var(--marine);color:#fff;border-radius:999px;padding:4px 12px;font-size:12px;font-weight:600;margin-bottom:12px}
.org-eyebrow svg{width:14px;height:14px}
.verify-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;border-radius:999px;padding:3px 10px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:760px){.stat-grid{grid-template-columns:1fr 1fr}}
.stat-tile{border:1px solid var(--line);border-radius:10px;background:#fff;padding:16px 18px}
.stat-tile .sn{font-size:28px;font-weight:700;color:var(--ink);line-height:1;font-variant-numeric:tabular-nums}
.stat-tile .sl{font-size:12.5px;color:var(--slate);margin-top:6px;line-height:1.35}

/* Feature chips / tiles */
.fchip{width:40px;height:40px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.fchip svg{width:20px;height:20px}
.fchip-teal{background:var(--teal-surface);color:#0E7A6A}
.fchip-info{background:var(--info-bg);color:var(--info)}
.fchip-ok{background:var(--ok-bg);color:var(--ok)}
.fchip-marine{background:var(--nav-active);color:var(--marine)}
.fchip-solid{background:var(--marine);color:#fff}
.fchip-warn{background:var(--warn-bg);color:var(--warn)}
.fchip-err{background:var(--err-bg);color:var(--err)}
.fn-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:700px){.fn-grid{grid-template-columns:1fr 1fr}}
.fn-tile{border:1px solid var(--line);border-radius:10px;background:#fff;padding:16px;cursor:pointer;display:flex;flex-direction:column;gap:10px;text-align:left;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
.fn-tile:hover{background:var(--bg)}
.fn-tile .t{font-weight:600;font-size:14.5px;color:var(--ink);line-height:1.35}
.fn-tile .s{font-size:12.5px;color:var(--slate);line-height:1.45}
.head-flex{display:flex;gap:14px;align-items:flex-start}
.head-flex .fchip{margin-top:3px}
.beta-tag{display:inline-block;background:var(--info-bg);color:var(--info);border-radius:999px;padding:2px 9px;font-size:11px;font-weight:600;letter-spacing:.3px;margin:0 2px 12px}

/* Suche */
.search-bar{position:relative;margin-bottom:8px}
.search-bar svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:19px;height:19px;color:var(--grayblue);pointer-events:none}
.search-bar input{padding-left:44px;height:50px}
.filter-row{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0 6px}
.filter-row select{width:auto;min-width:150px;height:40px;font-size:13.5px;flex:1;max-width:220px}
.result-group{margin-top:24px}
.result-group h3{margin-bottom:6px}

/* Einstellungen */
.setting-link{display:flex;align-items:center;gap:14px;padding:15px 0;border-bottom:1px solid var(--line);cursor:pointer;width:100%;background:none;border-left:none;border-right:none;border-top:none;text-align:left;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
.setting-link:last-child{border-bottom:none}
.setting-link .grow{flex:1;min-width:0}
.setting-link .title{font-weight:600;color:var(--ink);font-size:15px}
.setting-link .sub{font-size:13px;color:var(--slate);margin-top:1px}
.setting-link:hover .title{color:var(--teal)}
.setting-link>svg{color:var(--grayblue);width:18px;height:18px}

/* Anforderungs-Prüfung */
.pos-excluded{opacity:.55}
.src-text{white-space:pre-wrap;font-size:13.5px;line-height:1.6;color:var(--body);background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:14px 16px;max-height:320px;overflow:auto;overflow-wrap:anywhere}
.unusual-note{display:flex;gap:8px;align-items:flex-start;background:var(--warn-bg);color:var(--warn);border-radius:8px;padding:9px 12px;font-size:13px;line-height:1.5;margin-top:8px}
.unusual-note svg{width:15px;height:15px;margin-top:2px;flex-shrink:0}
.copy-text{width:100%;min-height:220px;font-size:14px;line-height:1.6}

/* Empfängeransicht (öffentlicher Freigabelink) */
.rcpt-wrap{max-width:620px;margin:4vh auto 60px;padding:0 4px}
.rcpt-brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:22px}
.rcpt-brand img{width:160px}
.rcpt-meta{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0 4px}
.rcpt-value{font-size:15px;color:var(--ink);font-weight:500;overflow-wrap:anywhere}
.rcpt-footer{text-align:center;font-size:12.5px;color:var(--grayblue);margin-top:26px;line-height:1.6}

/* A11y & Responsive */
button:focus-visible,a:focus-visible,[role=button]:focus-visible,.chip:focus-visible,input:focus-visible+.track{outline:2px solid var(--marine);outline-offset:2px}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}
}
@media(max-width:900px){
  #sidebar{display:none}
  input[type=text],input[type=date],input[type=number],input[type=password],input[type=email],input[type=tel],select,textarea{font-size:16px}
  main{margin-left:0;padding:20px 16px 110px}
  #bottomnav{display:flex}
  #mobilehead{display:flex}
  .grid-2{grid-template-columns:1fr}
  .kv-top{flex-wrap:wrap}
  .kv-label{width:100%;padding-top:0}
  h1{font-size:24px}
  .btn-sm{height:44px}
  .icon-btn{padding:11px}
  .card{padding:18px 16px}
  table{display:block;overflow-x:auto}
  .filter-row select{max-width:none}
}
</style>
</head>
<body>
<a href="#view" id="skip-link">Zum Inhalt springen</a>
<aside id="sidebar"></aside>
<div id="mobilehead"><img src="formpilot_logo.svg" alt="FormPilot — Dokumente. Daten. Freigaben."><span class="mh-actions" id="mh-actions"></span></div>
<main><div class="content" id="view"></div></main>
<nav id="bottomnav" aria-label="Hauptnavigation"></nav>
<input type="file" id="file-input" style="display:none" multiple accept=".pdf,.jpg,.jpeg,.png,.heic,application/pdf,image/jpeg,image/png,image/heic">
<input type="file" id="cam-input" style="display:none" accept="image/*" capture="environment">
<input type="file" id="version-input" style="display:none" accept=".pdf,.jpg,.jpeg,.png,.heic,application/pdf,image/jpeg,image/png,image/heic">
<input type="file" id="req-pdf-input" style="display:none" accept=".pdf,application/pdf">
<input type="file" id="req-img-input" style="display:none" accept=".jpg,.jpeg,.png,.heic,image/jpeg,image/png,image/heic">
<form name="feedback" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
  <input type="text" name="bot-field"><input type="text" name="verstaendlich"><input type="text" name="vertrauen">
  <input type="text" name="nutzen"><textarea name="unklar"></textarea><textarea name="fehlt"></textarea><textarea name="verbessern"></textarea>
  <input type="text" name="name"><input type="text" name="kontakt"><input type="text" name="testphase">
</form>
<div id="modal-root"></div>
<div id="toast-root" role="status" aria-live="polite"></div>
<script>

function analyzeRequest(text){
  const fields = [], docs = [];
  for (const entry of REQ_CATALOG){
    if (!entry.re.test(text)) continue;
    if (entry.fields) for (const f of entry.fields) if (!fields.includes(f)) fields.push(f);
    if (entry.docs) for (const d of entry.docs) if (!docs.some(x => x.label === d.label)) docs.push({label:d.label, cat:d.cat, docId:''});
  }
  /* Frist erkennen (bis zum TT.MM.JJJJ) */
  let deadline = '';
  const m = /bis(?:\s+(?:zum|spätestens|spaetestens))?\s+(\d{1,2})\.(\d{1,2})\.(\d{4})/i.exec(text);
  if (m) deadline = m[1].padStart(2,'0') + '.' + m[2].padStart(2,'0') + '.' + m[3];
  /* Aktenzeichen erkennen */
  let az = '';
  const a = /aktenzeichen[:\s]+([A-Za-z0-9ÄÖÜäöü\-\/\.]{4,25})/i.exec(text);
  if (a) az = a[1].replace(/[.,]$/,'');
  return { fields, docs, deadline, az };
}

/* ---------- Formale Validierung ---------- */
function vDate(v){
  const m = /^(\d{2})\.(\d{2})\.(\d{4})$/.exec(v.trim());
  if (!m) return 'Bitte als TT.MM.JJJJ eingeben, z. B. 14.03.2000.';
  const d = +m[1], mo = +m[2], y = +m[3];
  const dt = new Date(y, mo-1, d);
  if (y < 1900 || y > 2100 || dt.getMonth() !== mo-1 || dt.getDate() !== d) return 'Dieses Datum gibt es nicht — bitte prüfen.';
  return '';
}
function vEmail(v){
  return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v.trim()) ? '' : 'Das sieht nicht wie eine E-Mail-Adresse aus (Beispiel: name@beispiel.de).';
}
function vPhone(v){
  const digits = (v.match(/\d/g) || []).length;
  if (!/^\+?[0-9 ()\/\-]{6,24}$/.test(v.trim()) || digits < 6) return 'Bitte nur Ziffern, Leerzeichen und + verwenden (mindestens 6 Ziffern).';
  return '';
}
function vPLZ(v){
  return /^\d{5}$/.test(v.trim()) ? '' : 'Eine deutsche Postleitzahl hat genau 5 Ziffern.';
}
function ibanMod97(s){
  let rem = 0;
  for (const ch of s){
    const val = ch >= '0' && ch <= '9' ? ch : String(ch.charCodeAt(0) - 55);
    for (const d of val) rem = (rem * 10 + +d) % 97;
  }
  return rem;
}
function vIBAN(v){
  const s = v.replace(/\s/g,'').toUpperCase();
  if (!/^[A-Z]{2}\d{2}[A-Z0-9]{11,30}$/.test(s)) return 'Eine IBAN beginnt mit 2 Buchstaben und 2 Ziffern (deutsche IBAN: 22 Stellen).';
  if (s.startsWith('DE') && s.length !== 22) return 'Eine deutsche IBAN hat genau 22 Stellen — hier sind es ' + s.length + '.';
  if (ibanMod97(s.slice(4) + s.slice(0,4)) !== 1) return 'Die Prüfziffer stimmt nicht — bitte die IBAN Zeichen für Zeichen vergleichen.';
  return '';
}
function vBIC(v){
  return /^[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}([A-Z0-9]{3})?$/.test(v.replace(/\s/g,'').toUpperCase()) ? '' : 'Ein BIC hat 8 oder 11 Zeichen, z. B. TRISDE55XXX.';
}
function vSteuerID(v){
  const s = v.replace(/[\s\/]/g,'');
  if (!/^\d{11}$/.test(s)) return 'Die Steuer-ID hat genau 11 Ziffern.';
  if (s[0] === '0') return 'Die Steuer-ID beginnt nie mit 0.';
  let product = 10;
  for (let i = 0; i < 10; i++){
    let sum = (+s[i] + product) % 10;
    if (sum === 0) sum = 10;
    product = (sum * 2) % 11;
  }
  let check = 11 - product;
  if (check === 10) check = 0;
  if (check !== +s[10]) return 'Die Prüfziffer stimmt nicht — bitte die Nummer noch einmal vergleichen.';
  return '';
}
function vSVNR(v){
  const s = v.replace(/\s/g,'').toUpperCase();
  const m = /^(\d{2})(\d{6})([A-Z])(\d{2})(\d)$/.exec(s);
  if (!m) return 'Format: 2 Ziffern, Geburtsdatum (TTMMJJ), Anfangsbuchstabe des Geburtsnamens, 3 Ziffern — z. B. 15 070485 J 003.';
  const letterNum = String(m[3].charCodeAt(0) - 64).padStart(2,'0');
  const digits = m[1] + m[2] + letterNum + m[4];
  const weights = [2,1,2,5,7,1,2,1,2,1,2,1];
  let sum = 0;
  for (let i = 0; i < 12; i++){
    let prod = +digits[i] * weights[i];
    sum += prod > 9 ? Math.floor(prod / 10) + prod % 10 : prod;
  }
  if (sum % 10 !== +m[5]) return 'Die Prüfziffer stimmt nicht — bitte die Nummer noch einmal vergleichen.';
  return '';
}
const VALIDATORS = { date:vDate, email:vEmail, phone:vPhone, plz:vPLZ, iban:vIBAN, bic:vBIC, steuerid:vSteuerID, svnr:vSVNR };
/* Prüft einen Wert gegen die Felddefinition. Leere Werte sind hier gültig (Pflicht wird über Vollständigkeit abgebildet). */
function validateValue(def, value){
  const v = (value || '').trim();
  if (!v) return '';
  if (def && def.val && VALIDATORS[def.val]) return VALIDATORS[def.val](v);
  return '';
}
function normalizeValue(def, value){
  let v = (value || '').trim().replace(/\s+/g,' ');
  if (def && def.val === 'iban'){
    const s = v.replace(/\s/g,'').toUpperCase();
    v = s.replace(/(.{4})/g,'$1 ').trim();
  }
  if (def && def.val === 'bic') v = v.replace(/\s/g,'').toUpperCase();
  return v;
}

/* ---------- Datum & Format ---------- */
function fmtDate(d){ return String(d.getDate()).padStart(2,'0') + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + d.getFullYear(); }
function today(){ return fmtDate(new Date()); }
function parseDE(s){ const m = /^(\d{2})\.(\d{2})\.(\d{4})$/.exec(s || ''); return m ? new Date(+m[3], +m[2]-1, +m[1]) : null; }
function addDays(n){ const t = new Date(); t.setDate(t.getDate() + n); return fmtDate(t); }
function daysUntil(s){
  const x = parseDE(s); if (!x) return null;
  const t = new Date(); t.setHours(0,0,0,0); x.setHours(0,0,0,0);
  return Math.round((x - t) / 86400000);
}
function fmtSize(b){
  if (b == null || b === 0) return '';
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(0) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}
let idCounter = Date.now() % 100000;
function uid(prefix){ return prefix + '-' + (++idCounter).toString(36) + Math.random().toString(36).slice(2,6); }

const CONSENT_DEFS = [
  { id:'datenschutz', label:'Datenschutzhinweise', version:'1.0', required:true },
  { id:'nutzung', label:'Nutzungsbedingungen', version:'1.0', required:true },
  { id:'produktinfos', label:'Produkt-Hinweise per E-Mail', version:'1.0', required:false }
];
function consentDef(id){ return CONSENT_DEFS.find(c => c.id === id) || null; }
function consentRecord(id){ return (S.consents || []).find(c => c.id === id) || null; }
/* Zustimmung gültig, wenn erteilt UND für die aktuelle Version. */
function consentGiven(id){
  const def = consentDef(id), rec = consentRecord(id);
  return !!(def && rec && rec.acceptedAt && rec.version === def.version);
}
function requiredConsentsOpen(){ return CONSENT_DEFS.filter(d => d.required && !consentGiven(d.id)); }
function setConsent(id, accepted){
  const def = consentDef(id); if (!def) return;
  let rec = consentRecord(id);
  if (!rec){ rec = { id, label:def.label, version:def.version, acceptedAt:'', required:def.required }; S.consents.push(rec); }
  rec.label = def.label; rec.required = def.required;
  if (accepted){ rec.version = def.version; rec.acceptedAt = today(); }
  else { rec.acceptedAt = ''; }
}

const KEY = 'formpilot-core-v1';
function migrateState(raw){
  if (!raw || typeof raw !== 'object' || raw.v !== 1) return null;
  const base = baseState();
  for (const k of Object.keys(base)){
    const bv = base[k], rv = raw[k];
    if (bv === null){ if (rv === undefined) raw[k] = null; continue; } /* z. B. requestDraft: gespeicherten Entwurf behalten */
    if (rv === undefined || rv === null || Array.isArray(bv) !== Array.isArray(rv) || typeof bv !== typeof rv) raw[k] = bv;
    else if (!Array.isArray(bv) && typeof bv === 'object'){
      for (const k2 of Object.keys(bv)) if (rv[k2] === undefined) rv[k2] = bv[k2];
    }
  }
  if (raw.mode && raw.persons.length && !raw.persons.some(p => p.id === raw.activePerson && !p.archived)){
    const first = raw.persons.find(p => !p.archived) || raw.persons[0];
    raw.activePerson = first ? first.id : '';
  }
  if (Array.isArray(raw.shares)) raw.shares.forEach(normalizeShare);
  raw.ui = {}; /* transiente UI-Zustände nicht wiederherstellen */
  return raw;
}
let S;
try { S = migrateState(JSON.parse(localStorage.getItem(KEY))) || baseState(); } catch(e){ S = baseState(); }
function save(){
  try { localStorage.setItem(KEY, JSON.stringify(S)); }
  catch(e){ toast('Speichern fehlgeschlagen — der lokale Speicher ist voll.'); }
}

/* ---------- IndexedDB (Dateiablage) ---------- */
const idb = {
  _db:null,
  open(){
    return new Promise((res, rej) => {
      if (idb._db) return res(idb._db);
      const r = indexedDB.open('formpilot-files', 1);
      r.onupgradeneeded = () => { r.result.createObjectStore('files'); };
      r.onsuccess = () => { idb._db = r.result; res(idb._db); };
      r.onerror = () => rej(r.error);
    });
  },
  _tx(mode, fn){
    return idb.open().then(db => new Promise((res, rej) => {
      const tx = db.transaction('files', mode);
      const req = fn(tx.objectStore('files'));
      req.onsuccess = () => res(req.result);
      req.onerror = () => rej(req.error);
    }));
  },
  put(key, blob){ return idb._tx('readwrite', st => st.put(blob, key)); },
  get(key){ return idb._tx('readonly', st => st.get(key)); },
  del(key){ return idb._tx('readwrite', st => st.delete(key)); },
  clear(){ return idb._tx('readwrite', st => st.clear()); }
};

function buildDemoPdf(title, lines){
  const ascii = t => t.replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/Ä/g,'Ae').replace(/Ö/g,'Oe').replace(/Ü/g,'Ue').replace(/ß/g,'ss').replace(/[—–]/g,'-').replace(/[„“”]/g,'"').replace(/[^\x20-\x7E]/g,'');
  const pesc = t => ascii(t).replace(/[\\()]/g, c => '\\' + c);
  let stream = 'BT /F1 16 Tf 56 780 Td (' + pesc(title) + ') Tj ET\n';
  let y = 744;
  for (const l of lines){ stream += 'BT /F1 11 Tf 56 ' + y + ' Td (' + pesc(l) + ') Tj ET\n'; y -= 20; }
  const objs = [
    '<< /Type /Catalog /Pages 2 0 R >>',
    '<< /Type /Pages /Kids [3 0 R] /Count 1 >>',
    '<< /Type /Page /Parent 2 0 R /MediaBox [0 0 595 842] /Resources << /Font << /F1 4 0 R >> >> /Contents 5 0 R >>',
    '<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>',
    '<< /Length ' + stream.length + ' >>\nstream\n' + stream + 'endstream'
  ];
  let pdf = '%PDF-1.4\n';
  const offs = [];
  objs.forEach((o, i) => { offs.push(pdf.length); pdf += (i+1) + ' 0 obj\n' + o + '\nendobj\n'; });
  const xref = pdf.length;
  pdf += 'xref\n0 ' + (objs.length + 1) + '\n0000000000 65535 f \n' + offs.map(o => String(o).padStart(10,'0') + ' 00000 n \n').join('');
  pdf += 'trailer\n<< /Size ' + (objs.length + 1) + ' /Root 1 0 R >>\nstartxref\n' + xref + '\n%%EOF';
  return new Blob([pdf], { type:'application/pdf' });
}

/* Vollständigkeit: nur Pflichtfelder der aktiven Bereiche */
function groupCompleteness(p, gid){
  const g = GROUP_BY_ID[gid]; let total = 0, filled = 0;
  if (!g) return { total:0, filled:0 };
  for (const f of g.fields){ if (f.opt) continue; total++; if (val(p, f.id)) filled++; }
  return { total, filled };
}
function profileCompleteness(p){
  let total = 0, filled = 0;
  for (const gid of p.groups){ const c = groupCompleteness(p, gid); total += c.total; filled += c.filled; }
  return { total, filled, pct: total ? Math.round(filled / total * 100) : 0 };
}
function missingFields(p){
  const out = [];
  for (const gid of p.groups){
    const g = GROUP_BY_ID[gid]; if (!g) continue;
    for (const f of g.fields) if (!f.opt && !val(p, f.id)) out.push(f);
  }
  return out;
}
/* Zu prüfen: markiert oder Bestätigung älter als 12 Monate */
function reviewFields(p){
  const out = [];
  for (const gid of p.groups){
    const g = GROUP_BY_ID[gid]; if (!g) continue;
    for (const fd of g.fields){
      const f = fv(p, fd.id);
      if (!f || !f.v) continue;
      if (f.review){ out.push({ def:fd, f, reason:'Zur Prüfung markiert' }); continue; }
      const ref = f.confirmed || f.changed;
      const d = parseDE(ref);
      if (d && (new Date() - d) > 365 * 86400000) out.push({ def:fd, f, reason:'Seit über einem Jahr nicht bestätigt' });
    }
  }
  return out;
}

/* ---------- Vorgänge ---------- */
function caseById(id){ return S.cases.find(c => c.id === id) || null; }
function caseChecklist(c){
  const p = personById(c.personId);
  const items = [];
  const fm = c.fieldMeta || {};
  for (const fid of c.fields){
    const def = FIELD_DEFS[fid] || { id:fid, label:fid };
    const meta = fm[fid] || {};
    const v = p ? val(p, fid) : '';
    const err = v ? validateValue(def, v) : '';
    const filled = !!v && !err;
    items.push({ kind:'field', id:fid, label:def.label, ok:filled || (!!meta.optional && !v), filled, optional:!!meta.optional, unusual:meta.unusual || '', value:v, err, sens:def.sens });
  }
  for (let i = 0; i < c.docs.length; i++){
    const r = c.docs[i];
    const doc = r.docId ? docById(r.docId) : null;
    const gone = r.docId && (!doc || doc.trash);
    const st = doc && !gone ? docStatus(doc) : '';
    const present = !!doc && !gone && st !== 'Abgelaufen';
    items.push({ kind:'doc', idx:i, label:r.label, cat:r.cat, doc:(gone ? null : doc), ok:present || (!!r.optional && !r.docId), present, optional:!!r.optional, unusual:r.unusual || '', st, gone });
  }
  return items;
}
function caseMissingCount(c){ return caseChecklist(c).filter(i => !i.ok).length; }
function caseStatus(c){
  if (c.status && c.status !== 'auto') return c.status;
  if (!c.fields.length && !c.docs.length) return 'Offen';
  return caseMissingCount(c) ? 'Unvollständig' : 'Bereit';
}
const CASE_STATUS_BADGE = { 'Offen':'info', 'Unvollständig':'warn', 'Bereit':'teal', 'Übermittelt':'info', 'Wartet auf Rückmeldung':'warn', 'Erledigt':'ok', 'Abgelehnt':'err', 'Archiviert':'neutral' };
function caseBadge(c){ const st = caseStatus(c); return badge(CASE_STATUS_BADGE[st] || 'neutral', st); }
function activeCases(pid){
  return S.cases.filter(c => c.personId === (pid || S.activePerson) && caseStatus(c) !== 'Archiviert');
}
function caseNextAction(c){
  const st = caseStatus(c);
  if (st === 'Offen') return { text:'Lege fest, welche Angaben und Dokumente gebraucht werden.', act:'', label:'' };
  if (st === 'Unvollständig'){
    const first = caseChecklist(c).find(i => !i.ok);
    if (first && first.kind === 'field') return { text:'Ergänze die fehlende Angabe „' + first.label + '“.', act:'', label:'' };
    if (first) return { text:'Lade das Dokument „' + first.label + '“ hoch oder verknüpfe es aus dem Safe.', act:'', label:'' };
  }
  if (st === 'Bereit') return { text:'Alles vollständig — du kannst die Freigabe jetzt erstellen.', act:'startShare', label:'Freigabe erstellen' };
  if (st === 'Übermittelt') return { text:'Übermittelt am ' + (c.submitted || '—') + '. Warte auf Rückmeldung von ' + c.recipient + '.', act:'', label:'' };
  if (st === 'Wartet auf Rückmeldung') return { text:'Rückmeldung von ' + c.recipient + ' steht aus.', act:'', label:'' };
  return null;
}

/* ---------- Freigaben ---------- */
function shareById(id){ return S.shares.find(s => s.id === id) || null; }
function shareByToken(tok){ return S.shares.find(s => s.token === tok) || null; }
/* Token für den Freigabelink — zufällig, nicht ableitbar, enthält keine personenbezogenen Daten. */
function shareToken(){ let t = ''; for (let i = 0; i < 5; i++) t += (++idCounter).toString(36) + Math.random().toString(36).slice(2, 6); return t.replace(/[^a-z0-9]/g, '').slice(0, 22); }
function mkShareVersion(o){
  return Object.assign({ v:1, created:today(), expires:'', permission:'download', password:'', message:'',
    fields:[], docs:[], reason:'', accepted:false, acceptedAt:'' }, o);
}
function shareCurrentVersion(s){ return s.versions && s.versions.length ? s.versions[s.versions.length - 1] : mkShareVersion({}); }
function shareLog(s, type, text){ s.log = s.log || []; s.log.push({ date:today(), type, text }); }
/* Snapshot: Wert bzw. Dokumentversion zum Freigabezeitpunkt festhalten. */
function snapshotField(p, fid){
  const def = FIELD_DEFS[fid] || { label:fid };
  return { fid, label:def.label, value:val(p, fid), sensitive:!!def.sens };
}
function snapshotDoc(docId, versionId){
  const d = docById(docId); if (!d) return null;
  const ver = (d.versions.find(v => v.id === versionId)) || docCurrentVersion(d);
  const idx = d.versions.indexOf(ver);
  return { docId:d.id, name:d.name, cat:d.cat, ext:ver.ext, versionId:ver.id,
    versionLabel:'Version ' + (idx + 1) + (idx === d.versions.length - 1 ? ' (aktuell zum Freigabezeitpunkt)' : ''),
    versionAdded:ver.added, size:ver.size };
}
/* Ältere/flache Freigaben in das versionierte Modell heben. */
function normalizeShare(s){
  if (s.versions) return s;
  const fields = (s.fields || []).map(l => ({ fid:'', label:l, value:'', sensitive:false }));
  const docs = (s.docs || []).map(x => ({ docId:x.id, name:x.name, cat:'', ext:'PDF', versionId:'', versionLabel:'', versionAdded:s.date || today(), size:0 }));
  s.token = s.token || shareToken();
  s.personName = s.personName || personName(s.personId);
  s.purpose = s.purpose || '';
  s.created = s.created || s.date || today();
  s.versions = [ mkShareVersion({ v:1, created:s.created, expires:s.expires || '', permission:'download', fields, docs, accepted:true, acceptedAt:s.created }) ];
  s.log = (s.accesses || []).map(a => ({ date:a.date, type:/heruntergeladen/i.test(a.text) ? 'heruntergeladen' : 'geoeffnet', text:a.text }));
  delete s.fields; delete s.docs; delete s.expires; delete s.accesses; delete s.date;
  return s;
}
function shareStatus(s){
  if (s.status === 'entwurf') return 'entwurf';
  if (s.status === 'widerrufen') return 'widerrufen';
  const cur = shareCurrentVersion(s);
  const n = daysUntil(cur.expires);
  if (cur.expires && n !== null && n < 0) return 'abgelaufen';
  return 'aktiv';
}
function shareBadge(s){
  const st = shareStatus(s), cur = shareCurrentVersion(s);
  if (st === 'entwurf') return badge('neutral', 'Entwurf');
  if (st === 'aktiv') return badge('ok', 'Aktiv' + (cur.expires ? ' bis ' + cur.expires : ''));
  if (st === 'abgelaufen') return badge('neutral', 'Abgelaufen am ' + cur.expires);
  return badge('err', 'Widerrufen am ' + s.revokedAt);
}
function shareFieldSummary(s){ const cur = shareCurrentVersion(s); return cur.fields.map(f => f.label); }
function shareDocSummary(s){ const cur = shareCurrentVersion(s); return cur.docs.map(d => d.name); }
/* Zugriffszahlen aus dem Protokoll. */
function shareAccessStats(s){
  const opens = (s.log || []).filter(l => l.type === 'geoeffnet');
  const downloads = (s.log || []).filter(l => l.type === 'heruntergeladen');
  const first = opens[0] || null, last = opens[opens.length - 1] || null;
  return { opens:opens.length, downloads:downloads.length, first:first ? first.date : '', last:last ? last.date : '' };
}

const NOTIF_META = {
  anfrage:{ icon:'clipboard', chip:'fchip-info' },
  frist:{ icon:'clock', chip:'fchip-warn' },

function pushNotif(type, text, route, key){
  if (key && S.notifications.some(n => n.key === key)) return;
  S.notifications.unshift({ id:uid('n'), date:today(), type, text, route:route || '', read:false, key:key || '' });
}

/* Aktivitätsprotokoll / Audit-Trail. Der optionale `kind` klassifiziert das Ereignis
   (anmeldung, profil, dokument, version, loeschung, vorgang, freigabe, zugriff, download,
   widerruf, ablauf, export, konto). Rendern erfolgt escaped (Sicherheit-Ansicht). */
function addLog(text, kind){ S.log.unshift({ date:today(), kind:kind || 'system', text }); }

/* Automatische Mitteilungen aus Fristen und Ablaufdaten (einmalig je Schlüssel) */
function syncNotifications(){
  if (!S.mode) return;
  if (S.settings.nDeadline){
    for (const c of S.cases){
      const st = caseStatus(c);
      if (!c.deadline || ['Erledigt','Abgelehnt','Archiviert'].includes(st)) continue;
      const n = daysUntil(c.deadline);
      if (n !== null && n >= 0 && n <= 7)
        pushNotif('frist', 'Frist nähert sich: „' + c.title + '“ ist bis ' + c.deadline + ' fällig (' + (n === 0 ? 'heute' : 'noch ' + n + ' Tag' + (n === 1 ? '' : 'e')) + ').', 'vorgang?id=' + c.id, 'frist-' + c.id + '-' + c.deadline);
    }
  }
  if (S.settings.nExpiry){
    for (const d of S.documents){
      if (d.trash || d.archived || !d.validUntil) continue;
      const n = daysUntil(d.validUntil);
      if (n === null) continue;
      if (n < 0) pushNotif('ablauf', 'Dokument abgelaufen: „' + d.name + '“ (' + personName(d.personId) + ') war gültig bis ' + d.validUntil + '.', 'dokument?id=' + d.id, 'doc-abgelaufen-' + d.id + '-' + d.validUntil);
      else if (n <= 60) pushNotif('ablauf', 'Dokument läuft ab: „' + d.name + '“ (' + personName(d.personId) + ') ist noch bis ' + d.validUntil + ' gültig.', 'dokument?id=' + d.id, 'doc-ablauf-' + d.id + '-' + d.validUntil);
    }
    for (const p of S.persons){
      for (const cf of p.custom){
        if (cf.archived || !cf.reminder || !cf.bis) continue;
        const n = daysUntil(cf.bis);
        if (n !== null && n <= 30)
          pushNotif('erinnerung', 'Erinnerung: „' + cf.label + '“ (' + p.name + ') ' + (n < 0 ? 'ist abgelaufen am ' : 'läuft ab am ') + cf.bis + '.', 'profil', 'cf-' + cf.id + '-' + cf.bis);
      }
    }
    for (const sh of S.shares){
      const cur = shareCurrentVersion(sh);
      if (shareStatus(sh) !== 'aktiv' || !cur.expires) continue;
      const n = daysUntil(cur.expires);
      if (n !== null && n >= 0 && n <= 14)
        pushNotif('freigabe', 'Freigabe läuft ab: Der Zugriff von ' + sh.recipient + ' endet am ' + cur.expires + '.', 'freigabe?id=' + sh.id, 'share-ablauf-' + sh.id + '-' + cur.expires);
    }
  }
  /* Gesetzte Erinnerungen (Vorgang und Anforderungs-Entwurf) */
  for (const c of S.cases){
    if (!c.reminder || ['Erledigt','Abgelehnt','Archiviert'].includes(caseStatus(c))) continue;
    const n = daysUntil(c.reminder);
    if (n !== null && n <= 0)
      pushNotif('erinnerung', 'Erinnerung zu „' + c.title + '“ (gesetzt auf den ' + c.reminder + ').', 'vorgang?id=' + c.id, 'case-rem-' + c.id + '-' + c.reminder);
  }
  if (S.requestDraft && S.requestDraft.reminder){
    const n = daysUntil(S.requestDraft.reminder);
    if (n !== null && n <= 0)
      pushNotif('erinnerung', 'Erinnerung: Die geprüfte Anforderung' + (S.requestDraft.meta.organisation ? ' von ' + S.requestDraft.meta.organisation : '') + ' wartet noch auf Abschluss.', 'anforderung', 'draft-rem-' + S.requestDraft.id + '-' + S.requestDraft.reminder);
  }
  /* Ablauf im Protokoll festhalten (einmalig je Freigabe/Ablaufdatum) */
  for (const sh of S.shares){
    if (sh.status !== 'aktiv') continue;
    const cur = shareCurrentVersion(sh);
    const n = daysUntil(cur.expires);
    if (cur.expires && n !== null && n < 0 && !(sh.log || []).some(l => l.type === 'abgelaufen' && l.text.indexOf(cur.expires) >= 0)){
      shareLog(sh, 'abgelaufen', 'Freigabe abgelaufen (Ablaufdatum ' + cur.expires + ') — kein Zugriff mehr möglich.');
      addLog('Freigabe an ' + sh.recipient + ' abgelaufen (' + cur.expires + ') — kein Zugriff mehr möglich.', 'ablauf');
      if (S.settings.nAccess) pushNotif('freigabe', 'Deine Freigabe an ' + sh.recipient + ' ist am ' + cur.expires + ' abgelaufen.', 'freigabe?id=' + sh.id, 'share-expired-' + sh.id + '-' + cur.expires);
    }
  }
}

function applyZoom(){
  const z = (S.settings.fontZoom || 100) / 100;
  document.body.style.zoom = z === 1 ? '' : String(z);
}

function enhanceA11y(){
  document.querySelectorAll('[data-act]').forEach(el => {
    if (['BUTTON','A','INPUT','SELECT','TEXTAREA','LABEL'].includes(el.tagName)) return;
    if (!el.hasAttribute('role')) el.setAttribute('role','button');
    if (!el.hasAttribute('tabindex')) el.setAttribute('tabindex','0');
  });
}

const VIEWS = {};
function isOrgRoute(r){ return r === 'org' || r.indexOf('org-') === 0; }
function render(){
  let r = route();
  /* Öffentliche Empfängeransichten: in jedem Zustand erreichbar, ohne App-Navigation. */
  if (r === 'f' || r === 'r'){
    document.body.classList.remove('org');
    document.body.classList.add('gate');
    syncNotifications();
    $('#view').innerHTML = r === 'r' ? VIEWS.r() : VIEWS.f();
    document.title = (r === 'r' ? 'Anforderung' : 'Freigabe') + ' — FormPilot';
    applyZoom(); enhanceA11y(); window.scrollTo(0, 0); save();
    return;
  }
  /* Unternehmensbereich — klar getrennte Shell. */
  if (isOrgRoute(r)){
    document.title = 'FormPilot für Unternehmen';
    syncOrg();
    if (!S.org){
      document.body.classList.remove('org');
      document.body.classList.add('gate');
      $('#view').innerHTML = VIEWS['org-start']();
    } else {
      document.body.classList.remove('gate');
      document.body.classList.add('org');
      const ov = (r === 'org') ? 'org-dashboard' : r;
      renderOrgNav(ov);
      const view = VIEWS[ov] || VIEWS['org-dashboard'];
      $('#view').innerHTML = view();
    }
    applyZoom(); enhanceA11y(); window.scrollTo(0, 0); save();
    return;
  }
  document.body.classList.remove('org');
  document.title = 'FormPilot — Dokumente. Daten. Freigaben.';
  if (!S.mode) r = (r === 'datenschutz' || r === 'nutzungsbedingungen') ? r : 'start';
  else if (r === 'start') r = 'dashboard';
  if (S.mode && !S.persons.some(p => !p.archived) && !['onboarding','datenschutz','hilfe','einstellungen','sicherheit'].includes(r)) r = 'onboarding';
  const gate = !S.mode || r === 'onboarding';
  document.body.classList.toggle('gate', gate);
  syncNotifications();
  if (!gate) renderNav();
  const view = VIEWS[r] || VIEWS.dashboard;
  $('#view').innerHTML = view ? view() : '';
  applyZoom();
  enhanceA11y();
  window.scrollTo(0, 0);
  save();
}
window.addEventListener('hashchange', render);

function fieldInput(def, v, id){
  if (def && def.sel){

const OB_STEPS = ['Ziel', 'Person', 'Basisdaten', 'Dokument'];
function obStepPills(cur){
  let h = '<div class="steps">';
  OB_STEPS.forEach((s, i) => {
    const n = i + 1;
    h += '<span class="step-pill' + (n < cur ? ' done' : n === cur ? ' cur' : '') + '"><span class="n">' + (n < cur ? '✓' : n) + '</span>' + s + '</span>';
    if (i < OB_STEPS.length - 1) h += '<span class="step-sep"></span>';
  });
  return h + '</div>';
}

/* ---------- Dashboard ---------- */
function nextAction(){
  const p = P();
  if (S.mode === 'fresh' && !S.onboarding.done)
    return { title:'Einrichtung fortsetzen', sub:'Du hast das Onboarding pausiert — mach dort weiter, wo du aufgehört hast.', label:'Fortsetzen', act:'nav', route:'onboarding' };
  if (S.requestDraft)
    return { title:'Anforderung in Prüfung', sub:(S.requestDraft.meta.organisation ? 'Von ' + S.requestDraft.meta.organisation + ' — ' : '') + 'du hast eine Anforderung begonnen zu prüfen. Schließe sie ab und speichere sie als Vorgang.', label:'Weiter prüfen', act:'nav', route:'anforderung' };
  const urgent = S.cases
    .filter(c => c.deadline && !['Erledigt','Abgelehnt','Archiviert'].includes(caseStatus(c)))
    .map(c => ({ c, n:daysUntil(c.deadline) }))
    .filter(x => x.n !== null && x.n <= 7)
    .sort((a, b) => a.n - b.n)[0];
  if (urgent) return { title:'Frist ' + (urgent.n < 0 ? 'überschritten' : 'nähert sich') + ': ' + urgent.c.title,
    sub:(urgent.n < 0 ? 'Die Frist war am ' + urgent.c.deadline + '.' : 'Fällig bis ' + urgent.c.deadline + (urgent.n === 0 ? ' — heute!' : ' — noch ' + urgent.n + ' Tag' + (urgent.n === 1 ? '' : 'e') + '.')) + (caseMissingCount(urgent.c) ? ' Es ' + (caseMissingCount(urgent.c) === 1 ? 'fehlt noch 1 Punkt.' : 'fehlen noch ' + caseMissingCount(urgent.c) + ' Punkte.') : ' Alles vollständig — bereit zur Freigabe.'),
    label:'Vorgang öffnen', act:'nav', route:'vorgang?id=' + urgent.c.id };
  if (p && personConflicts(p).length)
    return { title:'Widerspruch zwischen Profil und Dokument', sub:personConflicts(p)[0].hint, label:'Jetzt klären', act:'nav', route:'datenqualitaet' };
  const incomplete = S.cases.find(c => caseStatus(c) === 'Unvollständig');
  if (incomplete) return { title:'„' + incomplete.title + '“ vervollständigen', sub:'Es fehlen noch ' + caseMissingCount(incomplete) + ' Angaben oder Dokumente.', label:'Vorgang öffnen', act:'nav', route:'vorgang?id=' + incomplete.id };
  const ready = S.cases.find(c => caseStatus(c) === 'Bereit');
  if (ready) return { title:'„' + ready.title + '“ ist bereit', sub:'Alle Angaben und Dokumente sind vollständig — erstelle jetzt die Freigabe.', label:'Vorgang öffnen', act:'nav', route:'vorgang?id=' + ready.id };
  const expiring = S.documents.filter(d => !d.trash && !d.archived && ['Läuft bald ab','Abgelaufen'].includes(docStatus(d)))
    .sort((a, b) => (daysUntil(a.validUntil) ?? 999) - (daysUntil(b.validUntil) ?? 999))[0];
  if (expiring) return { title:'„' + expiring.name + '“ ' + (docStatus(expiring) === 'Abgelaufen' ? 'ist abgelaufen' : 'läuft bald ab'), sub:'Gültig bis ' + expiring.validUntil + ' (' + personName(expiring.personId) + '). Lade bei Gelegenheit eine aktuelle Version hoch.', label:'Dokument öffnen', act:'nav', route:'dokument?id=' + expiring.id };
  if (p && missingFields(p).length)
    return { title:'Profil vervollständigen', sub:'Bei ' + esc(p.name) + ' fehlen noch ' + missingFields(p).length + ' Angaben — z. B. „' + missingFields(p)[0].label + '“.', label:'Zum Profil', act:'nav', route:'profil' };
  return { title:'Alles im grünen Bereich', sub:'Keine offenen Fristen, keine Konflikte, keine ablaufenden Dokumente. Gute Arbeit!', label:'', act:'', route:'' };
}

/* ---------- Vorgänge: Liste ---------- */
VIEWS.vorgaenge = function(){
  const filter = S.ui.caseFilter || 'Aktiv';
  const groupsDef = { 'Aktiv':['Offen','Unvollständig','Bereit','Übermittelt','Wartet auf Rückmeldung'], 'Abgeschlossen':['Erledigt','Abgelehnt'], 'Archiviert':['Archiviert'] };
  const list = S.cases.filter(c => c.personId === S.activePerson && (groupsDef[filter] || []).includes(caseStatus(c)))
    .sort((a, b) => (daysUntil(a.deadline) ?? 9999) - (daysUntil(b.deadline) ?? 9999));
  let h = pageHead('clipboard', 'fchip-info', 'Vorgänge', 'Anforderungen von Arbeitgeber, Amt oder Versicherung — verstehen, vervollständigen, freigeben.') +
    '<div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:center"><div class="chips" style="margin:0">';
  for (const f of Object.keys(groupsDef)) h += '<button class="chip' + (filter === f ? ' active' : '') + '" data-act="caseFilter" data-id="' + f + '">' + f + '</button>';
  h += '</div><button class="btn btn-primary btn-sm" data-act="nav" data-route="vorgang-neu">' + I.plus() + 'Neuer Vorgang</button></div>';
  if (!list.length){
    h += '<div class="card" style="margin-top:20px">' + emptyState('clipboard',
      filter === 'Aktiv' ? 'Kein laufender Vorgang' : 'Nichts in „' + filter + '“',
      filter === 'Aktiv' ? 'Starte mit einer Vorlage oder füge den Text einer Anforderung ein — FormPilot erkennt, was gebraucht wird.' : 'Sobald Vorgänge diesen Status erreichen, erscheinen sie hier.',
      filter === 'Aktiv' ? 'Neuen Vorgang starten' : '', 'goNewCase') + '</div>';
    return h;
  }
  h += '<div class="card" style="margin-top:20px;padding-top:6px;padding-bottom:6px">';
  for (const c of list){
    const miss = caseMissingCount(c), n = daysUntil(c.deadline);
    h += '<div class="row clickable" data-act="nav" data-route="vorgang?id=' + c.id + '"><span class="fchip fchip-info">' + I.clipboard() + '</span>' +
      '<div class="grow"><div class="title">' + esc(c.title) + '</div><div class="sub">' + esc(c.recipient) +
      (c.deadline ? ' · Frist ' + c.deadline + (n !== null && n >= 0 && n <= 7 ? ' <b style="color:var(--warn)">(noch ' + n + ' Tg.)</b>' : n !== null && n < 0 && !['Erledigt','Abgelehnt','Archiviert'].includes(caseStatus(c)) ? ' <b style="color:var(--err)">(überfällig)</b>' : '') : '') +
      (miss && ['Offen','Unvollständig'].includes(caseStatus(c)) ? ' · ' + miss + ' offen' : '') + '</div></div>' + caseBadge(c) + '</div>';
  }
  h += '</div><p class="sec-note">' + I.info() + '<span>Vorgänge gehören immer zur aktiven Person. Wechsle die Person oben links, um andere Vorgänge zu sehen.</span></p>';
  return h;
};

/* ---------- Vorgang: Detail ---------- */
const MANUAL_CASE_STATUS = ['Wartet auf Rückmeldung','Erledigt','Abgelehnt','Archiviert'];
VIEWS.vorgang = function(){
  const c = caseById(qp('id') || S.ui.caseId);
  if (!c) return '<div class="card">' + emptyState('clipboard', 'Vorgang nicht gefunden', 'Vielleicht wurde er gelöscht.', 'Zu den Vorgängen', 'goCases') + '</div>';
  S.ui.caseId = c.id;
  const st = caseStatus(c), items = caseChecklist(c), missing = items.filter(i => !i.ok).length;
  const p = personById(c.personId), na = caseNextAction(c), share = c.shareId ? shareById(c.shareId) : null;
  const writable = canWrite(p);
  let h = '<div class="page-head"><button class="link-btn" data-act="nav" data-route="vorgaenge" style="margin-bottom:10px">← Alle Vorgänge</button>' +
    '<div class="head-flex"><span class="fchip fchip-info">' + I.clipboard() + '</span><div style="flex:1"><h1 style="font-size:24px">' + esc(c.title) + '</h1>' +
    '<p class="page-sub">' + caseBadge(c) + (c.deadline ? ' &nbsp;' + badge(daysUntil(c.deadline) !== null && daysUntil(c.deadline) < 0 && !['Erledigt','Abgelehnt','Archiviert'].includes(st) ? 'err' : 'neutral', 'Frist ' + c.deadline) : '') + '</p></div></div></div>';

  if (na && na.text) h += '<div class="card" style="border-left:4px solid var(--teal);margin-bottom:16px"><h4 style="margin-bottom:3px">Nächste Aktion</h4><p style="font-size:14.5px">' + esc(na.text) + '</p>' +
    (na.act && writable ? '<div class="card-actions"><button class="btn btn-primary btn-sm" data-act="' + na.act + '">' + esc(na.label) + '</button></div>' : '') + '</div>';

  /* Eckdaten */
  h += '<div class="sum-block"><div class="sum-head">Eckdaten</div>' +
    '<div class="sum-item"><span class="l">Person</span><span class="r">' + esc(personName(c.personId)) + '</span></div>' +
    '<div class="sum-item"><span class="l">Empfänger</span><span class="r">' + esc(c.recipient || '—') + '</span></div>' +
    (c.contact ? '<div class="sum-item"><span class="l">Ansprechpartner</span><span class="r">' + esc(c.contact) + '</span></div>' : '') +
    '<div class="sum-item"><span class="l">Zweck</span><span class="r">' + esc(c.purpose || '—') + '</span></div>' +
    (c.az ? '<div class="sum-item"><span class="l">Aktenzeichen</span><span class="r mono">' + esc(c.az) + '</span></div>' : '') +
    (c.vorgangsnr ? '<div class="sum-item"><span class="l">Vorgangsnummer</span><span class="r mono">' + esc(c.vorgangsnr) + '</span></div>' : '') +
    (c.deadline ? '<div class="sum-item"><span class="l">Frist</span><span class="r mono">' + esc(c.deadline) + '</span></div>' : '') +
    (c.reminder ? '<div class="sum-item"><span class="l">Erinnerung</span><span class="r mono">' + esc(c.reminder) + '</span></div>' : '') +
    '</div>';

  /* Checkliste */
  h += '<div class="card"><div class="card-head"><h3>Benötigte Angaben und Dokumente</h3>' + (missing ? badge('warn', missing + ' offen') : badge('ok', 'Vollständig')) + '</div>';
  if (!items.length) h += emptyState('clipboard', 'Noch nichts festgelegt', 'Füge hinzu, welche Angaben und Dokumente der Empfänger braucht.', '', '');
  for (const it of items){
    if (it.kind === 'field'){
      const editing = S.ui.caseEdit === it.id;
      h += '<div class="check-item"><span class="ci-status ' + (it.ok ? 'ci-ok' : it.err ? 'ci-err' : 'ci-warn') + '">' + (it.ok ? I.check() : it.err ? I.alert() : I.clock()) + '</span><div class="grow" style="flex:1;min-width:0">' +
        '<div class="title" style="font-weight:600;color:var(--ink)">' + esc(it.label) + (it.optional ? ' <span style="font-weight:400;color:var(--grayblue);font-size:12.5px">(optional)</span>' : '') + '</div>' +
        '<div class="sub" style="font-size:13px;color:var(--slate)">' + (it.filled ? 'Aus dem Profil: ' + esc(it.sens ? maskValue(it.value) : it.value) : it.err ? 'Vorhanden, aber formal ungültig: ' + esc(it.err) : (it.optional ? 'Optional — nicht ausgefüllt.' : 'Fehlt noch im Profil von ' + esc(firstName(p)) + '.')) + '</div>' +
        (it.unusual ? '<div class="unusual-note">' + I.info() + '<span>' + esc(it.unusual) + '</span></div>' : '');
      if (editing && writable){
        const def = FIELD_DEFS[it.id];
        h += '<div class="edit-box"><div class="field" style="margin-bottom:0"><label for="ce-input">' + esc(it.label) + '</label>' + fieldInput(def, it.value, 'ce-input') + (def && def.help ? '<div class="help">' + esc(def.help) + '</div>' : '') + '<div id="ce-error"></div></div>' +
          '<div class="edit-actions"><button class="btn btn-primary btn-sm" data-act="caseFieldSave" data-id="' + it.id + '">Speichern</button><button class="btn btn-secondary btn-sm" data-act="caseFieldCancel">Abbrechen</button></div></div>';
      } else if (writable){
        h += '<div class="ci-actions"><button class="link-btn" data-act="caseFieldEdit" data-id="' + it.id + '">' + (it.ok || it.err ? 'Bearbeiten' : 'Jetzt ergänzen') + '</button>' +
          '<button class="link-btn danger" data-act="caseFieldRemove" data-id="' + it.id + '">Nicht benötigt</button></div>';
      }
      h += '</div></div>';
    } else {
      h += '<div class="check-item"><span class="ci-status ' + (it.ok ? 'ci-ok' : 'ci-warn') + '">' + (it.ok ? I.check() : I.clock()) + '</span><div class="grow" style="flex:1;min-width:0">' +
        '<div class="title" style="font-weight:600;color:var(--ink)">' + esc(it.label) + ' <span style="font-weight:400;color:var(--grayblue);font-size:12.5px">(' + esc(it.cat) + (it.optional ? ' · optional' : '') + ')</span></div>' +
        '<div class="sub" style="font-size:13px;color:var(--slate)">' +
        (it.doc ? 'Verknüpft: „' + esc(it.doc.name) + '“' + (it.st === 'Abgelaufen' ? ' — <b style="color:var(--err)">abgelaufen, bitte erneuern</b>' : it.st === 'Läuft bald ab' ? ' — läuft bald ab' : '') : it.gone ? 'Das verknüpfte Dokument wurde gelöscht.' : (it.optional ? 'Optional — nicht verknüpft.' : 'Noch nicht im Safe vorhanden oder nicht verknüpft.')) + '</div>' +
        (it.unusual ? '<div class="unusual-note">' + I.info() + '<span>' + esc(it.unusual) + '</span></div>' : '');
      if (writable){
        h += '<div class="ci-actions">' +
          (it.doc ? '<button class="link-btn" data-act="nav" data-route="dokument?id=' + it.doc.id + '">Ansehen</button><button class="link-btn" data-act="caseDocLink" data-idx="' + it.idx + '">Anderes Dokument</button>' :
            '<button class="link-btn" data-act="caseDocUpload" data-idx="' + it.idx + '">Hochladen</button><button class="link-btn" data-act="caseDocLink" data-idx="' + it.idx + '">Aus dem Safe verknüpfen</button>') +
          '<button class="link-btn danger" data-act="caseDocRemove" data-idx="' + it.idx + '">Nicht benötigt</button></div>';
      }
      h += '</div></div>';
    }
  }
  if (writable) h += '<div class="card-actions" style="justify-content:flex-start"><button class="btn btn-secondary btn-sm" data-act="caseAddField">' + I.plus() + 'Angabe hinzufügen</button><button class="btn btn-secondary btn-sm" data-act="caseAddDoc">' + I.plus() + 'Dokument hinzufügen</button></div>';
  h += '</div>';

  /* Freigabe */
  if (share){
    const scur = shareCurrentVersion(share);
    h += '<div class="section"><h3 class="section-title">Freigabe zu diesem Vorgang</h3><div class="card"><div class="card-head"><div><div class="title" style="font-weight:600;color:var(--ink)">' + esc(share.recipient) + '</div><div class="meta">' + scur.fields.length + ' Angaben · ' + scur.docs.length + ' Dokument' + (scur.docs.length === 1 ? '' : 'e') + (share.versions.length > 1 ? ' · Version ' + share.versions.length : '') + ' · erstellt am ' + share.created + '</div></div>' + shareBadge(share) + '</div>' +
      '<div class="card-actions"><button class="btn btn-secondary btn-sm" data-act="nav" data-route="freigabe?id=' + share.id + '">Freigabe öffnen</button></div></div></div>';
  }

  /* Anforderungstext & Quelle */
  if (c.reqText || c.sourceDocId){
    const srcDoc = c.sourceDocId ? docById(c.sourceDocId) : null;
    h += '<div class="section"><h3 class="section-title">Ursprüngliche Anforderung</h3><div class="card">' +
      (c.reqText ? '<p style="white-space:pre-wrap;font-size:14px;line-height:1.6;color:var(--body)">' + esc(c.reqText) + '</p>' : '') +
      (srcDoc && !srcDoc.trash ? '<div class="row" style="border:none;padding-bottom:0;margin-top:' + (c.reqText ? '12px' : '0') + '"><span class="doc-icon">' + esc(srcDoc.ext) + '</span><div class="grow"><div class="title" style="font-size:14px">' + esc(srcDoc.name) + '</div><div class="sub">Originaldatei im Safe</div></div><button class="btn btn-secondary btn-sm" data-act="nav" data-route="dokument?id=' + srcDoc.id + '">Ansehen</button></div>' : '') +
      '</div></div>';
  }

  /* Notiz */
  h += '<div class="section"><h3 class="section-title">Notiz</h3><div class="card">';
  if (S.ui.caseNoteEdit && writable){
    h += '<div class="field" style="margin-bottom:0"><textarea id="case-note" class="small">' + esc(c.note) + '</textarea></div>' +
      '<div class="edit-actions"><button class="btn btn-primary btn-sm" data-act="caseNoteSave">Speichern</button><button class="btn btn-secondary btn-sm" data-act="caseNoteCancel">Abbrechen</button></div>';
  } else {
    h += '<p style="font-size:14.5px;' + (c.note ? '' : 'color:var(--grayblue)') + '">' + (c.note ? esc(c.note) : 'Keine Notiz — z. B. „Rückruf am Montag zugesagt“.') + '</p>' +
      (writable ? '<div class="card-actions" style="margin-top:10px"><button class="link-btn" data-act="caseNoteEdit">' + (c.note ? 'Bearbeiten' : 'Notiz hinzufügen') + '</button></div>' : '');
  }
  h += '</div></div>';

  /* Verlauf */
  h += '<div class="section"><h3 class="section-title">Verlauf</h3><div class="card"><div class="timeline">' +
    c.history.slice().reverse().map(e => '<div class="tl-item"><span class="tl-dot"></span><div class="tl-body"><div class="tl-date">' + e.date + '</div><div class="tl-text">' + esc(e.text) + '</div></div></div>').join('') +
    '</div></div></div>';

  /* Aktionen */
  if (writable){
    h += '<div class="section card-actions" style="justify-content:flex-start">' +
      (st === 'Bereit' ? '<button class="btn btn-primary" data-act="startShare">' + I.send() + 'Freigabe erstellen</button>' : '') +
      '<button class="btn btn-secondary" data-act="caseStatusModal">Status ändern</button>' +
      (st !== 'Archiviert' ? '<button class="btn btn-secondary" data-act="caseArchive">Archivieren</button>' : '<button class="btn btn-secondary" data-act="caseUnarchive">Wieder aufnehmen</button>') +
      '<button class="btn btn-danger" data-act="caseDelete">Löschen</button></div>';
  }
  return h;
};

/* ---------- Dokumentensafe ---------- */
VIEWS.safe = function(){
  const p = P(), writable = canWrite(p);
  const filter = S.ui.docFilter || 'Alle';
  let docs;
  if (filter === 'Papierkorb') docs = trashDocs().filter(d => d.personId === S.activePerson);
  else if (filter === 'Archiv') docs = personDocs().filter(d => d.archived);
  else docs = personDocs().filter(d => !d.archived && (filter === 'Alle' || d.cat === filter));
  docs = docs.slice().sort((a, b) => (parseDE(b.added) || 0) - (parseDE(a.added) || 0));

  let h = pageHead('archive', 'fchip-teal', 'Dokumentensafe', 'Dokumente von ' + esc(p.name) + ' — geordnet, versioniert und jederzeit griffbereit.');
  if (writable){
    h += '<div class="upload-zone" id="dropzone" data-act="pickFiles" role="button" tabindex="0" aria-label="Dateien auswählen oder hierher ziehen">' +
      I.upload(28) + '<div class="uz-title" style="margin-top:10px">Dateien auswählen oder hierher ziehen</div>' +
      '<div class="uz-sub">PDF, JPG, PNG oder HEIC · mehrere Dateien möglich · bis 10 MB je Datei</div>' +
      '<span class="uz-secure">' + I.shieldCheck() + 'Bleibt lokal auf diesem Gerät</span></div>' +
      '<div class="ci-actions" style="justify-content:center;margin-top:12px"><button class="link-btn" data-act="pickCamera">' + 'Mit der Smartphone-Kamera fotografieren</button></div>';
  } else {
    h += '<div class="info-banner">' + I.info() + '<span>Du hast für ' + esc(p.name) + ' nur Leserechte — Hochladen und Bearbeiten sind deaktiviert.</span></div>';
  }
  h += '<div class="chips" role="tablist">';
  for (const c of ['Alle'].concat(DOC_CATS, ['Archiv','Papierkorb'])){
    const cnt = c === 'Papierkorb' ? trashDocs().filter(d => d.personId === S.activePerson).length : 0;
    h += '<button class="chip' + (filter === c ? ' active' : '') + '" data-act="docFilter" data-id="' + esc(c) + '" role="tab" aria-selected="' + (filter === c) + '">' + esc(c) + (cnt ? ' (' + cnt + ')' : '') + '</button>';
  }
  h += '</div>';

  if (filter === 'Papierkorb') h += '<div class="sec-note" style="margin:4px 0 12px">' + I.trash() + '<span>Dokumente im Papierkorb werden nach 30 Tagen endgültig gelöscht. Bis dahin kannst du sie wiederherstellen.</span></div>';

  if (!docs.length){
    const msgs = {
      'Papierkorb':['Der Papierkorb ist leer', 'Gelöschte Dokumente landen zuerst hier und lassen sich 30 Tage lang wiederherstellen.'],
      'Archiv':['Nichts archiviert', 'Archivierte Dokumente bleiben erhalten, tauchen aber nicht mehr in den aktiven Listen auf.'],
      'Alle':['Noch keine Dokumente', 'Lade dein erstes Dokument hoch — zum Beispiel Personalausweis, Immatrikulationsbescheinigung oder Lebenslauf.']
    };
    const m = msgs[filter] || ['Nichts in „' + filter + '“', 'In dieser Kategorie liegt noch kein Dokument von ' + esc(firstName(p)) + '.'];
    h += '<div class="card">' + emptyState('archive', m[0], m[1], (filter !== 'Papierkorb' && filter !== 'Archiv' && writable) ? 'Dokument hochladen' : '', 'pickFiles') + '</div>';
    return h;
  }
  h += '<div class="card" style="padding-top:6px;padding-bottom:6px">';
  for (const d of docs){
    const cv = docCurrentVersion(d);
    h += '<div class="row clickable" data-act="nav" data-route="dokument?id=' + d.id + '"><span class="doc-icon">' + esc(d.ext) + '</span>' +
      '<div class="grow"><div class="title">' + esc(d.name) + '</div><div class="sub">' + esc(d.cat) + ' · hinzugefügt am ' + d.added +
      (cv.size ? ' · ' + fmtSize(cv.size) : '') + (d.versions.length > 1 ? ' · ' + d.versions.length + ' Versionen' : '') +
      (d.lastShared ? ' · zuletzt geteilt mit ' + esc(d.lastShared) : '') + '</div></div>' + docBadge(d) + I.chevron(16) + '</div>';
  }
  h += '</div>';
  return h;
};
