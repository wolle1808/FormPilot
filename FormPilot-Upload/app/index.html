        '<div class="row"><div class="grow"><div class="title">Umbenennen</div><div class="sub">Aktueller Name: ' + esc(d.name) + '</div></div><button class="btn btn-secondary btn-sm" data-act="docRename">Ändern</button></div>' +
        '<div class="row"><div class="grow"><div class="title">Kategorie ändern</div><div class="sub">' + esc(d.cat) + '</div></div><button class="btn btn-secondary btn-sm" data-act="docCat">Ändern</button></div>' +
        '<div class="row"><div class="grow"><div class="title">Person ändern</div><div class="sub">Gehört zu ' + esc(personName(d.personId)) + '</div></div><button class="btn btn-secondary btn-sm" data-act="docPerson">Ändern</button></div>' +
        '<div class="row"><div class="grow"><div class="title">Gültigkeitsdatum</div><div class="sub">' + (d.validUntil ? 'Gültig bis ' + d.validUntil + ' — FormPilot erinnert dich rechtzeitig.' : 'Kein Ablaufdatum hinterlegt.') + '</div></div><button class="btn btn-secondary btn-sm" data-act="docValid">Ändern</button></div>' +
        '<div class="row"><div class="grow"><div class="title">' + (d.review ? 'Prüfung abschließen' : 'Zur Prüfung markieren') + '</div><div class="sub">' + (d.review ? 'Entfernt die Markierung „Prüfen“.' : 'Markiert das Dokument mit dem Status „Prüfen“, z. B. wenn der Inhalt unklar ist.') + '</div></div><button class="btn btn-secondary btn-sm" data-act="docToggleReview">' + (d.review ? 'Abschließen' : 'Markieren') + '</button></div>' +
        '</div>';
    }
  }

  /* Verknüpfte Vorgänge */
  if (linkedCases.length){
    h += '<div class="section"><h3 class="section-title">Verknüpfte Vorgänge</h3><div class="card" style="padding-top:6px;padding-bottom:6px">' +
      linkedCases.map(c => '<div class="row clickable" data-act="nav" data-route="vorgang?id=' + c.id + '"><span class="fchip fchip-info">' + I.clipboard() + '</span><div class="grow"><div class="title">' + esc(c.title) + '</div><div class="sub">' + esc(c.recipient) + '</div></div>' + caseBadge(c) + '</div>').join('') + '</div></div>';
  }

  /* Versionsverlauf */
  h += '<div class="section"><h3 class="section-title">Versionsverlauf</h3><div class="card" style="padding-top:6px;padding-bottom:6px">';
  const versions = d.versions.slice().reverse();
  versions.forEach((v, i) => {
    h += '<div class="row"><span class="doc-icon">' + esc(v.ext) + '</span><div class="grow"><div class="title" style="font-size:14px">' + esc(v.name || d.name) + (v.note ? ' <span style="color:var(--grayblue);font-weight:400">· ' + esc(v.note) + '</span>' : '') + '</div>' +
      '<div class="sub">Hochgeladen am ' + v.added + (v.size ? ' · ' + fmtSize(v.size) : '') + '</div></div>' +
      (i === 0 ? badge('teal', 'Aktuell') : badge('neutral', 'Ersetzt')) +
      '<button class="icon-btn" data-act="versionDownload" data-doc="' + d.id + '" data-id="' + v.id + '" aria-label="Version herunterladen">' + I.download() + '</button></div>';
  });
  h += '</div></div>';

  /* Aktionen unten */
  if (writable){
    h += '<div class="section card-actions" style="justify-content:flex-start">';
    if (d.trash) h += '<button class="btn btn-primary" data-act="docRestore">' + I.restore() + 'Wiederherstellen</button><button class="btn btn-danger" data-act="docPurge">Endgültig löschen</button>';
    else h += (d.archived ? '<button class="btn btn-secondary" data-act="docUnarchive">Aus dem Archiv holen</button>' : '<button class="btn btn-secondary" data-act="docArchive">Archivieren</button>') +
      '<button class="btn btn-danger" data-act="docTrash">In den Papierkorb</button>';
    h += '</div>';
  }
  return h;
};

/* ---------- Profil ---------- */
function kvRow(p, def, writable){
  const f = fv(p, def.id), has = !!(f && f.v), editing = S.ui.editField === def.id;
  const revealed = S.ui.reveal && S.ui.reveal[p.id + ':' + def.id];
  let metaBits = [];
  if (has){
    if (f.source) metaBits.push('Quelle: ' + esc(f.source));
    if (f.changed) metaBits.push('geändert am ' + f.changed);
    if (f.confirmed) metaBits.push('bestätigt am ' + f.confirmed);
    if (f.uses) metaBits.push(f.uses + '× verwendet');
    if (f.lastShared) metaBits.push('zuletzt geteilt mit ' + esc(f.lastShared));
  }
  let h = '<div class="kv"><div class="kv-top"><span class="kv-label">' + esc(def.label) + (def.opt ? ' <span style="color:var(--grayblue)">(optional)</span>' : '') + '</span>' +
    '<span class="kv-value' + (has ? '' : ' empty') + (def.mono ? ' mono' : '') + '">' + (has ? esc(displayValue(p, def.id)) : (writable ? 'Noch nicht hinterlegt' : '—')) +
    (has && f.review ? ' ' + badge('warn', 'Prüfen') : '') + '</span>' +
    '<span class="kv-actions">' +
    (has && def.sens ? '<button class="icon-btn" data-act="toggleReveal" data-id="' + def.id + '" aria-label="' + (revealed ? 'Wert verbergen' : 'Wert anzeigen') + '">' + (revealed ? I.eyeOff() : I.eye()) + '</button>' : '') +
    (writable ? '<button class="icon-btn" data-act="editField" data-id="' + def.id + '" aria-label="' + esc(def.label) + ' bearbeiten">' + I.pencil() + '</button>' : '') +
    '</span></div>';
  if (metaBits.length) h += '<div class="kv-meta">' + metaBits.join(' · ') + '</div>';
  if (editing && writable){
    h += '<div class="edit-box"><div class="field" style="margin-bottom:0"><label for="pf-input">' + esc(def.label) + '</label>' + fieldInput(def, has ? f.v : '', 'pf-input') +
      (def.help ? '<div class="help">' + esc(def.help) + '</div>' : '') + '<div id="pf-error"></div></div>' +
      '<div class="edit-actions"><button class="btn btn-primary btn-sm" data-act="fieldSave" data-id="' + def.id + '">Speichern</button>' +
      (has && !f.confirmed ? '' : '') +
      '<button class="btn btn-secondary btn-sm" data-act="fieldCancel">Abbrechen</button>' +
      (has ? '<button class="btn btn-secondary btn-sm" data-act="fieldConfirm" data-id="' + def.id + '">Wert bestätigen</button>' : '') +
      '</div></div>';
  }
  return h + '</div>';
}
VIEWS.profil = function(){
  const p = P(), writable = canWrite(p);
  const comp = profileCompleteness(p);
  let h = '<div class="page-head head-flex"><span class="avatar big">' + esc(initials(p.name)) + '</span><div style="flex:1"><h1>' + esc(p.name) + '</h1>' +
    '<p class="page-sub">' + esc(p.relation) + ' · ' + esc(roleLabel(p.role)) + ' &nbsp;<button class="link-btn" data-act="nav" data-route="personen">Personen verwalten</button></p></div></div>';
  if (!writable) h += '<div class="info-banner" style="margin-bottom:20px">' + I.info() + '<span>Du hast für dieses Profil <b>nur Leserechte</b> — Werte lassen sich ansehen, aber nicht ändern.</span></div>';

  h += '<div class="progress-wrap"><div class="progress-label"><span>Vollständigkeit (Pflichtangaben)</span><span>' + comp.filled + ' von ' + comp.total + '</span></div><div class="progress"><div style="width:' + comp.pct + '%"></div></div></div>';

  /* Vollmacht */
  if (p.relation !== 'Ich'){
    const vd = p.vollmachtDocId ? docById(p.vollmachtDocId) : null;
    h += '<div class="card" style="margin-bottom:16px"><div class="card-head"><h3>Vertretung & Vollmacht</h3>' + (vd ? badge('ok','Vollmacht hinterlegt') : badge('neutral','Keine Vollmacht hinterlegt')) + '</div>' +
      (vd ? '<div class="row" style="border:none;padding-bottom:4px"><span class="doc-icon">' + esc(vd.ext) + '</span><div class="grow"><div class="title">' + esc(vd.name) + '</div><div class="sub">' + (p.vollmachtBis ? 'Gültig bis ' + p.vollmachtBis : 'Ohne Ablaufdatum') + '</div></div><button class="btn btn-secondary btn-sm" data-act="nav" data-route="dokument?id=' + vd.id + '">Ansehen</button></div>' : '<p class="meta" style="padding:4px 0">Hinterlege die Vollmacht als Dokument im Safe und verknüpfe sie hier — mit Gültigkeitsdatum und Notiz zur Vertretungsberechtigung.</p>') +
      (p.vollmachtNote ? '<p style="font-size:13.5px;color:var(--slate);margin-top:8px">' + esc(p.vollmachtNote) + '</p>' : '') +
      '<div class="card-actions"><button class="btn btn-secondary btn-sm" data-act="personEdit" data-id="' + p.id + '">' + (vd ? 'Bearbeiten' : 'Vollmacht verknüpfen') + '</button></div></div>';
  }

  /* Bereiche */
  for (const gid of p.groups){
    const g = GROUP_BY_ID[gid]; if (!g) continue;
    const c = groupCompleteness(p, gid);
    const required = g.fields.filter(f => !f.opt), optional = g.fields.filter(f => f.opt);
    const showOpt = S.ui.showOpt && S.ui.showOpt[gid];
    const optFilled = optional.filter(f => val(p, f.id));
    h += '<div class="card" style="margin-bottom:16px"><div class="card-head"><h3>' + esc(g.name) + '</h3><div style="width:150px">' + miniProgress(c.filled, c.total) + '</div></div>';
    for (const def of required) h += kvRow(p, def, writable);
    for (const def of (showOpt ? optional : optFilled)) h += kvRow(p, def, writable);
    h += '<div class="card-actions" style="justify-content:space-between;margin-top:12px">' +
      (optional.length ? '<button class="link-btn" data-act="toggleOpt" data-id="' + gid + '">' + (showOpt ? 'Optionale Angaben ausblenden' : (optional.length - optFilled.length) + ' optionale Angaben anzeigen') + '</button>' : '<span></span>') +
      (writable && !['identitaet','kontakt'].includes(gid) ? '<button class="link-btn" data-act="groupHide" data-id="' + gid + '">Bereich ausblenden</button>' : '') + '</div></div>';
  }
  /* Bereich hinzufügen */
  const inactive = GROUPS.filter(g => !p.groups.includes(g.id));
  if (writable && inactive.length){
    h += '<div class="card" style="margin-bottom:16px"><h3 style="margin-bottom:10px">Bereich hinzufügen</h3><div class="chips" style="margin:0">' +
      inactive.map(g => '<button class="chip" data-act="groupAdd" data-id="' + g.id + '">+ ' + esc(g.name) + '</button>').join('') + '</div></div>';
  }

  /* Eigene Felder */
  const customs = p.custom.filter(c => !c.archived), archived = p.custom.filter(c => c.archived);
  h += '<div class="card"><div class="card-head"><h3>Eigene Felder</h3>' + (writable ? '<button class="btn btn-secondary btn-sm" data-act="customAdd">' + I.plus() + 'Feld hinzufügen</button>' : '') + '</div>';
  if (!customs.length) h += '<p class="meta" style="padding:6px 0">Für alles, was der Katalog nicht abdeckt — etwa Mitgliedsnummern oder Kennungen. Typen: Text, Nummer/Kennung oder Datum.</p>';
  for (const cf of customs){
    const revealed = S.ui.reveal && S.ui.reveal[p.id + ':cf:' + cf.id];
    h += '<div class="kv"><div class="kv-top"><span class="kv-label">' + esc(cf.label) + ' <span style="color:var(--grayblue)">(' + ({text:'Text', number:'Kennung', date:'Datum'})[cf.type] + ')</span></span>' +
      '<span class="kv-value' + (cf.v ? '' : ' empty') + ' mono">' + (cf.v ? esc(cf.sens && !revealed ? maskValue(cf.v) : cf.v) : 'Noch kein Wert') + '</span>' +
      '<span class="kv-actions">' +
      (cf.v && cf.sens ? '<button class="icon-btn" data-act="customReveal" data-id="' + cf.id + '" aria-label="Wert anzeigen">' + (revealed ? I.eyeOff() : I.eye()) + '</button>' : '') +
      (writable ? '<button class="icon-btn" data-act="customEdit" data-id="' + cf.id + '" aria-label="Eigenes Feld bearbeiten">' + I.pencil() + '</button>' : '') + '</span></div>' +
      '<div class="kv-meta">' + [cf.bis ? 'Gültig bis ' + cf.bis : '', cf.reminder && cf.bis ? 'Erinnerung aktiv' : '', cf.changed ? 'geändert am ' + cf.changed : ''].filter(Boolean).join(' · ') + '</div></div>';
  }
  if (archived.length) h += '<p class="kv-meta" style="margin-top:10px">' + archived.length + ' archivierte' + (archived.length === 1 ? 's Feld' : ' Felder') + ' — <button class="link-btn" data-act="customShowArchived">anzeigen</button></p>';
  h += '</div>';
  h += '<p class="sec-note">' + I.shieldCheck() + '<span>Sensible Werte (z. B. IBAN, Steuer-ID) werden maskiert angezeigt und nur nach Klick auf das Auge sichtbar. Geteilt wird grundsätzlich nur nach deiner ausdrücklichen Freigabe.</span></p>';
  return h;
};

/* ---------- Datenqualität ---------- */
VIEWS.datenqualitaet = function(){
  const p = P(), writable = canWrite(p);
  const comp = profileCompleteness(p), missing = missingFields(p), review = reviewFields(p), conflicts = personConflicts(p);
  /* Formale Prüfung aller gefüllten Felder */
  const invalid = [];
  for (const gid of p.groups){
    const g = GROUP_BY_ID[gid]; if (!g) continue;
    for (const def of g.fields){
      const v = val(p, def.id);
      if (!v) continue;
      const err = validateValue(def, v);
      if (err) invalid.push({ def, err });
    }
  }
  let h = pageHead('gauge', 'fchip-marine', 'Datenqualität', 'Wie vollständig, aktuell und widerspruchsfrei sind die Angaben von ' + esc(p.name) + '?');
  h += '<div class="progress-wrap"><div class="progress-label"><span>Gesamt (Pflichtangaben)</span><span>' + comp.pct + ' %</span></div><div class="progress"><div style="width:' + comp.pct + '%"></div></div></div>';

  /* Pro Gruppe */
  h += '<div class="card" style="margin-bottom:16px"><h3 style="margin-bottom:12px">Vollständigkeit pro Bereich</h3>';
  for (const gid of p.groups){
    const g = GROUP_BY_ID[gid]; if (!g) continue;
    const c = groupCompleteness(p, gid);
    h += '<div class="row clickable" data-act="nav" data-route="profil"><div class="grow"><div class="title" style="font-size:14.5px">' + esc(g.name) + '</div></div><div style="width:170px">' + miniProgress(c.filled, c.total) + '</div></div>';
  }
  h += '</div>';

  /* Konflikte */
  if (conflicts.length){
    h += '<div class="card" style="border-left:4px solid var(--warn);margin-bottom:16px"><h3 style="margin-bottom:6px">Konflikte zwischen Profil und Dokument</h3>';
    for (const k of conflicts){
      const def = FIELD_DEFS[k.fieldId] || { label:k.fieldId };
      h += '<div class="check-item"><span class="ci-status ci-warn">' + I.alert() + '</span><div class="grow" style="flex:1">' +
        '<div class="title" style="font-weight:600;color:var(--ink)">' + esc(def.label) + '</div>' +
        '<div class="sub" style="font-size:13.5px;color:var(--slate)">' + esc(k.hint) + '</div>' +
        '<div class="sum-block" style="margin:10px 0 0"><div class="sum-item"><span class="l">Im Profil</span><span class="r mono">' + esc(val(p, k.fieldId) || '—') + '</span></div>' +
        '<div class="sum-item"><span class="l">Im Dokument „' + esc(k.docName) + '“</span><span class="r mono">' + esc(k.docValue) + '</span></div></div>' +
        (writable ? '<div class="ci-actions"><button class="btn btn-secondary btn-sm" data-act="conflictKeep" data-id="' + k.id + '">Profilwert behalten</button><button class="btn btn-primary btn-sm" data-act="conflictAdopt" data-id="' + k.id + '">Dokumentwert übernehmen</button></div>' : '') +
        '</div></div>';
    }
    h += '</div>';
  }

  /* Formale Fehler */
  if (invalid.length){
    h += '<div class="card" style="border-left:4px solid var(--err);margin-bottom:16px"><h3 style="margin-bottom:6px">Formal ungültige Angaben</h3>';
    for (const iv of invalid){
      h += '<div class="row"><span class="ci-status ci-err" style="width:30px;height:30px">' + I.alert() + '</span><div class="grow"><div class="title" style="font-size:14.5px">' + esc(iv.def.label) + '</div><div class="sub">' + esc(iv.err) + '</div></div>' +
        (writable ? '<button class="btn btn-secondary btn-sm" data-act="jumpEditField" data-id="' + iv.def.id + '">Korrigieren</button>' : '') + '</div>';
    }
    h += '</div>';
  }

  /* Fehlende Angaben */
  h += '<div class="card" style="margin-bottom:16px"><div class="card-head"><h3>Fehlende Angaben</h3>' + (missing.length ? badge('warn', missing.length + ' offen') : badge('ok', 'Alles vorhanden')) + '</div>';
  if (!missing.length) h += '<p class="meta" style="padding:4px 0">Alle Pflichtangaben der aktiven Bereiche sind hinterlegt.</p>';
  for (const def of missing.slice(0, 12)){
    h += '<div class="row"><div class="grow"><div class="title" style="font-size:14.5px">' + esc(def.label) + '</div><div class="sub">' + esc(def.groupName) + '</div></div>' +
      (writable ? '<button class="btn btn-secondary btn-sm" data-act="jumpEditField" data-id="' + def.id + '">Ergänzen</button>' : '') + '</div>';
  }
  if (missing.length > 12) h += '<p class="kv-meta" style="margin-top:8px">… und ' + (missing.length - 12) + ' weitere im Profil.</p>';
  h += '</div>';

  /* Zu prüfende Angaben */
  h += '<div class="card"><div class="card-head"><h3>Zu prüfende Angaben</h3>' + (review.length ? badge('warn', String(review.length)) : badge('ok', 'Keine')) + '</div>';
  if (!review.length) h += '<p class="meta" style="padding:4px 0">Nichts zu prüfen — alle Werte sind aktuell bestätigt.</p>';
  for (const r of review){
    h += '<div class="row"><div class="grow"><div class="title" style="font-size:14.5px">' + esc(r.def.label) + '</div><div class="sub">' + esc(r.reason) + (r.f.confirmed ? ' · zuletzt bestätigt am ' + r.f.confirmed : r.f.changed ? ' · geändert am ' + r.f.changed : '') + '</div></div>' +
      (writable ? '<button class="btn btn-secondary btn-sm" data-act="fieldConfirm" data-id="' + r.def.id + '">Stimmt noch</button><button class="btn btn-secondary btn-sm" data-act="jumpEditField" data-id="' + r.def.id + '">Ändern</button>' : '') + '</div>';
  }
  h += '</div>';
  h += '<p class="sec-note">' + I.info() + '<span>Zu jeder Angabe speichert FormPilot Datenquelle, letzte Änderung, letzte Bestätigung sowie letzte Verwendung — sichtbar im Profil unter jedem Feld.</span></p>';
  return h;
};

      '<div class="meta">' + esc(p.relation) + ' · ' + esc(roleLabel(p.role)) + ' · ' + docs + ' Dokumente · ' + cases + ' Vorgänge</div></div></div></div>' +

      (p.relation !== 'Ich' ? (p.archived ? '<button class="btn btn-secondary btn-sm" data-act="personUnarchive" data-id="' + p.id + '">Reaktivieren</button>' : '<button class="btn btn-secondary btn-sm" data-act="personArchive" data-id="' + p.id + '">Archivieren</button>') : '') +

    '<p class="sec-note">' + I.info() + '<span>Dokumente, Vorgänge und Freigaben sind immer eindeutig einer Person zugeordnet. Über den Personenwechsel oben links siehst du jeweils nur die Inhalte der aktiven Person.</span></p></div>';

/* ---------- Freigaben (Liste) — Karte verlinkt aufs Detail ---------- */

}
VIEWS.freigaben = function(){
  const mine = S.shares.filter(s => s.personId === S.activePerson);
  const drafts = mine.filter(s => shareStatus(s) === 'entwurf');
  const active = mine.filter(s => shareStatus(s) === 'aktiv');
  const expired = mine.filter(s => shareStatus(s) === 'abgelaufen');
  const revoked = mine.filter(s => shareStatus(s) === 'widerrufen');
  let h = pageHead('send', 'fchip-teal', 'Freigaben', 'Du bestimmst, wer was sieht — nachvollziehbar, versioniert und jederzeit widerrufbar.');
  h += '<div style="display:flex;justify-content:flex-end;margin-bottom:14px"><button class="btn btn-primary btn-sm" data-act="shareNew">' + I.plus() + 'Neue Freigabe</button></div>';
  if (!mine.length) return h + '<div class="card">' + emptyState('send', 'Noch keine Freigabe', 'Freigaben entstehen aus Vorgängen oder direkt hier — in drei Schritten wählst du Inhalte, prüfst Zugriff und bestätigst ausdrücklich.', 'Neue Freigabe', 'shareNew') + '</div>';
  const section = (title, list) => list.length ? '<div class="section"><h3 class="section-title">' + title + ' (' + list.length + ')</h3><div class="cards">' + list.map(shareCard).join('') + '</div></div>' : '';
  if (drafts.length) h += section('Entwürfe', drafts);
  h += '<h3 class="section-title">Aktiv (' + active.length + ')</h3>';
  h += active.length ? '<div class="cards">' + active.map(shareCard).join('') + '</div>' : '<div class="card"><p class="meta">Keine aktive Freigabe — niemand hat gerade Zugriff auf Daten von ' + esc(firstName(P())) + '.</p></div>';
  h += section('Abgelaufen', expired);
  h += section('Widerrufen', revoked);
  h += '<p class="sec-note">' + I.shieldCheck() + '<span>Beta-Hinweis: Der Freigabelink öffnet die Empfängeransicht in dieser Version nur auf diesem Gerät — ein echter, extern erreichbarer Link folgt mit der Server-Version.</span></p>';
  return h;
};

/* ---------- Mitteilungen ---------- */
VIEWS.mitteilungen = function(){
  const unread = S.notifications.filter(n => !n.read), read = S.notifications.filter(n => n.read);
  let h = pageHead('bell', 'fchip-info', 'Mitteilungen', 'Anfragen, Fristen, Ablaufdaten und Zugriffe — alles Wichtige an einem Ort.');
  h += '<div style="display:flex;justify-content:flex-end;margin-bottom:12px">' + (unread.length ? '<button class="btn btn-secondary btn-sm" data-act="notifAllRead">Alle als gelesen markieren</button>' : '') + '</div>';
  if (!S.notifications.length) return h + '<div class="card">' + emptyState('bell', 'Keine Mitteilungen', 'Hier erscheinen neue Anfragen, näherrückende Fristen, ablaufende Dokumente und Zugriffe auf deine Freigaben.', '', '') + '</div>';
  const section = (title, list, unreadStyle) => {
    if (!list.length) return '';
    return '<h3 class="section-title">' + title + '</h3><div class="card" style="padding-top:6px;padding-bottom:6px;margin-bottom:24px">' +
      list.map(n => {
        const meta = NOTIF_META[n.type] || NOTIF_META.anfrage;
        return '<div class="row clickable' + (unreadStyle ? ' unread' : '') + '" data-act="openNotif" data-id="' + n.id + '"><span class="fchip ' + meta.chip + '">' + I[meta.icon]() + '</span>' +
          '<div class="grow"><div class="sub" style="font-size:14px;color:var(--body);' + (unreadStyle ? 'font-weight:600;color:var(--ink)' : '') + '">' + esc(n.text) + '</div><div class="sub">' + n.date + '</div></div>' +
          (n.route ? I.chevron(16) : '') + '</div>';
      }).join('') + '</div>';
  };
  h += section('Neu (' + unread.length + ')', unread, true);
  h += section('Früher', read.slice(0, 30), false);
  h += '<p class="sec-note">' + I.settings() + '<span>Welche Mitteilungen du bekommst, steuerst du unter <button class="link-btn" data-act="nav" data-route="einstellungen">Einstellungen → Benachrichtigungen</button>.</span></p>';
  return h;
};

/* ---------- Suche ---------- */
function searchResults(){
  const q = (S.ui.q || '').trim().toLowerCase();
  const fPerson = S.ui.fPerson || '', fCat = S.ui.fCat || '', fStatus = S.ui.fStatus || '', fAblauf = S.ui.fAblauf || '';
  const filtersActive = fPerson || fCat || fStatus || fAblauf;
  if (q.length < 2 && !filtersActive) return '<div class="card">' + emptyState('search', 'Wonach suchst du?', 'Suche nach Dokumentnamen, Kategorien, Personen, Vorgängen, Empfängern oder Aktenzeichen — oder nutze die Filter.', '', '') + '</div>';
  const match = t => !q || String(t || '').toLowerCase().includes(q);
  const inAblauf = d => {
    if (!fAblauf) return true;
    if (!d.validUntil) return false;
    const n = daysUntil(d.validUntil);
    if (n === null) return false;
    if (fAblauf === 'abgelaufen') return n < 0;
    return n >= 0 && n <= +fAblauf;
  };
  let docs = S.documents.filter(d => !d.trash &&
    (match(d.name) || match(d.cat) || match(personName(d.personId))) &&
    (!fPerson || d.personId === fPerson) && (!fCat || d.cat === fCat) &&
    (!fStatus || docStatus(d) === fStatus) && inAblauf(d));
  let cases = S.cases.filter(c =>
    (match(c.title) || match(c.recipient) || match(c.az) || match(c.purpose) || match(personName(c.personId))) &&
    (!fPerson || c.personId === fPerson) && (!fStatus || caseStatus(c) === fStatus) && !fCat && !fAblauf);
  let persons = S.persons.filter(p => q && (match(p.name) || match(p.relation)) && !fCat && !fStatus && !fAblauf);
  let shares = S.shares.filter(s => q && match(s.recipient) && (!fPerson || s.personId === fPerson) && !fCat && !fStatus && !fAblauf);
  if (!docs.length && !cases.length && !persons.length && !shares.length)
    return '<div class="card">' + emptyState('search', 'Keine Treffer', 'Prüfe die Schreibweise oder setze die Filter zurück.', '', '') + '</div>';
  let h = '';
  if (docs.length){
    h += '<div class="result-group"><h3>Dokumente (' + docs.length + ')</h3><div class="card" style="padding-top:6px;padding-bottom:6px">' +
      docs.slice(0, 20).map(d => '<div class="row clickable" data-act="nav" data-route="dokument?id=' + d.id + '"><span class="doc-icon">' + esc(d.ext) + '</span><div class="grow"><div class="title">' + esc(d.name) + '</div><div class="sub">' + esc(personName(d.personId)) + ' · ' + esc(d.cat) + '</div></div>' + docBadge(d) + '</div>').join('') + '</div></div>';
  }
  if (cases.length){
    h += '<div class="result-group"><h3>Vorgänge (' + cases.length + ')</h3><div class="card" style="padding-top:6px;padding-bottom:6px">' +
      cases.slice(0, 20).map(c => '<div class="row clickable" data-act="openCaseFromSearch" data-id="' + c.id + '"><span class="fchip fchip-info">' + I.clipboard() + '</span><div class="grow"><div class="title">' + esc(c.title) + '</div><div class="sub">' + esc(personName(c.personId)) + ' · ' + esc(c.recipient) + (c.az ? ' · Az. ' + esc(c.az) : '') + '</div></div>' + caseBadge(c) + '</div>').join('') + '</div></div>';
  }
  if (persons.length){
    h += '<div class="result-group"><h3>Personen (' + persons.length + ')</h3><div class="card" style="padding-top:6px;padding-bottom:6px">' +
      persons.map(p => '<div class="row clickable" data-act="nav" data-route="personen"><span class="avatar" style="width:36px;height:36px;font-size:13px">' + esc(initials(p.name)) + '</span><div class="grow"><div class="title">' + esc(p.name) + '</div><div class="sub">' + esc(p.relation) + (p.archived ? ' · archiviert' : '') + '</div></div>' + I.chevron(16) + '</div>').join('') + '</div></div>';
  }
  if (shares.length){
    h += '<div class="result-group"><h3>Freigaben (' + shares.length + ')</h3><div class="card" style="padding-top:6px;padding-bottom:6px">' +
      shares.map(s => '<div class="row clickable" data-act="openShareFromSearch" data-id="' + s.id + '"><span class="fchip fchip-teal">' + I.send() + '</span><div class="grow"><div class="title">' + esc(s.recipient) + '</div><div class="sub">' + esc(personName(s.personId)) + ' · erstellt am ' + s.created + '</div></div>' + shareBadge(s) + '</div>').join('') + '</div></div>';
  }
  return h;
}

  const docStati = ['Vollständig','Prüfen','Läuft bald ab','Abgelaufen','Archiviert'];

  let h = pageHead('search', 'fchip-marine', 'Suche', 'Findet Dokumente, Vorgänge, Personen, Empfänger und Aktenzeichen — über alle Personen hinweg.');
  h += '<div class="search-bar">' + I.search() + '<input type="text" id="search-input" placeholder="z. B. Immatrikulation, AOK, PK-2026 …" value="' + esc(S.ui.q || '') + '" autocomplete="off" aria-label="Suchbegriff"></div>';
  h += '<div class="filter-row">' +
    '<select id="f-person" aria-label="Nach Person filtern"><option value="">Alle Personen</option>' + S.persons.map(p => '<option value="' + p.id + '"' + (S.ui.fPerson === p.id ? ' selected' : '') + '>' + esc(p.name) + '</option>').join('') + '</select>' +
    '<select id="f-cat" aria-label="Nach Kategorie filtern"><option value="">Alle Kategorien</option>' + DOC_CATS.map(c => '<option' + (S.ui.fCat === c ? ' selected' : '') + '>' + esc(c) + '</option>').join('') + '</select>' +
    '<select id="f-status" aria-label="Nach Status filtern"><option value="">Jeder Status</option><optgroup label="Dokumente">' + docStati.map(s => '<option' + (S.ui.fStatus === s ? ' selected' : '') + '>' + s + '</option>').join('') + '</optgroup><optgroup label="Vorgänge">' + caseStati.map(s => '<option' + (S.ui.fStatus === s ? ' selected' : '') + '>' + s + '</option>').join('') + '</optgroup></select>' +
    '<select id="f-ablauf" aria-label="Nach Ablaufdatum filtern"><option value="">Ablauf: egal</option><option value="30"' + (S.ui.fAblauf === '30' ? ' selected' : '') + '>läuft in 30 Tagen ab</option><option value="90"' + (S.ui.fAblauf === '90' ? ' selected' : '') + '>läuft in 90 Tagen ab</option><option value="abgelaufen"' + (S.ui.fAblauf === 'abgelaufen' ? ' selected' : '') + '>bereits abgelaufen</option></select>' +

  h += '<div id="search-results">' + searchResults() + '</div>';

};

  let h = pageHead('shield', 'fchip-err', 'Sicherheit', 'Geräte, Anmeldung und Aktivitätsprotokoll.');
  h += '<div class="info-banner" style="margin-bottom:20px">' + I.info() + '<span><b>Beta-Hinweis:</b> Diese Version läuft ohne Konto und ohne Server — alle Daten liegen unverschlüsselt im lokalen Speicher dieses Browsers. Anmeldung und Zwei-Faktor-Schutz sind als Vorschau simuliert.</span></div>';
  h += '<div class="card" style="margin-bottom:16px"><h3 style="margin-bottom:6px">Angemeldete Geräte</h3>';

/* ---------- Datenschutz & Einwilligungen ---------- */
function consentRow(def){
  const given = consentGiven(def.id), rec = consentRecord(def.id);
  const outdated = rec && rec.acceptedAt && rec.version !== def.version;

/* ---------- Datei-Helfer ---------- */
function dlBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 4000);
}
function readWithProgress(file, onPct){
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onprogress = e => { if (e.lengthComputable && onPct) onPct(Math.round(e.loaded / e.total * 100)); };
    r.onload = () => res(r.result);
    r.onerror = () => rej(r.error);
    r.readAsArrayBuffer(file);
  });
}
function magicOk(ext, b){
  if (ext === 'PDF') return b[0] === 0x25 && b[1] === 0x50 && b[2] === 0x44 && b[3] === 0x46;
  if (ext === 'JPG') return b[0] === 0xFF && b[1] === 0xD8 && b[2] === 0xFF;
  if (ext === 'PNG') return b[0] === 0x89 && b[1] === 0x50 && b[2] === 0x4E && b[3] === 0x47;
  if (ext === 'HEIC') return b[4] === 0x66 && b[5] === 0x74 && b[6] === 0x79 && b[7] === 0x70; /* 'ftyp' */
  return false;
}
function extMime(ext){ return { PDF:'application/pdf', JPG:'image/jpeg', PNG:'image/png', HEIC:'image/heic' }[ext] || 'application/octet-stream'; }

/* ---------- Upload-Engine ---------- */
function paintUploads(){
  const el = $('#upload-list');
  if (!el || !S.ui.uploads) return;
  el.innerHTML = S.ui.uploads.map(u =>
    '<div class="upload-item"><div class="ui-top"><span style="overflow-wrap:anywhere">' + esc(u.name) + '</span><span class="st">' +
    (u.status === 'fehler' ? '<b style="color:var(--err)">Fehler</b>' : u.status === 'fertig' ? '<b style="color:var(--ok)">Fertig</b>' : u.status === 'lädt' ? u.pct + ' %' : 'Wartet …') + '</span></div>' +
    (u.status === 'fehler' ? '<div class="error-text">' + esc(u.err) + '</div>' : '<div class="progress"><div style="width:' + (u.status === 'fertig' ? 100 : u.pct) + '%"></div></div>') +
    '</div>').join('');
}
async function handleFiles(fileList, ctxOverride){
  const ctx = ctxOverride || S.ui.uploadCtx || { kind:'safe' };
  S.ui.uploadCtx = null;
  const person = ctx.personId ? personById(ctx.personId) : P();
  if (!person){ toast('Lege zuerst eine Person an.'); return; }
  if (!canWrite(person)){ toast('Für dieses Profil hast du nur Leserechte.'); return; }
  let list = Array.from(fileList || []);
  if (!list.length) return;
  if (ctx.kind === 'version') list = list.slice(0, 1);
  S.ui.uploads = list.map(f => ({ name:f.name, size:f.size, pct:0, status:'wartet', err:'' }));
  openModal({ title:'Dokumente hochladen', body:'<div id="upload-list"></div>', cancelLabel:'Schließen' });
  paintUploads();
  const created = [];
  for (let i = 0; i < list.length; i++){
    const f = list[i], u = S.ui.uploads[i];
    u.status = 'lädt'; paintUploads();
    const extM = /\.([a-z0-9]+)$/i.exec(f.name);
    const ext = extM ? extM[1].toUpperCase().replace('JPEG','JPG') : '';
    if (!['PDF','JPG','PNG','HEIC'].includes(ext)){ u.status = 'fehler'; u.err = 'Dateityp nicht unterstützt — erlaubt sind PDF, JPG, PNG und HEIC.'; paintUploads(); continue; }
    if (f.size > 10 * 1024 * 1024){ u.status = 'fehler'; u.err = 'Zu groß (' + fmtSize(f.size) + ') — das Limit liegt bei 10 MB je Datei.'; paintUploads(); continue; }
    if (!f.size){ u.status = 'fehler'; u.err = 'Die Datei ist leer und kann nicht gespeichert werden.'; paintUploads(); continue; }
    try {
      const buf = await readWithProgress(f, pct => { u.pct = pct; paintUploads(); });
      if (!magicOk(ext, new Uint8Array(buf.slice(0, 16)))){ u.status = 'fehler'; u.err = 'Der Inhalt passt nicht zum Dateityp — die Datei scheint beschädigt zu sein.'; paintUploads(); continue; }
      const blob = new Blob([buf], { type:f.type || extMime(ext) });
      const vid = uid('v');
      await idb.put(vid, blob);
      const base = f.name.replace(/\.[a-z0-9]+$/i, '').replace(/[_]+/g, ' ').trim() || 'Dokument';
      if (ctx.kind === 'version'){
        const d = docById(ctx.docId);
        if (d){
          d.versions.push({ id:vid, name:d.name, ext, size:blob.size, added:today(), note:'' });
          d.ext = ext; d.review = false;
          addLog('Neue Version von „' + d.name + '“ hochgeladen.');
          created.push(d);
        }
      } else {
        const name = ctx.kind === 'camera' ? 'Foto vom ' + today() : base;
        const doc = mkDoc({ personId:person.id, name, cat:ctx.cat || guessCat(f.name), ext });
        const cv = docCurrentVersion(doc);
        cv.id = vid; cv.name = name; cv.ext = ext; cv.size = blob.size;
        S.documents.push(doc);
        if (ctx.kind === 'caseDoc'){
          const c = caseById(ctx.caseId);
          if (c && c.docs[ctx.idx]){
            c.docs[ctx.idx].docId = doc.id;
            doc.cat = c.docs[ctx.idx].cat || doc.cat;
            doc.name = c.docs[ctx.idx].label || doc.name;
            c.history.push({ date:today(), text:'Dokument „' + doc.name + '“ hochgeladen und verknüpft.' });
          }
        }
        if (ctx.kind === 'reqItem' && S.requestDraft){
          const it = S.requestDraft.items.find(x => x.key === ctx.itemKey);
          if (it){
            it.docId = doc.id;
            doc.name = it.label || doc.name;
            doc.cat = it.cat || doc.cat;
          }
        }
        addLog('Dokument „' + doc.name + '“ hochgeladen (' + person.name + ').');
        created.push(doc);
      }
      u.status = 'fertig'; u.pct = 100;
    } catch(err){
      u.status = 'fehler'; u.err = 'Lesen oder Speichern fehlgeschlagen — bitte erneut versuchen.';
    }
    paintUploads();
  }
  save();
  const ok = S.ui.uploads.filter(u => u.status === 'fertig').length;
  const failed = S.ui.uploads.length - ok;
  const doneCtx = { kind:ctx.kind, caseId:ctx.caseId, back:ctx.back || '', docId:(created[0] ? created[0].id : ''), count:ok };
  openModal({
    title:'Upload abgeschlossen',
    body:'<div id="upload-list"></div><p style="margin-top:14px;font-size:14px">' +
      (ok ? '<b>' + ok + ' Datei' + (ok === 1 ? '' : 'en') + ' gespeichert.</b> Name, Kategorie und Gültigkeitsdatum kannst du jederzeit im Dokument anpassen.' : '') +
      (failed ? (ok ? '<br>' : '') + '<b style="color:var(--err)">' + failed + ' Datei' + (failed === 1 ? '' : 'en') + ' fehlgeschlagen</b> — Details oben.' : '') + '</p>',
    cancelLabel:'Schließen',
    confirmLabel: ok ? (ctx.kind === 'reqItem' || ctx.back === 'anforderung' ? 'Zur Anforderung' : ctx.kind === 'caseDoc' ? 'Zum Vorgang' : ctx.kind === 'onboarding' ? 'Weiter' : 'Ansehen') : '',
    onConfirm(){
      if (doneCtx.kind === 'reqItem' || doneCtx.back === 'anforderung') go('anforderung');
      else if (doneCtx.back) go(doneCtx.back);
      else if (doneCtx.kind === 'caseDoc') go('vorgang?id=' + doneCtx.caseId);
      else if (doneCtx.kind === 'onboarding'){ S.onboarding.step = 5; go('onboarding'); }
      else if (doneCtx.count === 1 && doneCtx.docId) go('dokument?id=' + doneCtx.docId);
      else { S.ui.docFilter = 'Alle'; go('safe'); }
    }
  });
  paintUploads();
  if (ctx.kind === 'onboarding' && ok){ S.onboarding.step = 5; save(); }
  render();
}

  /* Freigabe aus Vorgang */

  /* Dokumente */
  docFilter(el){ S.ui.docFilter = el.getAttribute('data-id'); render(); },
  async docPreview(el){
    const d = docById(el.getAttribute('data-id') || S.ui.docId); if (!d) return;
    const cv = docCurrentVersion(d);
    let blob = null;
    try { blob = await idb.get(cv.id); } catch(e){}
    if (!blob){ openModal({ title:'Vorschau', body:'<p>Für dieses Dokument ist keine Datei gespeichert' + (S.mode === 'demo' ? ' (Demo-Dokument)' : '') + '.</p>' }); return; }
    if (d.ext === 'HEIC'){ openModal({ title:esc(d.name), body:'<p>HEIC-Fotos können Browser nicht anzeigen. Lade die Datei herunter, um sie zu öffnen — oder lade beim nächsten Mal ein JPG hoch.</p>' }); return; }
    const url = URL.createObjectURL(blob);
    const inner = d.ext === 'PDF'
      ? '<embed src="' + url + '" type="application/pdf" data-objurl="1" aria-label="PDF-Vorschau">'
      : '<img src="' + url + '" alt="Vorschau von ' + esc(d.name) + '" data-objurl="1">';
    openModal({ large:true, title:esc(d.name), body:'<div class="preview-box">' + inner + '</div>' });
  },
  async docDownload(el){
    const d = docById(el.getAttribute('data-id') || S.ui.docId); if (!d) return;
    const cv = docCurrentVersion(d);
    let blob = null;
    try { blob = await idb.get(cv.id); } catch(e){}
    if (!blob){ toast('Keine Datei gespeichert — Vorschau und Download sind für dieses Dokument nicht verfügbar.'); return; }
    dlBlob(blob, d.name.replace(/[\\/:*?"<>|]/g, '-') + '.' + d.ext.toLowerCase());
    addLog('Dokument „' + d.name + '“ heruntergeladen.');
    save();
  },
  async versionDownload(el){
    const d = docById(el.getAttribute('data-doc')); if (!d) return;
    const v = d.versions.find(x => x.id === el.getAttribute('data-id')); if (!v) return;
    let blob = null;
    try { blob = await idb.get(v.id); } catch(e){}
    if (!blob){ toast('Für diese Version ist keine Datei gespeichert.'); return; }
    dlBlob(blob, (v.name || d.name).replace(/[\\/:*?"<>|]/g, '-') + '.' + v.ext.toLowerCase());
  },

  docArchive(){ const d = docById(S.ui.docId); if (!d) return; d.archived = true; addLog('Dokument „' + d.name + '“ archiviert.'); toast('Archiviert — zu finden unter Safe → Archiv.'); render(); },

      (linked.length ? '<br><br><b>Hinweis:</b> Das Dokument ist mit ' + (linked.length === 1 ? 'einem Vorgang' : linked.length + ' Vorgängen') + ' verknüpft — dort gilt es dann als fehlend.' : ''),

  docPurge(){

        location.hash = '#/safe';
      }});

  docLinkCase(){
    const d = docById(S.ui.docId); if (!d) return;
    const cases = S.cases.filter(c => c.personId === d.personId && !['Erledigt','Abgelehnt','Archiviert'].includes(caseStatus(c)));
    if (!cases.length){ toast('Kein laufender Vorgang für ' + personName(d.personId) + ' — lege zuerst einen an.'); return; }
    openModal({ title:'Mit Vorgang verknüpfen', body:
      '<p style="margin-bottom:8px">In welchem Vorgang wird „' + esc(d.name) + '“ gebraucht?</p>' +

      confirmLabel:'Verknüpfen', onConfirm(){

        const open = c.docs.find(r => !r.docId && (r.cat === d.cat || r.label.toLowerCase().includes(d.name.toLowerCase().split(' ')[0])));

        else c.docs.push({ label:d.name, cat:d.cat, docId:d.id });

  /* Eigene Felder */
  customAdd(){ FP._customModal(null); },
  customEdit(el){ const p = P(); FP._customModal(p.custom.find(c => c.id === el.getAttribute('data-id'))); },
  _customModal(cf){
    const isNew = !cf;
    openModal({ title:isNew ? 'Eigenes Feld hinzufügen' : 'Eigenes Feld bearbeiten', body:
      '<div class="field"><label for="cfm-label">Bezeichnung</label><input type="text" id="cfm-label" value="' + esc(cf ? cf.label : '') + '" placeholder="z. B. Mitgliedsnummer Sportverein"></div>' +
      '<div class="field"><label for="cfm-type">Typ</label><select id="cfm-type">' +
      [['text','Text'],['number','Nummer oder Kennung'],['date','Datum']].map(t => '<option value="' + t[0] + '"' + (cf && cf.type === t[0] ? ' selected' : '') + '>' + t[1] + '</option>').join('') + '</select></div>' +
      '<div class="field"><label for="cfm-value">Wert</label><input type="text" id="cfm-value" value="' + esc(cf ? cf.v : '') + '"></div>' +
      '<label class="check-line"><input type="checkbox" id="cfm-sens"' + (cf && cf.sens ? ' checked' : '') + '><span>Sensibel — Wert maskiert anzeigen</span></label>' +
      '<div class="field" style="margin-top:14px"><label for="cfm-bis">Gültig bis (optional)</label><input type="text" id="cfm-bis" placeholder="TT.MM.JJJJ" value="' + esc(cf ? cf.bis : '') + '" inputmode="numeric"></div>' +
      '<label class="check-line"><input type="checkbox" id="cfm-reminder"' + (cf && cf.reminder ? ' checked' : '') + '><span>Erinnerung vor Ablauf (30 Tage vorher)</span></label>' +
      '<div id="cfm-error"></div>' +
      (!isNew ? '<div class="edit-actions" style="margin-top:16px"><button class="link-btn" data-act="customArchive" data-id="' + cf.id + '">' + (cf.archived ? 'Reaktivieren' : 'Archivieren') + '</button><button class="link-btn danger" data-act="customDelete" data-id="' + cf.id + '">Löschen</button></div>' : ''),
      confirmLabel:'Speichern', onConfirm(){
        const label = $('#cfm-label').value.trim(), type = $('#cfm-type').value, v = $('#cfm-value').value.trim(), bis = $('#cfm-bis').value.trim();
        const errs = [];
        if (!label) errs.push('Bitte eine Bezeichnung eingeben.');
        if (type === 'date' && v){ const e = vDate(v); if (e) errs.push('Wert: ' + e); }
        if (bis){ const e = vDate(bis); if (e) errs.push('Gültig bis: ' + e); }
        if (errs.length){ $('#cfm-error').innerHTML = '<div class="error-text">' + errs.map(esc).join('<br>') + '</div>'; return false; }
        const p = P();
        if (isNew) p.custom.push({ id:uid('cf'), label, type, sens:$('#cfm-sens').checked, v, bis, reminder:$('#cfm-reminder').checked, archived:false, changed:today(), source:'Manuell erfasst' });
        else Object.assign(cf, { label, type, sens:$('#cfm-sens').checked, v, bis, reminder:$('#cfm-reminder').checked, changed:today() });
        toast(isNew ? 'Eigenes Feld angelegt.' : 'Gespeichert.');
      }});
  },
  customArchive(el){
    const p = P(), cf = p.custom.find(c => c.id === el.getAttribute('data-id'));
    if (cf){ cf.archived = !cf.archived; toast(cf.archived ? 'Feld archiviert.' : 'Feld reaktiviert.'); }
    closeModal(); render();
  },

    if (!cf) return;

  },
  customReveal(el){

    S.ui.reveal = S.ui.reveal || {};
    S.ui.reveal[key] = !S.ui.reveal[key];
    render();
  },
  customShowArchived(){

   ERKENNUNGS-ARCHITEKTUR — Anforderung → geprüfter Vorgang

   RequestInputService            nimmt Eingaben entgegen (Text, PDF, Bild/Foto,
                                  strukturierte Anfrage, manuell) und normalisiert
                                  sie zu einem RequestInput.
   RequestParser                  RequestInput → ParsedRequest (Eckdaten + Positionen,
                                  mit Konfidenz-Kennzeichnung je Eckdatum).

                                  Datenschutzhinweise („für diesen Zweck ungewöhnlich“).
   RequirementExplanationService  erklärt Fachbegriffe und wo eine Angabe zu finden ist.

   Alle Parse-Methoden sind async, damit eine spätere serverseitige
   Implementierung dieselbe Schnittstelle bedienen kann. Die aktuelle
   Engine arbeitet regel- und katalogbasiert, vollständig lokal —
   das wird in der Oberfläche offen so benannt. Keine externe KI/API.
============================================================ */

   Erwartetes JSON:
   { "version":"formpilot-request/v1", "organisation":"…", "absender":"…",
     "ansprechpartner":"…", "zweck":"…", "frist":"TT.MM.JJJJ", "aktenzeichen":"…",
     "vorgangsnummer":"…", "typ":"arbeitgeber|bewerbung|…",
     "angaben":[ "steuerid", { "id":"iban", "optional":true } ],

/* ---------- PDF-Textextraktion (lokal, ohne Fremdbibliothek) ---------- */
function latin1(bytes){
  let s = '';
  for (let i = 0; i < bytes.length; i += 65536) s += String.fromCharCode.apply(null, bytes.subarray(i, Math.min(i + 65536, bytes.length)));
  return s;
}
function pdfInflate(bytes){
  if (typeof DecompressionStream === 'undefined') return Promise.reject(new Error('DecompressionStream fehlt'));
  const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('deflate'));
  return new Response(stream).arrayBuffer().then(b => new Uint8Array(b));
}
function decPdfStr(s){
  return s.replace(/\\(\d{1,3})/g, (m, o) => String.fromCharCode(parseInt(o, 8)))
    .replace(/\\n/g, '\n').replace(/\\r/g, '').replace(/\\t/g, ' ')
    .replace(/\\([\\()])/g, '$1');
}
function pdfTextOps(content){
  const lines = [];
  const re = /\(((?:\\.|[^\\()])*)\)\s*Tj|\[((?:\\.|[^\]])*)\]\s*TJ/g;
  let m;
  while ((m = re.exec(content))){
    if (m[1] !== undefined) lines.push(decPdfStr(m[1]));
    else {
      let s = '', m2;
      const re2 = /\(((?:\\.|[^\\()])*)\)/g;
      while ((m2 = re2.exec(m[2]))) s += decPdfStr(m2[1]);
      lines.push(s);
    }
  }
  return lines.filter(l => l.trim()).join('\n');
}
async function pdfExtractText(buf){
  try {
    const bytes = new Uint8Array(buf);
    const raw = latin1(bytes);
    const parts = [];
    const streamRe = /<<((?:[^<>]|<<[^]*?>>)*?)>>\s*stream\r?\n/g;
    let m;
    while ((m = streamRe.exec(raw))){
      const dict = m[1];
      const start = m.index + m[0].length;
      const end = raw.indexOf('endstream', start);
      if (end < 0) continue;
      let dlen = end - start;
      while (dlen > 0 && (bytes[start + dlen - 1] === 0x0a || bytes[start + dlen - 1] === 0x0d)) dlen--;
      const data = bytes.subarray(start, start + dlen);
      let content = '';
      if (/\/FlateDecode/.test(dict)){
        try { content = latin1(await pdfInflate(data)); } catch(e){ continue; }
      } else if (!/\/(DCTDecode|CCITTFaxDecode|JPXDecode|JBIG2Decode)/.test(dict)){
        content = latin1(data);
      } else continue;
      if (/\b(Tj|TJ)\b/.test(content)) parts.push(pdfTextOps(content));
    }
    return parts.join('\n').replace(/[ \t]+\n/g, '\n').trim();
  } catch(e){ return ''; }
}

/* ---------- RequestParser (Text → Eckdaten + Positionen) ---------- */
function classifyPurpose(text){
  const x = text.toLowerCase();
  const rules = [
    ['bewerbung', /bewerbung|stellenangebot|ihre unterlagen zur stelle/],
    ['miete', /mietbewerbung|wohnung|vermietung|mietinteresse|besichtigungstermin/],
    ['studium', /immatrikulation|einschreibung|rückmeldung|semesterbeitrag|studienplatz/],
    ['pflege', /pflegekasse|pflegegrad|höherstufung/],
    ['versicherung', /versicherungsfall|schaden(?:s)?(?:meldung|nummer)|leistungsantrag/],
    ['behoerde', /finanzamt|bürgeramt|behörde|\bamt\b|bescheid|antrag auf/],
    ['arbeitgeber', /vertragsbeginn|arbeitsvertrag|werkstudentenvertrag|einstellung|onboarding|personalabteilung|gehaltszahlung/]
  ];
  for (const [id, re] of rules) if (re.test(x)) return id;
  return 'frei';
}
function parseMetaFromText(text, person){
  const pad2 = n => String(n).padStart(2, '0');
  const meta = { organisation:'', absender:'', ansprechpartner:'', zweck:'', frist:'', az:'', vorgangsnr:'', typ:classifyPurpose(text), personId:'', conf:{} };
  const betr = /betreff:?\s*([^\n]{3,120})/i.exec(text);
  if (betr) meta.zweck = betr[1].trim();
  else {
    const t = tplById(meta.typ);
    if (t && t.purpose){ meta.zweck = t.purpose; meta.conf.zweck = 'unsicher'; }
  }
  /* Absender & Organisation aus dem Signaturblock */
  const legal = /(gmbh|\bag\b|\bse\b|\bkg\b|e\. ?v\.|mbh|kasse|amt\b|versicherung|universität|hochschule|bank|gbr|stadt\s|gemeinde|vermietung|verwaltung)/i;
  const sig = /(?:mit freundlichen|freundliche|viele|beste) gr(?:ü|ue)(?:ß|ss)?e?n?|hochachtungsvoll/i.exec(text);
  if (sig){
    const after = text.slice(sig.index).split('\n').slice(1).map(s => s.trim()).filter(Boolean).slice(0, 4);
    if (after.length){
      const orgLine = after.find(l => legal.test(l));
      if (orgLine) meta.organisation = orgLine.replace(/[,;.]$/, '');
      else { meta.organisation = after[after.length - 1].replace(/[,;.]$/, ''); meta.conf.organisation = 'unsicher'; }
      const absLine = after.find(l => l.replace(/[,;.]$/, '') !== meta.organisation);
      if (absLine) meta.absender = absLine.replace(/[,;.]$/, '');
    }
  }
  if (!meta.organisation){
    const head = text.split('\n').slice(0, 3).map(s => s.trim()).find(l => legal.test(l));
    if (head){ meta.organisation = head; meta.conf.organisation = 'unsicher'; }
  }
  /* Ansprechpartner — der eigene Name (Anrede im Brief) zählt nicht */
  const lastName = person ? (val(person, 'nachname') || person.name.split(' ').pop() || '') : '';
  const ap = /ansprechpartner(?:in)?(?:\s+ist)?[:\s]+((?:frau|herrn?)\s+)?([A-ZÄÖÜ][a-zäöüß\-]+(?:\s[A-ZÄÖÜ][a-zäöüß\-]+)?)/i.exec(text);
  if (ap) meta.ansprechpartner = (((ap[1] || '').replace(/^herrn/i, 'Herr').trim() + ' ' + ap[2]).trim());
  else {
    const re = /\b(frau|herrn?)\s+([A-ZÄÖÜ][a-zäöüß\-]+)\b/gi;
    let mm;
    while ((mm = re.exec(text))){
      if (lastName && mm[2].toLowerCase() === lastName.toLowerCase()) continue;
      meta.ansprechpartner = (mm[1][0].toUpperCase() + mm[1].slice(1).toLowerCase()).replace(/^Herrn$/, 'Herr') + ' ' + mm[2];
      meta.conf.ansprechpartner = 'unsicher';
      break;
    }
  }
  /* Frist */
  const f1 = /bis\s+(?:zum\s+|spätestens\s+(?:zum\s+)?)?(\d{1,2})\.(\d{1,2})\.(\d{4})/i.exec(text);
  if (f1) meta.frist = pad2(f1[1]) + '.' + pad2(f1[2]) + '.' + f1[3];
  else {
    const f2 = /innerhalb von (\d{1,3}) tagen/i.exec(text);
    if (f2){ meta.frist = addDays(+f2[1]); meta.conf.frist = 'unsicher'; }
  }
  /* Aktenzeichen & Vorgangsnummer */
  const az = /aktenzeichen[:\s]+([A-Za-z0-9ÄÖÜäöü\-\/\.]{3,25})/i.exec(text);
  if (az) meta.az = az[1].replace(/[.,;)]+$/, '');
  const vn = /(?:vorgangs|kunden|buchungs|antrags|referenz)(?:nummer|nr\.?)[:\s]*\(?\s*([A-Za-z0-9\-\/]{3,25})/i.exec(text);
  if (vn) meta.vorgangsnr = vn[1].replace(/[.,;)]+$/, '');
  return meta;
}
function mkReqItem(o){
  return Object.assign({ key:uid('ri'), kind:'field', fid:'', label:'', cat:'', docId:'', required:true, sensitive:false, unusual:'', userUnusual:false, confidence:'sicher', included:true }, o);
}
function parseItemsFromText(text){
  const items = [];
  const lines = text.split('\n');
  const optRe = /optional|falls vorhanden|sofern vorhanden|freiwillig|kann nachgereicht|nicht zwingend/i;
  for (const entry of REQ_CATALOG){
    if (!entry.re.test(text)) continue;
    const line = lines.find(l => entry.re.test(l)) || '';
    const optional = optRe.test(line);
    if (entry.fields) for (const fid of entry.fields){
      if (items.some(i => i.kind === 'field' && i.fid === fid)) continue;
      const def = FIELD_DEFS[fid] || {};
      items.push(mkReqItem({ kind:'field', fid, required:!optional, sensitive:!!def.sens }));
    }
    if (entry.docs) for (const d of entry.docs){
      if (items.some(i => i.kind === 'doc' && i.label === d.label)) continue;
      items.push(mkReqItem({ kind:'doc', label:d.label, cat:d.cat, required:!optional, sensitive:SENSITIVE_DOCS.includes(d.label) }));
    }
  }
  return items;
}
function structuredToText(o){
  const rows = ['Strukturierte Anfrage (' + STRUCTURED_REQUEST_VERSION + ')'];
  if (o.organisation) rows.push('Organisation: ' + o.organisation);
  if (o.zweck) rows.push('Zweck: ' + o.zweck);
  if (o.frist) rows.push('Frist: ' + o.frist);
  if (o.aktenzeichen) rows.push('Aktenzeichen: ' + o.aktenzeichen);
  if (o.vorgangsnummer) rows.push('Vorgangsnummer: ' + o.vorgangsnummer);
  const ang = (o.angaben || []).map(f => typeof f === 'string' ? f : f.id + (f.optional ? ' (optional)' : ''));
  if (ang.length) rows.push('Angefragte Angaben: ' + ang.join(', '));
  const dok = (o.dokumente || []).map(d => d.label + (d.optional ? ' (optional)' : ''));
  if (dok.length) rows.push('Angefragte Dokumente: ' + dok.join(', '));
  return rows.join('\n');
}
const RequestInputService = {
  engine:ENGINE_INFO,
  async fromText(text){
    const t = (text || '').trim();
    if (t.startsWith('{')){
      try {
        const obj = JSON.parse(t);
        if (obj && obj.version === STRUCTURED_REQUEST_VERSION) return this.fromStructured(obj);
      } catch(e){ /* kein gültiges JSON → als Freitext behandeln */ }
    }
    return { source:'text', rawText:t, structured:null };
  },
  fromStructured(obj){ return { source:'strukturiert', rawText:structuredToText(obj), structured:obj }; },
  manual(){ return { source:'manuell', rawText:'', structured:null }; }
};
const RequestParser = {
  engine:ENGINE_INFO,
  async parse(input, person){
    if (input.structured) return this._fromStructured(input.structured);
    const meta = parseMetaFromText(input.rawText || '', person);
    const items = parseItemsFromText(input.rawText || '');
    return { meta, items };
  },
  _fromStructured(o){
    const meta = { organisation:o.organisation || '', absender:o.absender || o.organisation || '', ansprechpartner:o.ansprechpartner || '',
      zweck:o.zweck || '', frist:o.frist || '', az:o.aktenzeichen || '', vorgangsnr:o.vorgangsnummer || '',
      typ:(o.typ && tplById(o.typ)) ? o.typ : 'frei', personId:'', conf:{} };
    const items = [];
    for (const f of (o.angaben || [])){
      const fid = typeof f === 'string' ? f : (f && f.id);
      if (!FIELD_DEFS[fid]) continue;
      items.push(mkReqItem({ kind:'field', fid, required:!(f && f.optional), sensitive:!!FIELD_DEFS[fid].sens }));
    }
    for (const d of (o.dokumente || [])){
      if (!d || !d.label) continue;
      items.push(mkReqItem({ kind:'doc', label:String(d.label), cat:DOC_CATS.includes(d.kategorie) ? d.kategorie : 'Sonstiges', required:!d.optional, sensitive:SENSITIVE_DOCS.includes(d.label) }));
    }
    return { meta, items };
  }
};

/* ---------- RequirementMatcher (Abgleich mit Profil & Safe) ---------- */
function suggestDocFor(item, personId){
  const docs = personDocs(personId).filter(d => !d.archived);
  const lw = (item.label || '').toLowerCase();
  if (!lw) return null;
  return docs.find(d => d.name.toLowerCase().includes(lw) || lw.includes(d.name.toLowerCase())) ||
    docs.find(d => lw.split(' ')[0].length > 3 && d.name.toLowerCase().includes(lw.split(' ')[0])) || null;
}
const REQ_STATUS_LABEL = {
  'Vorhanden':'Vorhanden', 'Fehlt':'Fehlt', 'Prüfen':'Bitte prüfen', 'Abgelaufen':'Abgelaufen', 'Konflikt':'Abweichender Wert erkannt'
};
const REQ_STATUS_BADGE = { 'Vorhanden':'ok', 'Fehlt':'warn', 'Prüfen':'warn', 'Läuft bald ab':'warn', 'Abgelaufen':'err', 'Konflikt':'err' };
const RequirementMatcher = {
  engine:ENGINE_INFO,
  status(item, person){
    if (!person) return { st:'Fehlt', detail:'Keine Person ausgewählt.' };
    if (item.kind === 'field'){
      const def = FIELD_DEFS[item.fid] || { label:item.fid };
      const conflict = S.conflicts.find(k => !k.resolved && k.personId === person.id && k.fieldId === item.fid);
      if (conflict) return { st:'Konflikt', detail:conflict.hint, conflict };
      const f = fv(person, item.fid);
      const v = f ? f.v : '';
      if (!v) return { st:'Fehlt', detail:explainWhere(item) || ('Noch nicht im Profil von ' + firstName(person) + ' hinterlegt.') };
      const err = validateValue(def, v);
      if (err) return { st:'Prüfen', detail:'Formal ungültig: ' + err };
      if (f.review) return { st:'Prüfen', detail:'Zur Prüfung markiert — bitte bestätigen oder korrigieren.', confirmable:true };
      const ref = parseDE(f.confirmed || f.changed);
      if (ref && (new Date() - ref) > 365 * 86400000) return { st:'Prüfen', detail:'Seit über einem Jahr nicht bestätigt (Stand: ' + (f.confirmed || f.changed) + ') — stimmt der Wert noch?', confirmable:true };
      return { st:'Vorhanden', detail:'Aus dem Profil: ' + (def.sens ? maskValue(v) : v) };
    }
    let doc = item.docId ? docById(item.docId) : null;
    if (doc && (doc.trash || doc.personId !== person.id)) doc = null;
    if (!doc){
      const hit = suggestDocFor(item, person.id);
      if (hit){ item.docId = hit.id; doc = hit; }
    }
    if (!doc) return { st:'Fehlt', detail:explainWhere(item) || 'Noch nicht im Safe vorhanden.' };
    const dst = docStatus(doc);
    if (dst === 'Abgelaufen') return { st:'Abgelaufen', detail:'„' + doc.name + '“ war gültig bis ' + doc.validUntil + ' — es gibt eine neuere Fassung?', doc };
    if (dst === 'Läuft bald ab') return { st:'Läuft bald ab', label:'Läuft am ' + doc.validUntil + ' ab', detail:'„' + doc.name + '“ ist noch bis ' + doc.validUntil + ' gültig — für längere Vorgänge ggf. Version ersetzen.', doc };
    if (dst === 'Prüfen') return { st:'Prüfen', detail:'„' + doc.name + '“ ist zur Prüfung markiert.', doc };
    return { st:'Vorhanden', detail:'Im Safe: „' + doc.name + '“' + (doc.validUntil ? ' · gültig bis ' + doc.validUntil : '') + (doc.versions.length > 1 ? ' · ' + doc.versions.length + ' Versionen' : ''), doc };
  }
};

const SRC_LABEL = { text:'Text eingefügt', pdf:'Aus PDF gelesen', bild:'Screenshot', foto:'Foto', strukturiert:'Strukturierte Anfrage', manuell:'Manuell erfasst', vorlage:'Aus Vorlage' };
async function buildDraft(input, opts){
  const person = P();
  const parsed = await RequestParser.parse(input, person);
  const meta = parsed.meta;
  meta.personId = person ? person.id : '';
  for (const it of parsed.items) it.unusual = RequirementValidationService.unusualFor(meta.typ, it);
  let extraction = (opts && opts.extraction) || 'ok';
  if (extraction === 'ok' && input.rawText && !parsed.items.length) extraction = 'sparse';
  S.requestDraft = { id:uid('rq'), created:today(), source:input.source, rawText:input.rawText || '',
    attachmentDocId:(opts && opts.attachmentDocId) || '', extraction, meta, items:parsed.items,
    note:'', reminder:'', prepared:{} };
  save();
}

}
/* Eingehende PDF-/Bild-Datei: Original in den Safe, bei PDF Text lokal auslesen */
async function requestFileSelected(fileList, ctx){
  S.ui.uploadCtx = null;
  const file = Array.from(fileList || [])[0];
  if (!file) return;
  const person = P();
  if (!person){ toast('Lege zuerst eine Person an.'); return; }
  const extM = /\.([a-z0-9]+)$/i.exec(file.name);
  const ext = extM ? extM[1].toUpperCase().replace('JPEG','JPG') : '';
  const isPdf = ctx.kind === 'request-pdf';
  if (isPdf && ext !== 'PDF'){ toast('Bitte eine PDF-Datei auswählen.'); return; }
  if (!isPdf && !['JPG','PNG','HEIC'].includes(ext)){ toast('Bitte ein Bild auswählen (JPG, PNG oder HEIC).'); return; }
  if (file.size > 10 * 1024 * 1024){ toast('Zu groß (' + fmtSize(file.size) + ') — das Limit liegt bei 10 MB.'); return; }
  if (!file.size){ toast('Die Datei ist leer und kann nicht gelesen werden.'); return; }
  let buf;
  try { buf = await readWithProgress(file); } catch(e){ toast('Die Datei konnte nicht gelesen werden — bitte erneut versuchen.'); return; }
  if (!magicOk(ext, new Uint8Array(buf.slice(0, 16)))){ toast('Der Inhalt passt nicht zum Dateityp — die Datei scheint beschädigt zu sein.'); return; }
  let attachmentDocId = '';
  try {
    const blob = new Blob([buf], { type:file.type || extMime(ext) });
    const vid = uid('v');
    await idb.put(vid, blob);
    const doc = mkDoc({ personId:person.id, name:'Anforderungsschreiben vom ' + today(), cat:'Sonstiges', ext });
    const cv = docCurrentVersion(doc);
    cv.id = vid; cv.name = doc.name; cv.ext = ext; cv.size = blob.size;
    S.documents.push(doc);
    attachmentDocId = doc.id;
  } catch(e){ /* ohne gespeichertes Original fortfahren */ }
  if (isPdf){
    const text = await pdfExtractText(buf);
    if (text && text.length >= 40) await buildDraft({ source:'pdf', rawText:text, structured:null }, { attachmentDocId });
    else await buildDraft({ source:'pdf', rawText:'', structured:null }, { attachmentDocId, extraction:'failed' });
  } else {
    await buildDraft({ source:ctx.kind === 'request-photo' ? 'foto' : 'bild', rawText:'', structured:null }, { attachmentDocId, extraction:'none' });
  }

function copyText(text){
  const done = () => toast('Text kopiert — füge ihn in deine E-Mail ein.');
  if (navigator.clipboard && navigator.clipboard.writeText){

  } else toast('Kopieren nicht möglich — markiere den Text bitte manuell.');
}

function reqStatusBadge(info){
  const label = info.label || REQ_STATUS_LABEL[info.st] || info.st;
  return badge(REQ_STATUS_BADGE[info.st] || 'neutral', label);
}
function reqMetaField(d, key, label, ph){
  const unsure = d.meta.conf && d.meta.conf[key];
  return '<div class="field"><label for="rm-' + key + '">' + label + (unsure ? ' <span class="badge badge-neutral" style="margin-left:4px">Erkennung unsicher — bitte prüfen</span>' : '') + '</label>' +
    '<input type="text" id="rm-' + key + '" class="req-meta" data-key="' + key + '" value="' + esc(d.meta[key] || '') + '"' + (ph ? ' placeholder="' + esc(ph) + '"' : '') + '></div>';

function reqItemRow(d, it, p){
  const info = RequirementMatcher.status(it, p);
  const editing = S.ui.reqEdit === it.key;
  const def = it.kind === 'field' ? (FIELD_DEFS[it.fid] || { label:it.fid }) : null;
  const label = it.kind === 'field' ? def.label : it.label;
  if (!it.included){
    return '<div class="check-item pos-excluded"><span class="ci-status ci-info">' + I.x() + '</span><div class="grow" style="flex:1;min-width:0">' +
      '<div class="title" style="font-weight:600;color:var(--ink)">' + esc(label) + '</div>' +
      '<div class="sub" style="font-size:13px;color:var(--slate)">Wird nicht beantwortet — die Anfrage gilt insoweit als teilweise beantwortet.</div>' +
      '<div class="ci-actions"><button class="link-btn" data-act="reqItemToggle" data-key="' + it.key + '">Wieder aufnehmen</button></div></div></div>';
  }
  const iconCls = { 'Vorhanden':'ci-ok', 'Fehlt':'ci-warn', 'Prüfen':'ci-warn', 'Läuft bald ab':'ci-warn', 'Abgelaufen':'ci-err', 'Konflikt':'ci-err' }[info.st] || 'ci-info';
  const icon = info.st === 'Vorhanden' ? I.check() : (info.st === 'Konflikt' || info.st === 'Abgelaufen') ? I.alert() : I.clock();
  let h = '<div class="check-item"><span class="ci-status ' + iconCls + '">' + icon + '</span><div class="grow" style="flex:1;min-width:0">' +
    '<div class="title" style="font-weight:600;color:var(--ink)">' + esc(label) +
    (it.required ? '' : ' <span style="font-weight:400;color:var(--grayblue);font-size:12.5px">(optional)</span>') +
    (it.sensitive ? ' ' + badge('teal', 'sensibel') : '') + ' ' + reqStatusBadge(info) + '</div>' +
    '<div class="sub" style="font-size:13px;color:var(--slate);margin-top:3px">' + esc(info.detail || '') +
    (it.confidence === 'unsicher' ? ' · <b>Erkennung unsicher — bitte prüfen.</b>' : '') + '</div>';
  const unusualText = it.unusual || (it.userUnusual ? 'Von dir als ungewöhnlich markiert. ' + GENERIC_UNUSUAL : '');
  if (unusualText) h += '<div class="unusual-note">' + I.info() + '<span><b>Für diesen Zweck ungewöhnlich:</b> ' + esc(unusualText) + '</span></div>';

    h += '<div class="sum-block" style="margin:10px 0 0"><div class="sum-item"><span class="l">Im Profil</span><span class="r mono">' + esc(val(p, it.fid) || '—') + '</span></div>' +
      '<div class="sum-item"><span class="l">Im Dokument „' + esc(info.conflict.docName) + '“</span><span class="r mono">' + esc(info.conflict.docValue) + '</span></div></div>';
  }
  if (editing && it.kind === 'field'){
    h += '<div class="edit-box"><div class="field" style="margin-bottom:0"><label for="ri-input">' + esc(label) + '</label>' + fieldInput(def, val(p, it.fid), 'ri-input') +
      (def.help ? '<div class="help">' + esc(def.help) + '</div>' : '') + '<div id="ri-error"></div></div>' +
      '<div class="edit-actions"><button class="btn btn-primary btn-sm" data-act="reqItemSave" data-key="' + it.key + '">Speichern</button><button class="btn btn-secondary btn-sm" data-act="reqItemCancel">Abbrechen</button></div></div>';
  } else {
    let acts = '';
    if (it.kind === 'field'){
      if (info.st === 'Konflikt'){
        acts += '<button class="btn btn-secondary btn-sm" data-act="conflictKeep" data-id="' + info.conflict.id + '">Profilwert behalten</button>' +
          '<button class="btn btn-primary btn-sm" data-act="conflictAdopt" data-id="' + info.conflict.id + '">Dokumentwert übernehmen</button>';
      } else {
        acts += '<button class="link-btn" data-act="reqItemEdit" data-key="' + it.key + '">' + (info.st === 'Fehlt' ? 'Jetzt ergänzen' : 'Bearbeiten') + '</button>';
        if (info.confirmable) acts += '<button class="link-btn" data-act="reqItemConfirm" data-key="' + it.key + '">Wert bestätigen</button>';
      }
    } else {
      if (info.doc){
        acts += '<button class="link-btn" data-act="nav" data-route="dokument?id=' + info.doc.id + '">Ansehen</button>';
        if (info.st === 'Läuft bald ab' || info.st === 'Abgelaufen' || info.st === 'Prüfen') acts += '<button class="link-btn" data-act="reqItemReplace" data-key="' + it.key + '">Version ersetzen</button>';
        acts += '<button class="link-btn" data-act="reqItemLink" data-key="' + it.key + '">Anderes Dokument</button>';
      } else {
        acts += '<button class="link-btn" data-act="reqItemUpload" data-key="' + it.key + '">Hochladen</button>' +
          '<button class="link-btn" data-act="reqItemLink" data-key="' + it.key + '">Aus dem Safe verknüpfen</button>';
      }
    }
    acts += '<button class="link-btn" data-act="reqItemExplain" data-key="' + it.key + '">Was ist das?</button>' +
      '<button class="link-btn" data-act="reqItemOptional" data-key="' + it.key + '">' + (it.required ? 'Als optional behandeln' : 'Als Pflicht behandeln') + '</button>' +
      '<button class="link-btn" data-act="reqItemUnusual" data-key="' + it.key + '">' + (it.userUnusual ? 'Markierung aufheben' : 'Als ungewöhnlich markieren') + '</button>' +
      '<button class="link-btn danger" data-act="reqItemToggle" data-key="' + it.key + '">Nicht beantworten</button>';
    h += '<div class="ci-actions">' + acts + '</div>';
  }
  return h + '</div></div>';
}

/* ---------- Aktionen des Anforderungs-Flows ---------- */
Object.assign(FP, {
  _reqGuard(next){
    if (!S.requestDraft){ next(); return; }
    openModal({ title:'Entwurf ersetzen?', confirmLabel:'Ersetzen', body:'Du hast bereits eine Anforderung in Prüfung' + (S.requestDraft.meta.organisation ? ' (von ' + esc(S.requestDraft.meta.organisation) + ')' : '') + '. Eine neue Eingabe ersetzt diesen Entwurf.',
      onConfirm(){ S.requestDraft = null; setTimeout(next, 0); } });
  },
  reqPickPdf(){
    if (!P()){ toast('Lege zuerst eine Person an.'); return; }
    FP._reqGuard(() => { S.ui.uploadCtx = { kind:'request-pdf' }; $('#req-pdf-input').value = ''; $('#req-pdf-input').click(); });
  },
  reqPickImg(){
    if (!P()){ toast('Lege zuerst eine Person an.'); return; }
    FP._reqGuard(() => { S.ui.uploadCtx = { kind:'request-img' }; $('#req-img-input').value = ''; $('#req-img-input').click(); });
  },
  reqPickPhoto(){
    if (!P()){ toast('Lege zuerst eine Person an.'); return; }
    FP._reqGuard(() => { S.ui.uploadCtx = { kind:'request-photo' }; $('#cam-input').value = ''; $('#cam-input').click(); });
  },
  reqManual(){
    FP._reqGuard(() => { buildDraft(RequestInputService.manual()).then(() => go('anforderung')); });
  },
  reqSample(){ const el = $('#req-input'); if (el){ el.value = sampleRequest(); S.ui.reqText = el.value; el.focus(); } },
  reqAnalyzeText(){
    const text = ($('#req-input') ? $('#req-input').value : '').trim();
    if (!text){ toast('Bitte zuerst den Text der Anforderung einfügen.'); return; }
    S.ui.reqText = text;
    FP._reqGuard(() => {
      RequestInputService.fromText(text).then(input => buildDraft(input)).then(() => { S.ui.reqText = ''; go('anforderung'); render(); });
    });
  },
  newCaseTpl(el){
    const id = el.getAttribute('data-id');
    FP._reqGuard(() => { draftFromTemplate(id); go('anforderung'); });
  },
  reqDiscard(){
    openModal({ title:'Entwurf verwerfen?', danger:true, confirmLabel:'Verwerfen', body:'Die geprüfte Anforderung wird verworfen. Bereits gespeicherte Dokumente (z. B. das Originalschreiben) bleiben im Safe.',
      onConfirm(){ S.requestDraft = null; toast('Entwurf verworfen.'); location.hash = '#/vorgang-neu'; } });
  },
  _reqItem(el){ return S.requestDraft ? S.requestDraft.items.find(x => x.key === el.getAttribute('data-key')) : null; },
  reqItemToggle(el){ const it = FP._reqItem(el); if (it){ it.included = !it.included; render(); } },
  reqItemOptional(el){ const it = FP._reqItem(el); if (it){ it.required = !it.required; render(); } },
  reqItemUnusual(el){ const it = FP._reqItem(el); if (it){ it.userUnusual = !it.userUnusual; render(); } },
  reqItemExplain(el){
    const it = FP._reqItem(el); if (!it) return;
    const e = RequirementExplanationService.forItem(it);
    openModal({ title:esc(e.titel), body:'<p>' + esc(e.was) + '</p>' + (e.wo ? '<p style="margin-top:10px"><b>Wo zu finden:</b> ' + esc(e.wo) + '</p>' : '') +
      '<p class="kv-meta" style="margin-top:14px">Erklärung aus dem lokalen Katalog — keine Rechtsberatung.</p>' });
  },

  _draftConvert(status){
    const d = S.requestDraft;
    const p = personById(d.meta.personId) || P();
    if (!p){ toast('Lege zuerst eine Person an.'); return; }
    const included = d.items.filter(i => i.included);
    const excluded = d.items.filter(i => !i.included);
    const title = (d.meta.zweck || (tplById(d.meta.typ) || { name:'Anforderung' }).name) + (d.meta.organisation ? ' — ' + d.meta.organisation : '');
    const fields = [], fieldMeta = {};
    for (const it of included.filter(i => i.kind === 'field')){
      fields.push(it.fid);
      fieldMeta[it.fid] = { optional:!it.required, unusual:it.unusual || (it.userUnusual ? 'Von dir als ungewöhnlich markiert. ' + GENERIC_UNUSUAL : '') };
    }
    const docs = included.filter(i => i.kind === 'doc').map(it => ({ label:it.label, cat:it.cat, docId:it.docId || '', optional:!it.required, unusual:it.unusual || (it.userUnusual ? 'Von dir als ungewöhnlich markiert. ' + GENERIC_UNUSUAL : '') }));
    const c = { id:uid('c'), personId:p.id, tpl:tplById(d.meta.typ) ? d.meta.typ : 'frei', title, recipient:d.meta.organisation,
      contact:d.meta.ansprechpartner, absender:d.meta.absender, purpose:d.meta.zweck, deadline:d.meta.frist, az:d.meta.az,
      vorgangsnr:d.meta.vorgangsnr, note:d.note, reminder:d.reminder, fields, fieldMeta, docs, status,
      shareId:'', orgLink:d.orgLink || null, created:today(), reqText:d.rawText, sourceDocId:d.attachmentDocId,
      history:[{ date:today(), text:'Vorgang aus Anforderung erstellt (' + (SRC_LABEL[d.source] || d.source) + ') — ' + included.length + ' Position' + (included.length === 1 ? '' : 'en') + ' übernommen.' }] };
    if (d.orgLink && orgReqById(d.orgLink.requestId)) c.history.push({ date:today(), text:'Verknüpft mit einer Unternehmensanfrage von ' + (S.org ? S.org.profile.displayName : 'einem Unternehmen') + '.' });
    if (status === 'Abgelehnt' && d.orgLink){ const req = orgReqById(d.orgLink.requestId); if (req){ req.status = 'abgelehnt'; orgReqAccess(req, 'abgelehnt', 'Empfänger hat abgelehnt (im Vorgang).'); orgLog('anfrage', 'Anfrage „' + req.title + '“ wurde abgelehnt.'); } }
    if (excluded.length) c.history.push({ date:today(), text:'Teilweise Beantwortung: ' + excluded.length + ' Position' + (excluded.length === 1 ? '' : 'en') + ' bewusst nicht übernommen (' + excluded.map(i => i.kind === 'field' ? (FIELD_DEFS[i.fid] || { label:i.fid }).label : i.label).join(', ') + ').' });
    const marked = included.filter(i => i.unusual || i.userUnusual);
    if (marked.length) c.history.push({ date:today(), text:marked.length + ' Position' + (marked.length === 1 ? '' : 'en') + ' als „für diesen Zweck ungewöhnlich“ gekennzeichnet.' });
    if (d.prepared.rueckfrage) c.history.push({ date:today(), text:'Rückfrage als Text vorbereitet (nicht versendet).' });
    if (d.prepared.frist) c.history.push({ date:today(), text:'Bitte um Fristverlängerung als Text vorbereitet (nicht versendet).' });
    if (status === 'Abgelehnt') c.history.push({ date:today(), text:'Anfrage abgelehnt — Antwortentwurf vorbereitet (nicht versendet).' });
    S.cases.push(c);
    S.requestDraft = null;
    addLog('Vorgang „' + c.title + '“ aus Anforderung erstellt (' + p.name + ').');
    toast(status === 'Abgelehnt' ? 'Als abgelehnter Vorgang dokumentiert.' : 'Vorgang angelegt.');
    location.hash = '#/vorgang?id=' + c.id;
  }
});

  const d = S.requestDraft;
  d.meta[key] = t.value.trim ? t.value.trim() : t.value;
  if (d.meta.conf) delete d.meta.conf[key];
  if (key === 'typ'){
    for (const it of d.items) it.unusual = RequirementValidationService.unusualFor(d.meta.typ, it);
    render();
  } else if (key === 'personId'){
    for (const it of d.items) if (it.kind === 'doc') it.docId = '';
    render();
  } else if (key === 'frist' && d.meta.frist && vDate(d.meta.frist)){
    toast('Frist: ' + vDate(d.meta.frist));
    save();

});
