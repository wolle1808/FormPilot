/* ============================================================
   FREIGABE — kontrollierter 3-Schritt-Prozess, Versionierung,
   Aktivitätsprotokoll und öffentliche Empfängeransicht.

   Datenregel: Eine bestehende Freigabe wird nie still verändert.
   Werte und Dokumentversionen werden zum Freigabezeitpunkt als
   Snapshot festgehalten (snapshotField / snapshotDoc). Änderungen
   an Daten oder Dokumenten erzeugen eine neue Freigabeversion,
   die alte bleibt im Verlauf, der Empfänger muss neu bestätigen.
============================================================ */

function shareLink(sh){ return location.origin + location.pathname + '#/f?t=' + sh.token; }
function personFieldIds(p){ const out = []; for (const gid of p.groups){ const g = GROUP_BY_ID[gid]; if (!g) continue; for (const f of g.fields) out.push(f.id); } return out; }
function expiryHint(dateStr){
  if (!dateStr) return 'ohne Ablaufdatum';
  const n = daysUntil(dateStr);
  if (n === null) return dateStr;
  if (n < 0) return 'abgelaufen am ' + dateStr;
  if (n === 0) return 'gültig bis heute (' + dateStr + ')';
  return 'gültig bis ' + dateStr + ' (noch ' + n + ' Tag' + (n === 1 ? '' : 'e') + ')';
}
const LOG_ICON = { erstellt:'check', geoeffnet:'eye', angesehen:'eye', heruntergeladen:'download', 'passwort-fehler':'alert', verlaengert:'clock', widerrufen:'x', abgelaufen:'clock', version:'copy', bestaetigt:'shieldCheck' };
const LOG_ERR = { 'passwort-fehler':1, widerrufen:1 };

/* ---------- Wizard: Start-Punkte ---------- */
function shareWizStart(o){
  const p = personById(o.personId) || P();
  const w = { step:1, personId:p.id, caseId:o.caseId || '', recipient:o.recipient || '', purpose:o.purpose || '',
    selField:{}, selDoc:{}, docVer:{}, expiry:o.expiry !== undefined ? o.expiry : addDays(90),
    permission:o.permission || 'download', password:o.password || '', message:o.message || '', reason:'',
    consent:false, editShareId:o.editShareId || '', draftId:o.draftId || '',
    reqFields:(o.preFields || []).slice(), reqDocs:(o.preDocs || []).slice() };
  (o.preFields || []).forEach(fid => { w.selField[fid] = true; });
  (o.preDocs || []).forEach(id => { w.selDoc[id] = true; });
  if (o.docVer) w.docVer = Object.assign({}, o.docVer);
  S.ui.shareWizard = w;
}
function wizFromShareVersion(sh, opts){
  const cur = shareCurrentVersion(sh);
  const docVer = {}; cur.docs.forEach(d => { if (d.docId) docVer[d.docId] = d.versionId || ''; });
  shareWizStart(Object.assign({
    personId:sh.personId, caseId:sh.caseId, recipient:sh.recipient, purpose:sh.purpose,
    preFields:cur.fields.map(f => f.fid).filter(Boolean), preDocs:cur.docs.map(d => d.docId).filter(Boolean),
    docVer, expiry:cur.expires, permission:cur.permission, password:cur.password, message:cur.message
  }, opts));
}
function wizRead(){
  const w = S.ui.shareWizard; if (!w) return;
  if (w.step === 1){
    if ($('#wiz-recipient')) w.recipient = $('#wiz-recipient').value.trim();
    if ($('#wiz-purpose')) w.purpose = $('#wiz-purpose').value.trim();
  } else if (w.step === 2){
    if ($('#wiz-expiry')) w.expiry = $('#wiz-expiry').value.trim();
    const perm = document.querySelector('input[name=wiz-perm]:checked'); if (perm) w.permission = perm.value;
    if ($('#wiz-pw')) w.password = $('#wiz-pw').value;
    if ($('#wiz-msg')) w.message = $('#wiz-msg').value.trim();
    document.querySelectorAll('.wiz-docver').forEach(s => { w.docVer[s.getAttribute('data-doc')] = s.value; });
  }
}
function wizSelectedFields(w, p){ return personFieldIds(p).filter(fid => w.selField[fid] && val(p, fid)); }
function wizSelectedDocs(w){ return personDocs(w.personId).filter(d => w.selDoc[d.id] && !d.archived); }
function wizBuildVersion(w, p, vnum){
  const fields = wizSelectedFields(w, p).map(fid => snapshotField(p, fid));
  const docs = wizSelectedDocs(w).map(d => snapshotDoc(d.id, w.docVer[d.id] || ''));
  return mkShareVersion({ v:vnum, created:today(), expires:w.expiry || '', permission:w.permission, password:w.password || '', message:w.message || '', fields, docs, reason:w.reason || '' });
}

/* ---------- Wizard-Ansicht ---------- */
const WIZ_STEPS = ['Inhalte auswählen', 'Inhalte & Zugriff prüfen', 'Bestätigen'];
function wizStepPills(cur){
  let h = '<div class="steps">';
  WIZ_STEPS.forEach((s, i) => {
    const n = i + 1;
    h += '<span class="step-pill' + (n < cur ? ' done' : n === cur ? ' cur' : '') + '"><span class="n">' + (n < cur ? '✓' : n) + '</span>' + s + '</span>';
    if (i < WIZ_STEPS.length - 1) h += '<span class="step-sep"></span>';
  });
  return h + '</div>';
}
VIEWS['freigabe-neu'] = function(){
  const w = S.ui.shareWizard;
  if (!w) return '<div class="card">' + emptyState('send', 'Keine Freigabe in Arbeit', 'Starte eine neue Freigabe über die Freigaben-Übersicht, einen Vorgang oder ein Dokument.', 'Zu den Freigaben', 'goFreigaben') + '</div>';
  const p = personById(w.personId) || P();
  if (!canWrite(p)) return '<div class="card">' + emptyState('send', 'Nur Leserechte', 'Für ' + esc(p ? p.name : 'diese Person') + ' kannst du keine Freigaben erstellen.', 'Zu den Freigaben', 'goFreigaben') + '</div>';
  const isEdit = !!w.editShareId, isDraft = !!w.draftId;
  let h = '<div class="page-head"><button class="link-btn" data-act="wizCancel" style="margin-bottom:10px">← Abbrechen</button>' +
    '<div class="head-flex"><span class="fchip fchip-teal">' + I.send() + '</span><div style="flex:1"><h1 style="font-size:24px">' +
    (isEdit ? 'Freigabe ändern — neue Version' : 'Neue Freigabe') + '</h1>' +
    '<p class="page-sub">' + esc(p.name) + (w.caseId && caseById(w.caseId) ? ' · Vorgang: ' + esc(caseById(w.caseId).title) : '') + '</p></div></div></div>';
  h += wizStepPills(w.step);
  if (isEdit) h += '<div class="warn-banner" style="margin-bottom:16px">' + I.info() + '<span>Du erstellst <b>Version ' + (shareById(w.editShareId).versions.length + 1) + '</b>. Die bisherige Version bleibt im Verlauf; der Empfänger muss die neue Version erneut bestätigen.</span></div>';

  /* SCHRITT 1 — Inhalte auswählen */
  if (w.step === 1){
    const c = w.caseId ? caseById(w.caseId) : null;
    h += '<div class="card" style="margin-bottom:16px"><h3 style="margin-bottom:12px">Empfänger & Zweck</h3>' +
      '<div class="form-grid"><div class="field"><label for="wiz-recipient">Empfänger</label><input type="text" id="wiz-recipient" value="' + esc(w.recipient) + '" placeholder="z. B. Muster GmbH"></div>' +
      '<div class="field"><label for="wiz-purpose">Zweck</label><input type="text" id="wiz-purpose" value="' + esc(w.purpose) + '" placeholder="Wofür wird zugegriffen?"></div></div>' +
      (c ? '<p class="meta">Verknüpfter Vorgang: <b>' + esc(c.title) + '</b>. Vorausgewählt sind nur die aus der ursprünglichen Anforderung stammenden Positionen.</p>' : '<p class="meta">Nichts ist vorausgewählt — du wählst bewusst aus, was du teilst.</p>') + '</div>';

    const filled = personFieldIds(p).filter(fid => val(p, fid));
    h += '<div class="card" style="margin-bottom:16px"><div class="card-head"><h3>Angaben auswählen</h3></div>';
    if (!filled.length) h += '<p class="meta" style="padding:6px 0">' + esc(firstName(p)) + ' hat noch keine Angaben im Profil.</p>';
    for (const gid of p.groups){
      const g = GROUP_BY_ID[gid]; if (!g) continue;
      const rows = g.fields.filter(f => val(p, f.id));
      if (!rows.length) continue;
      h += '<h4 style="margin:12px 0 2px">' + esc(g.name) + '</h4>';
      for (const f of rows){
        const req = w.reqFields.includes(f.id);
        h += '<label class="check-line"><input type="checkbox" class="wiz-field" value="' + f.id + '"' + (w.selField[f.id] ? ' checked' : '') + '>' +
          '<span>' + esc(f.label) + ' <span style="color:var(--grayblue)">· ' + esc(f.sens ? maskValue(val(p, f.id)) : val(p, f.id)) + '</span>' +
          (f.sens ? ' ' + badge('teal', 'sensibel') : '') + (req ? ' ' + badge('info', 'aus Anforderung') : '') + '</span></label>';
      }
    }
    h += '</div>';

    const docs = personDocs(p.id).filter(d => !d.archived);
    h += '<div class="card" style="margin-bottom:16px"><div class="card-head"><h3>Dokumente auswählen</h3></div>';
    if (!docs.length) h += '<p class="meta" style="padding:6px 0">Im Safe von ' + esc(firstName(p)) + ' liegt noch kein Dokument.</p>';
    for (const d of docs){
      const req = w.reqDocs.includes(d.id);
      h += '<label class="check-line"><input type="checkbox" class="wiz-doc" value="' + d.id + '"' + (w.selDoc[d.id] ? ' checked' : '') + '>' +
        '<span>' + esc(d.name) + ' <span style="color:var(--grayblue)">· ' + esc(d.cat) + ' · ' + esc(docStatus(d)) + '</span>' +
        (SENSITIVE_DOCS.includes(d.name) ? ' ' + badge('teal', 'sensibel') : '') + (req ? ' ' + badge('info', 'aus Anforderung') : '') + '</span></label>';
    }
    h += '</div>';
    h += '<div class="card-actions"><button class="btn btn-secondary" data-act="wizSaveDraft">Als Entwurf speichern</button><button class="btn btn-primary" data-act="wizNext">Weiter zur Prüfung</button></div>';
    return h;
  }

  /* SCHRITT 2 — Inhalte & Zugriff prüfen */
  if (w.step === 2){
    const selF = wizSelectedFields(w, p), selD = wizSelectedDocs(w);
    h += '<div class="info-banner" style="margin-bottom:16px">' + I.shieldCheck() + '<span><b>' + esc(w.recipient || 'Der Empfänger') + '</b> erhält Zugriff auf genau diese Inhalte — für den Zweck „' + esc(w.purpose || '—') + '“' + (w.expiry ? ', ' + expiryHint(w.expiry) : ', ohne Ablaufdatum') + '.</span></div>';
    /* Angaben prüfen/bearbeiten */
    h += '<div class="card" style="margin-bottom:16px"><h3 style="margin-bottom:6px">Angaben (' + selF.length + ')</h3>';
    if (!selF.length) h += '<p class="meta" style="padding:4px 0">Keine Angaben ausgewählt.</p>';
    for (const fid of selF){
      const def = FIELD_DEFS[fid] || { label:fid };
      const editing = S.ui.wizEdit === fid;
      h += '<div class="kv"><div class="kv-top"><span class="kv-label">' + esc(def.label) + (def.sens ? ' ' + badge('teal', 'sensibel') : '') + '</span>' +
        '<span class="kv-value mono">' + esc(def.sens ? maskValue(val(p, fid)) : val(p, fid)) + '</span>' +
        '<span class="kv-actions"><button class="icon-btn" data-act="wizEditField" data-id="' + fid + '" aria-label="' + esc(def.label) + ' bearbeiten">' + I.pencil() + '</button></span></div>';
      if (editing){
        h += '<div class="edit-box"><div class="field" style="margin-bottom:0"><label for="wf-input">' + esc(def.label) + '</label>' + fieldInput(def, val(p, fid), 'wf-input') + '<div id="wf-error"></div></div>' +
          '<div class="edit-actions"><button class="btn btn-primary btn-sm" data-act="wizFieldSave" data-id="' + fid + '">Speichern</button><button class="btn btn-secondary btn-sm" data-act="wizFieldCancel">Abbrechen</button></div></div>';
      }
      h += '</div>';
    }
    h += '</div>';
    /* Dokumente prüfen + Version wählen */
    h += '<div class="card" style="margin-bottom:16px"><h3 style="margin-bottom:6px">Dokumente (' + selD.length + ')</h3>';
    if (!selD.length) h += '<p class="meta" style="padding:4px 0">Keine Dokumente ausgewählt.</p>';
    for (const d of selD){
      const chosen = w.docVer[d.id] || docCurrentVersion(d).id;
      h += '<div class="row"><span class="doc-icon">' + esc(docCurrentVersion(d).ext) + '</span><div class="grow"><div class="title" style="font-size:14.5px">' + esc(d.name) + '</div>' +
        '<div class="sub">' + esc(d.cat) + ' · ' + esc(docStatus(d)) + (d.validUntil ? ' · gültig bis ' + d.validUntil : '') + '</div>' +
        (d.versions.length > 1 ? '<div style="margin-top:8px;max-width:340px"><label style="font-size:12px;color:var(--slate);display:block;margin-bottom:4px">Freizugebende Version</label><select class="wiz-docver" data-doc="' + d.id + '">' +
          d.versions.map((v, i) => '<option value="' + v.id + '"' + (v.id === chosen ? ' selected' : '') + '>Version ' + (i + 1) + (i === d.versions.length - 1 ? ' (aktuell)' : '') + ' · ' + v.added + '</option>').join('') + '</select></div>' :
          '<div class="kv-meta">Eine Version · hochgeladen am ' + docCurrentVersion(d).added + '</div>') +
        '</div><button class="btn btn-secondary btn-sm" data-act="docPreview" data-id="' + d.id + '">' + I.eye() + 'Prüfen</button></div>';
    }
    h += '</div>';
    /* Zugriff festlegen */
    h += '<div class="card" style="margin-bottom:16px"><h3 style="margin-bottom:12px">Zugriff festlegen</h3>' +
      '<div class="field"><label for="wiz-expiry">Ablaufdatum (leer = ohne Ablauf)</label><input type="text" id="wiz-expiry" value="' + esc(w.expiry) + '" placeholder="TT.MM.JJJJ" inputmode="numeric" style="max-width:220px">' +
      '<div class="ci-actions" style="margin-top:8px"><button class="link-btn" data-act="wizExpiry" data-days="7">+7 Tage</button><button class="link-btn" data-act="wizExpiry" data-days="30">+30 Tage</button><button class="link-btn" data-act="wizExpiry" data-days="90">+90 Tage</button><button class="link-btn" data-act="wizExpiry" data-days="180">+180 Tage</button><button class="link-btn" data-act="wizExpiry" data-days="0">ohne Ablauf</button></div><div id="wiz-expiry-error"></div></div>' +
      '<div class="field"><label>Berechtigung</label>' +
      '<label class="radio-line"><input type="radio" name="wiz-perm" value="view"' + (w.permission === 'view' ? ' checked' : '') + '><span>Nur Ansicht — Empfänger kann die Dokumente ansehen, aber nicht herunterladen</span></label>' +
      '<label class="radio-line"><input type="radio" name="wiz-perm" value="download"' + (w.permission === 'download' ? ' checked' : '') + '><span>Ansicht & Download — Empfänger kann die Dokumente auch herunterladen</span></label></div>' +
      '<div class="field"><label for="wiz-pw">Passwort (optional)</label><input type="text" id="wiz-pw" value="' + esc(w.password) + '" placeholder="Leer lassen für keinen Passwortschutz" autocomplete="off"><div class="help">Teile das Passwort dem Empfänger auf einem anderen Weg mit — nicht im selben Kanal wie den Link.</div></div>' +
      '<div class="field" style="margin-bottom:0"><label for="wiz-msg">Begleitnachricht (optional)</label><textarea id="wiz-msg" class="small" placeholder="Kurzer Text, den der Empfänger sieht.">' + esc(w.message) + '</textarea></div></div>';
    /* Wer/worauf/wozu/bis wann */
    h += '<div class="sum-block" style="margin-bottom:16px"><div class="sum-head">Zugriff im Überblick</div>' +
      '<div class="sum-item"><span class="l">Wer</span><span class="r">' + esc(w.recipient || '—') + '</span></div>' +
      '<div class="sum-item"><span class="l">Worauf</span><span class="r">' + selF.length + ' Angabe' + (selF.length === 1 ? '' : 'n') + ' · ' + selD.length + ' Dokument' + (selD.length === 1 ? '' : 'e') + '</span></div>' +
      '<div class="sum-item"><span class="l">Wofür</span><span class="r">' + esc(w.purpose || '—') + '</span></div>' +
      '<div class="sum-item"><span class="l">Bis wann</span><span class="r mono">' + esc(w.expiry || 'ohne Ablauf') + '</span></div></div>';
    h += '<div class="card-actions"><button class="btn btn-secondary" data-act="wizBack">Zurück</button><button class="btn btn-secondary" data-act="wizSaveDraft">Als Entwurf speichern</button><button class="btn btn-primary" data-act="wizNext">Weiter zur Bestätigung</button></div>';
    return h;
  }

  /* SCHRITT 3 — Bestätigen */
  const selF = wizSelectedFields(w, p), selD = wizSelectedDocs(w);
  h += '<div class="card" style="margin-bottom:16px"><h3 style="margin-bottom:4px">Zusammenfassung</h3>' +
    '<p class="meta" style="margin-bottom:12px">Bitte prüfe alles genau — nach dem Erstellen sieht der Empfänger exakt diese Inhalte in diesem Zustand.</p>' +
    '<div class="sum-block"><div class="sum-head">Rahmen</div>' +
    '<div class="sum-item"><span class="l">Empfänger</span><span class="r">' + esc(w.recipient || '—') + '</span></div>' +
    '<div class="sum-item"><span class="l">Zweck</span><span class="r">' + esc(w.purpose || '—') + '</span></div>' +
    '<div class="sum-item"><span class="l">Person</span><span class="r">' + esc(p.name) + '</span></div>' +
    '<div class="sum-item"><span class="l">Berechtigung</span><span class="r">' + (w.permission === 'download' ? 'Ansicht & Download' : 'nur Ansicht') + '</span></div>' +
    '<div class="sum-item"><span class="l">Ablaufdatum</span><span class="r mono">' + esc(w.expiry || 'ohne Ablauf') + '</span></div>' +
    '<div class="sum-item"><span class="l">Passwort</span><span class="r">' + (w.password ? 'gesetzt' : 'keins') + '</span></div>' +
    (w.message ? '<div class="sum-item"><span class="l">Begleitnachricht</span><span class="r">' + esc(w.message) + '</span></div>' : '') + '</div>';
  h += '<div class="sum-block"><div class="sum-head">Angaben (' + selF.length + ')</div>' +
    (selF.length ? selF.map(fid => { const def = FIELD_DEFS[fid] || { label:fid }; return '<div class="sum-item"><span class="l">' + esc(def.label) + (def.sens ? ' ' + badge('teal', 'sensibel') : '') + '</span><span class="r mono">' + esc(def.sens ? maskValue(val(p, fid)) : val(p, fid)) + '</span></div>'; }).join('') : '<div class="sum-item"><span class="l">Keine</span></div>') + '</div>';
  h += '<div class="sum-block"><div class="sum-head">Dokumente (' + selD.length + ')</div>' +
    (selD.length ? selD.map(d => { const vid = w.docVer[d.id] || docCurrentVersion(d).id; const idx = d.versions.findIndex(v => v.id === vid); return '<div class="sum-item"><span class="l">' + esc(d.name) + '</span><span class="r">Version ' + (idx + 1 || d.versions.length) + '</span></div>'; }).join('') : '<div class="sum-item"><span class="l">Keine</span></div>') + '</div>';
  h += '<label class="check-line" style="margin-top:8px"><input type="checkbox" id="wiz-consent"' + (w.consent ? ' checked' : '') + '><span>Ich habe die Zusammenfassung geprüft und gebe genau diese Inhalte an <b>' + esc(w.recipient || 'den Empfänger') + '</b> frei.</span></label>' +
    '<div class="sec-note">' + I.shieldCheck() + '<span>Nichts wird automatisch versendet. Nach dem Erstellen bekommst du einen Freigabelink, den du selbst weitergibst. Widerruf ist jederzeit möglich.</span></div>' +
    '</div>';
  h += '<div class="card-actions"><button class="btn btn-secondary" data-act="wizBack">Zurück</button><button class="btn btn-secondary" data-act="wizSaveDraft">Als Entwurf speichern</button><button class="btn btn-primary" data-act="wizConfirm">' + (isEdit ? 'Neue Version freigeben' : 'Freigabe erstellen') + '</button></div>';
  return h;
};

/* ---------- Freigabe-Detail ---------- */
VIEWS.freigabe = function(){
  const sh = shareById(qp('id') || S.ui.shareId);
  if (!sh) return '<div class="card">' + emptyState('send', 'Freigabe nicht gefunden', 'Vielleicht wurde sie gelöscht.', 'Zu den Freigaben', 'goFreigaben') + '</div>';
  S.ui.shareId = sh.id;
  const st = shareStatus(sh), cur = shareCurrentVersion(sh), stats = shareAccessStats(sh);
  const c = sh.caseId ? caseById(sh.caseId) : null, isDraft = st === 'entwurf';
  let h = '<div class="page-head"><button class="link-btn" data-act="goFreigaben" style="margin-bottom:10px">← Alle Freigaben</button>' +
    '<div class="head-flex"><span class="fchip fchip-teal">' + I.send() + '</span><div style="flex:1"><h1 style="font-size:24px">' + esc(sh.recipient || 'Entwurf ohne Empfänger') + '</h1>' +
    '<p class="page-sub">' + shareBadge(sh) + (sh.versions.length > 1 ? ' &nbsp;' + badge('neutral', 'Version ' + sh.versions.length) : '') + '</p></div></div></div>';

  if (isDraft){
    h += '<div class="warn-banner" style="margin-bottom:16px">' + I.info() + '<span>Dies ist ein <b>Entwurf</b>. Es wurde noch kein Link erzeugt und niemand hat Zugriff. Bearbeite den Entwurf, um die Freigabe zu erstellen.</span></div>' +
      '<div class="card-actions" style="justify-content:flex-start"><button class="btn btn-primary" data-act="shareResumeDraft" data-id="' + sh.id + '">Entwurf fortsetzen</button><button class="btn btn-danger" data-act="shareDeleteDraft" data-id="' + sh.id + '">Entwurf löschen</button></div>';
    return h;
  }
  if (st === 'widerrufen') h += '<div class="warn-banner" style="margin-bottom:16px">' + I.x() + '<span><b>Widerrufen am ' + sh.revokedAt + '.</b> Der Link ist deaktiviert, der Empfänger hat keinen Zugriff mehr.</span></div>';
  else if (st === 'abgelaufen') h += '<div class="warn-banner" style="margin-bottom:16px">' + I.clock() + '<span><b>Abgelaufen am ' + cur.expires + '.</b> Der Empfänger hat keinen Zugriff mehr — verlängere die Freigabe, um sie wieder zu aktivieren.</span></div>';

  /* Rahmen & Zugriff */
  h += '<div class="sum-block"><div class="sum-head">Freigabe im Überblick</div>' +
    '<div class="sum-item"><span class="l">Wer erhält Zugriff</span><span class="r">' + esc(sh.recipient) + '</span></div>' +
    '<div class="sum-item"><span class="l">Von</span><span class="r">' + esc(personName(sh.personId)) + '</span></div>' +
    '<div class="sum-item"><span class="l">Zweck</span><span class="r">' + esc(sh.purpose || '—') + '</span></div>' +
    '<div class="sum-item"><span class="l">Berechtigung</span><span class="r">' + (cur.permission === 'download' ? 'Ansicht & Download' : 'nur Ansicht') + '</span></div>' +
    '<div class="sum-item"><span class="l">Gültigkeit</span><span class="r mono">' + esc(expiryHint(cur.expires)) + '</span></div>' +
    '<div class="sum-item"><span class="l">Passwort</span><span class="r">' + (cur.password ? 'gesetzt' : 'keins') + '</span></div>' +
    (c ? '<div class="sum-item"><span class="l">Vorgang</span><span class="r"><button class="link-btn" data-act="nav" data-route="vorgang?id=' + c.id + '">' + esc(c.title) + '</button></span></div>' : '') + '</div>';

  /* Zugriffszahlen */
  h += '<div class="cards grid-2" style="margin-bottom:16px"><div class="card"><h4 style="margin-bottom:8px">Zugriffe</h4>' +
    '<div class="sum-item" style="padding:6px 0"><span class="l">Erster Zugriff</span><span class="r mono">' + (stats.first || '—') + '</span></div>' +
    '<div class="sum-item" style="padding:6px 0"><span class="l">Letzter Zugriff</span><span class="r mono">' + (stats.last || '—') + '</span></div>' +
    '<div class="sum-item" style="padding:6px 0;border:none"><span class="l">Anzahl Öffnungen · Downloads</span><span class="r mono">' + stats.opens + ' · ' + stats.downloads + '</span></div></div>' +
    '<div class="card"><h4 style="margin-bottom:8px">Bestätigung</h4><p class="meta">' + (cur.accepted ? 'Empfänger hat den Erhalt von Version ' + cur.v + ' am ' + cur.acceptedAt + ' bestätigt.' : 'Noch keine Empfangsbestätigung für Version ' + cur.v + '.') + '</p></div></div>';

  /* Link & Weitergabe */
  if (st !== 'widerrufen'){
    h += '<div class="card" style="margin-bottom:16px"><h3 style="margin-bottom:8px">Freigabelink</h3>' +
      '<div class="src-text" style="max-height:none;user-select:all">' + esc(shareLink(sh)) + '</div>' +
      '<div class="card-actions" style="justify-content:flex-start;margin-top:12px">' +
      '<button class="btn btn-secondary btn-sm" data-act="shareCopyLink" data-id="' + sh.id + '">' + I.copy() + 'Link kopieren</button>' +
      '<button class="btn btn-secondary btn-sm" data-act="shareCopyReply" data-id="' + sh.id + '">' + I.file() + 'Antworttext kopieren</button>' +
      '<button class="btn btn-secondary btn-sm" data-act="shareOpenEmail" data-id="' + sh.id + '">' + I.mail() + 'In E-Mail öffnen</button>' +
      '<button class="btn btn-secondary btn-sm" data-act="shareOpenRecipient" data-id="' + sh.id + '">' + I.eye() + 'Empfängeransicht öffnen</button></div>' +
      '<div class="sec-note">' + I.shieldCheck() + '<span>Der Link enthält nur einen zufälligen Token, keine persönlichen Daten. Beta: Er öffnet die Empfängeransicht nur auf diesem Gerät. „Empfängeransicht öffnen“ zählt als Empfängerzugriff.</span></div></div>';
  }

  /* Freigegebene Inhalte (aktuelle Version, Snapshot) */
  h += '<div class="card" style="margin-bottom:16px"><div class="card-head"><h3>Freigegebene Inhalte' + (sh.versions.length > 1 ? ' (Version ' + cur.v + ')' : '') + '</h3></div>' +
    '<div class="sum-block" style="margin-top:6px"><div class="sum-head">Angaben zum Freigabezeitpunkt (' + cur.fields.length + ')</div>' +
    (cur.fields.length ? cur.fields.map(f => '<div class="sum-item"><span class="l">' + esc(f.label) + (f.sensitive ? ' ' + badge('teal', 'sensibel') : '') + '</span><span class="r mono">' + esc(f.sensitive ? maskValue(f.value) : f.value) + '</span></div>').join('') : '<div class="sum-item"><span class="l">Keine</span></div>') + '</div>' +
    '<div class="sum-block"><div class="sum-head">Dokumente in festgehaltener Version (' + cur.docs.length + ')</div>' +
    (cur.docs.length ? cur.docs.map(d => '<div class="sum-item"><span class="l">' + esc(d.name) + '</span><span class="r">' + esc(d.versionLabel || 'Version') + '</span></div>').join('') : '<div class="sum-item"><span class="l">Keine</span></div>') + '</div>' +
    (cur.message ? '<div class="sum-block"><div class="sum-head">Begleitnachricht</div><div class="sum-item"><span class="r" style="text-align:left">' + esc(cur.message) + '</span></div></div>' : '') +
    '</div>';

  /* Versionsverlauf */
  if (sh.versions.length > 1){
    h += '<div class="section"><h3 class="section-title">Versionsverlauf</h3><div class="card" style="padding-top:6px;padding-bottom:6px">';
    sh.versions.slice().reverse().forEach(v => {
      h += '<div class="row"><span class="fchip ' + (v === cur ? 'fchip-teal' : 'fchip-marine') + '">' + I.copy() + '</span><div class="grow"><div class="title" style="font-size:14.5px">Version ' + v.v + (v === cur ? ' ' + badge('teal', 'gültig') : '') + '</div>' +
        '<div class="sub">' + v.created + ' · ' + v.fields.length + ' Angaben · ' + v.docs.length + ' Dokumente' + (v.reason ? ' · ' + esc(v.reason) : '') + (v.accepted ? ' · bestätigt am ' + v.acceptedAt : '') + '</div></div></div>';
    });
    h += '</div></div>';
  }

  /* Aktivitätsprotokoll */
  h += '<div class="section"><h3 class="section-title">Aktivitätsprotokoll</h3><div class="card"><div class="timeline">' +
    (sh.log && sh.log.length ? sh.log.slice().reverse().map(l => '<div class="tl-item"><span class="tl-dot"' + (LOG_ERR[l.type] ? ' style="border-color:var(--err);background:var(--err-bg)"' : '') + '></span><div class="tl-body"><div class="tl-date">' + l.date + '</div><div class="tl-text">' + esc(l.text) + '</div></div></div>').join('') : '<p class="meta">Noch keine Aktivität.</p>') +
    '</div></div></div>';

  /* Aktionen */
  h += '<div class="section card-actions" style="justify-content:flex-start">';
  if (st === 'aktiv'){
    h += '<button class="btn btn-primary" data-act="shareNewVersion" data-id="' + sh.id + '">Inhalte ändern (neue Version)</button>' +
      '<button class="btn btn-secondary" data-act="shareExtend" data-id="' + sh.id + '">Verlängern</button>' +
      (cur.expires ? '<button class="btn btn-secondary" data-act="shareShorten" data-id="' + sh.id + '">Ablauf verkürzen</button>' : '') +
      '<button class="btn btn-danger" data-act="shareRevoke" data-id="' + sh.id + '">Widerrufen</button>';
  } else if (st === 'abgelaufen'){
    h += '<button class="btn btn-primary" data-act="shareExtend" data-id="' + sh.id + '">Verlängern (wieder aktivieren)</button>';
  }
  h += '</div>';
  return h;
};

/* ---------- Öffentliche Empfängeransicht ---------- */
function rcptError(title, msg){
  return '<div class="rcpt-wrap"><div class="rcpt-brand"><img src="formpilot_logo.svg" alt="FormPilot"></div>' +
    '<div class="card"><div class="empty-state"><span class="es-icon">' + I.alert() + '</span><div class="es-title">' + esc(title) + '</div><div class="es-sub">' + esc(msg) + '</div></div></div>' +
    '<div class="rcpt-footer">Bereitgestellt über FormPilot · sichere Übergabe von Daten und Dokumenten</div></div>';
}
function rcptEnsureOpened(sh, cur){
  S.ui.rcptOpened = S.ui.rcptOpened || {};
  const key = sh.id + ':v' + cur.v;
  if (S.ui.rcptOpened[key]) return;
  S.ui.rcptOpened[key] = true;
  shareLog(sh, 'geoeffnet', 'Freigabe geöffnet' + (sh.versions.length > 1 ? ' (Version ' + cur.v + ')' : '') + '.');
  if (S.settings.nAccess) pushNotif('zugriff', sh.recipient + ' hat deine Freigabe geöffnet' + (sh.purpose ? ' („' + sh.purpose + '“)' : '') + '.', 'freigabe?id=' + sh.id);
  addLog(sh.recipient + ' hat die Freigabe' + (sh.purpose ? ' „' + sh.purpose + '“' : '') + ' geöffnet.');
}
VIEWS.f = function(){
  const tok = qp('t');
  const sh = tok ? shareByToken(tok) : null;
  if (!sh || shareStatus(sh) === 'entwurf') return rcptError('Freigabe nicht gefunden', 'Dieser Link ist ungültig. Bitte prüfe, ob du ihn vollständig kopiert hast, oder frage bei der Person nach, die dir die Freigabe geschickt hat.');
  const st = shareStatus(sh), cur = shareCurrentVersion(sh);
  if (st === 'widerrufen') return rcptError('Zugriff nicht mehr möglich', 'Diese Freigabe wurde am ' + sh.revokedAt + ' widerrufen. Bitte wende dich an ' + sh.personName + ', falls du die Unterlagen noch benötigst.');
  if (st === 'abgelaufen') return rcptError('Freigabe abgelaufen', 'Der Zugriff auf diese Freigabe endete am ' + cur.expires + '. Bitte fordere bei ' + sh.personName + ' eine neue Freigabe an.');

  /* Passwortschutz */
  S.ui.rcptUnlock = S.ui.rcptUnlock || {};
  if (cur.password && !S.ui.rcptUnlock[sh.token]){
    return '<div class="rcpt-wrap"><div class="rcpt-brand"><img src="formpilot_logo.svg" alt="FormPilot"></div>' +
      '<div class="card"><h3 style="margin-bottom:6px">Diese Freigabe ist passwortgeschützt</h3>' +
      '<p class="meta" style="margin-bottom:14px">' + esc(sh.personName) + ' hat dir das Passwort auf einem anderen Weg mitgeteilt. Bitte gib es ein, um die Inhalte zu sehen.</p>' +
      '<div class="field" style="margin-bottom:0"><label for="rcpt-pw">Passwort</label><input type="password" id="rcpt-pw" autocomplete="off"><div id="rcpt-pw-error"></div></div>' +
      '<div class="card-actions"><button class="btn btn-primary" data-act="rcptUnlock">Freigabe öffnen</button></div></div>' +
      '<div class="rcpt-footer">Bereitgestellt über FormPilot · keine Anmeldung nötig</div></div>';
  }
  rcptEnsureOpened(sh, cur);

  let h = '<div class="rcpt-wrap"><div class="rcpt-brand"><img src="formpilot_logo.svg" alt="FormPilot"></div>';
  h += '<div class="card" style="margin-bottom:14px"><h2 style="margin-bottom:4px">Freigabe für ' + esc(sh.recipient) + '</h2>' +
    '<p style="font-size:14.5px;color:var(--slate)">' + esc(sh.personName) + ' hat dir Daten und Dokumente über FormPilot bereitgestellt.</p>' +
    '<div class="sum-block" style="margin-top:14px">' +
    '<div class="sum-item"><span class="l">Von</span><span class="r">' + esc(sh.personName) + '</span></div>' +
    '<div class="sum-item"><span class="l">Für</span><span class="r">' + esc(sh.recipient) + '</span></div>' +
    '<div class="sum-item"><span class="l">Zweck</span><span class="r">' + esc(sh.purpose || '—') + '</span></div>' +
    '<div class="sum-item"><span class="l">Gültigkeit</span><span class="r">' + esc(cur.expires ? expiryHint(cur.expires) : 'ohne Ablaufdatum') + '</span></div>' +
    (sh.versions.length > 1 ? '<div class="sum-item"><span class="l">Version</span><span class="r">' + cur.v + ' (aktuell gültige Fassung)</span></div>' : '') + '</div>' +
    (cur.message ? '<div class="info-banner" style="margin-top:14px">' + I.mail() + '<span>' + esc(cur.message) + '</span></div>' : '') + '</div>';

  if (sh.versions.length > 1) h += '<div class="warn-banner" style="margin-bottom:14px">' + I.info() + '<span>Diese Freigabe wurde aktualisiert. Es gilt <b>Version ' + cur.v + '</b> — bitte bestätige den Erhalt dieser Fassung unten.</span></div>';

  /* Freigegebene Angaben */
  h += '<div class="card" style="margin-bottom:14px"><h3 style="margin-bottom:6px">Freigegebene Angaben</h3>';
  if (!cur.fields.length) h += '<p class="meta" style="padding:4px 0">Keine Angaben — nur Dokumente.</p>';
  for (const f of cur.fields){
    h += '<div class="kv"><div class="kv-top"><span class="kv-label">' + esc(f.label) + (f.sensitive ? ' ' + badge('teal', 'sensibel') : '') + '</span><span class="rcpt-value mono">' + esc(f.value) + '</span></div></div>';
  }
  h += '</div>';

  /* Freigegebene Dokumente */
  h += '<div class="card" style="margin-bottom:14px"><h3 style="margin-bottom:6px">Freigegebene Dokumente</h3>';
  if (!cur.docs.length) h += '<p class="meta" style="padding:4px 0">Keine Dokumente — nur Angaben.</p>';
  for (const d of cur.docs){
    h += '<div class="row"><span class="doc-icon">' + esc(d.ext || 'PDF') + '</span><div class="grow"><div class="title" style="font-size:14.5px">' + esc(d.name) + '</div>' +
      '<div class="sub">' + esc(d.cat || '') + (d.versionLabel ? ' · ' + esc(d.versionLabel) : '') + '</div></div>' +
      '<button class="btn btn-secondary btn-sm" data-act="rcptPreview" data-doc="' + d.docId + '">' + I.eye() + 'Ansehen</button>' +
      (cur.permission === 'download' ? '<button class="btn btn-secondary btn-sm" data-act="rcptDownload" data-doc="' + d.docId + '">' + I.download() + 'Herunterladen</button>' : '') + '</div>';
  }
  if (cur.permission !== 'download' && cur.docs.length) h += '<p class="sec-note">' + I.info() + '<span>Diese Freigabe erlaubt nur die Ansicht. Ein Download ist nicht möglich.</span></p>';
  h += '</div>';

  /* Ablaufhinweis + Erhalt bestätigen */
  h += '<div class="card"><p class="meta" style="margin-bottom:12px">' + I.clock(14) + ' ' + esc(cur.expires ? 'Dieser Zugriff endet automatisch am ' + cur.expires + '.' : 'Für diese Freigabe wurde kein Ablaufdatum festgelegt.') + '</p>' +
    (cur.accepted ? '<p class="meta">' + I.shieldCheck(14) + ' Du hast den Erhalt am ' + cur.acceptedAt + ' bestätigt. Vielen Dank.</p>' :
      '<button class="btn btn-primary" data-act="rcptConfirm">Erhalt bestätigen</button><p class="help" style="margin-top:8px">Optional — die freigebende Person sieht dann, dass die Unterlagen angekommen sind.</p>') + '</div>';

  h += '<div class="rcpt-footer">Bereitgestellt über FormPilot · keine Anmeldung nötig · Der Zugriff wird protokolliert.<br>Du kannst die Inhalte ansehen' + (cur.permission === 'download' ? ' und herunterladen' : '') + ', aber nicht verändern.</div></div>';
  return h;
};

/* ---------- Freigabe-Aktionen ---------- */
Object.assign(FP, {
  goFreigaben(){ go('freigaben'); },
  /* Einstiegspunkte */
  shareNew(){
    const p = P();
    if (!p){ toast('Lege zuerst eine Person an.'); return; }
    if (!canWrite(p)){ toast('Für dieses Profil hast du nur Leserechte.'); return; }
    shareWizStart({ personId:p.id });
    go('freigabe-neu');
  },
  startShare(){
    const c = caseById(S.ui.caseId); if (!c || caseStatus(c) !== 'Bereit') return;
    const p = personById(c.personId);
    const preFields = c.fields.filter(fid => val(p, fid));
    const preDocs = c.docs.filter(r => r.docId && docById(r.docId) && !docById(r.docId).trash).map(r => r.docId);
    shareWizStart({ personId:c.personId, caseId:c.id, recipient:c.recipient, purpose:c.purpose, preFields, preDocs });
    go('freigabe-neu');
  },
  docShareQuick(){
    const d = docById(S.ui.docId); if (!d) return;
    shareWizStart({ personId:d.personId, preDocs:[d.id] });
    go('freigabe-neu');
  },
  /* Wizard-Navigation */
  wizCancel(){
    const w = S.ui.shareWizard;
    if (w && (Object.values(w.selField).some(Boolean) || Object.values(w.selDoc).some(Boolean) || w.recipient)){
      openModal({ title:'Freigabe verwerfen?', danger:true, confirmLabel:'Verwerfen', cancelLabel:'Weiter bearbeiten', body:'Deine bisherige Auswahl geht verloren. Als Entwurf speichern kannst du sie über den Button im Assistenten.',
        onConfirm(){ S.ui.shareWizard = null; location.hash = '#/freigaben'; } });
    } else { S.ui.shareWizard = null; go('freigaben'); }
  },
  wizNext(){
    const w = S.ui.shareWizard; if (!w) return;
    wizRead();
    if (w.step === 1){
      const p = personById(w.personId);
      if (!w.recipient){ toast('Bitte einen Empfänger angeben.'); const el = $('#wiz-recipient'); if (el){ el.classList.add('invalid'); el.focus(); } return; }
      if (!wizSelectedFields(w, p).length && !wizSelectedDocs(w).length){ toast('Wähle mindestens eine Angabe oder ein Dokument aus.'); return; }
      w.step = 2;
    } else if (w.step === 2){
      if (w.expiry){ const e = vDate(w.expiry); if (e){ toast('Ablaufdatum: ' + e); const el = $('#wiz-expiry'); if (el) el.classList.add('invalid'); return; } }
      w.step = 3;
    }
    S.ui.wizEdit = null;
    render();
  },
  wizBack(){ const w = S.ui.shareWizard; if (!w) return; wizRead(); w.step = Math.max(1, w.step - 1); S.ui.wizEdit = null; render(); },
  wizExpiry(el){
    const w = S.ui.shareWizard; if (!w) return;
    wizRead();
    const days = +el.getAttribute('data-days');
    w.expiry = days ? addDays(days) : '';
    render();
  },
  wizEditField(el){ const w = S.ui.shareWizard; if (!w) return; wizRead(); S.ui.wizEdit = el.getAttribute('data-id'); render(); },
  wizFieldCancel(){ S.ui.wizEdit = null; render(); },
  wizFieldSave(el){
    const w = S.ui.shareWizard, p = personById(w.personId);
    const fid = el.getAttribute('data-id'), def = FIELD_DEFS[fid];
    const v = $('#wf-input').value.trim();
    const err = validateValue(def, v);
    if (err){ $('#wf-error').innerHTML = '<div class="error-text">' + esc(err) + '</div>'; return; }
    if (!v){ $('#wf-error').innerHTML = '<div class="error-text">Leere Werte können nicht freigegeben werden. Entferne die Angabe stattdessen im Schritt zuvor.</div>'; return; }
    setFieldValue(p, fid, v);
    addLog('Profilfeld „' + def.label + '“ vor einer Freigabe aktualisiert (' + p.name + ').');
    S.ui.wizEdit = null;
    toast('Gespeichert.');
    render();
  },
  _wizToDraft(w){
    const p = personById(w.personId);
    const version = wizBuildVersion(w, p, 1);
    if (w.draftId){
      const sh = shareById(w.draftId);
      if (sh){ sh.recipient = w.recipient; sh.purpose = w.purpose; sh.caseId = w.caseId; sh.versions = [version]; return sh; }
    }
    const sh = { id:uid('s'), token:'', personId:p.id, personName:p.name, caseId:w.caseId, recipient:w.recipient, purpose:w.purpose,
      created:today(), status:'entwurf', revokedAt:'', versions:[version], log:[] };
    S.shares.push(sh);
    return sh;
  },
  wizSaveDraft(){
    const w = S.ui.shareWizard; if (!w) return;
    wizRead();
    const sh = FP._wizToDraft(w);
    S.ui.shareWizard = null;
    toast('Als Entwurf gespeichert.');
    go('freigabe?id=' + sh.id);
  },
  wizConfirm(){
    const w = S.ui.shareWizard; if (!w) return;
    const consent = $('#wiz-consent') && $('#wiz-consent').checked;
    w.consent = consent;
    if (!consent){ toast('Bitte bestätige die Freigabe mit dem Häkchen.'); const el = $('#wiz-consent'); if (el) el.focus(); return; }
    const p = personById(w.personId);
    const selF = wizSelectedFields(w, p), selD = wizSelectedDocs(w);

    if (w.editShareId){
      /* Neue Version einer bestehenden Freigabe */
      const sh = shareById(w.editShareId); if (!sh) return;
      const vnum = sh.versions.length + 1;
      const version = wizBuildVersion(w, p, vnum);
      version.reason = 'Inhalte geändert';
      sh.versions.push(version);
      sh.recipient = w.recipient; sh.purpose = w.purpose;
      shareLog(sh, 'version', 'Version ' + vnum + ' erstellt (Inhalte geändert) — ' + selF.length + ' Angaben, ' + selD.length + ' Dokumente. Neue Zustimmung erforderlich.');
      addLog('Neue Version (' + vnum + ') der Freigabe an ' + sh.recipient + ' erstellt.');
      for (const fid of selF){ const f = fv(p, fid); if (f){ f.uses = (f.uses || 0) + 1; f.lastUsed = today(); f.lastShared = sh.recipient; } }
      for (const d of selD){ d.lastShared = sh.recipient; }
      S.ui.shareWizard = null;
      toast('Neue Version freigegeben.');
      go('freigabe?id=' + sh.id);
      return;
    }

    /* Neue Freigabe (ggf. aus Entwurf) */
    let sh;
    if (w.draftId && shareById(w.draftId)){ sh = shareById(w.draftId); }
    else { sh = { id:uid('s'), personId:p.id, caseId:w.caseId, log:[] }; S.shares.push(sh); }
    sh.token = shareToken();
    sh.personName = p.name;
    sh.recipient = w.recipient; sh.purpose = w.purpose; sh.caseId = w.caseId;
    sh.created = today(); sh.status = 'aktiv'; sh.revokedAt = '';
    sh.versions = [ wizBuildVersion(w, p, 1) ];
    shareLog(sh, 'erstellt', 'Freigabe erstellt — ' + selF.length + ' Angabe' + (selF.length === 1 ? '' : 'n') + ', ' + selD.length + ' Dokument' + (selD.length === 1 ? '' : 'e') + ', ' + (w.permission === 'download' ? 'Ansicht & Download' : 'nur Ansicht') + (w.expiry ? ', Zugriff bis ' + w.expiry : ', ohne Ablauf') + (w.password ? ', passwortgeschützt' : '') + '.');
    for (const fid of selF){ const f = fv(p, fid); if (f){ f.uses = (f.uses || 0) + 1; f.lastUsed = today(); f.lastShared = w.recipient; } }
    for (const d of selD){ d.lastShared = w.recipient; }
    let orgLink = null;
    if (w.caseId){ const c = caseById(w.caseId); if (c){ c.shareId = sh.id; if (caseStatus(c) === 'Bereit'){ c.status = 'Übermittelt'; c.submitted = today(); } c.recipient = w.recipient || c.recipient; c.history.push({ date:today(), text:'Freigabe an ' + w.recipient + ' erstellt — ' + selF.length + ' Angaben, ' + selD.length + ' Dokumente.' }); orgLink = c.orgLink || null; } }
    addLog('Freigabe an ' + w.recipient + ' erstellt — ' + selF.length + ' Angaben, ' + selD.length + ' Dokumente.', 'freigabe');
    /* Antwort an eine Unternehmensanfrage zurückspielen (nur freigegebene Inhalte). */
    if (orgLink && typeof orgFulfillFromShare === 'function') orgFulfillFromShare(orgLink, sh);
    S.ui.shareWizard = null;
    toast('Freigabe erstellt.');
    go('freigabe?id=' + sh.id);
  },

  /* Detail: Link & Weitergabe */
  shareCopyLink(el){ const sh = shareById(el.getAttribute('data-id')); if (sh) copyText(shareLink(sh)); },
  shareCopyReply(el){
    const sh = shareById(el.getAttribute('data-id')); if (!sh) return;
    const cur = shareCurrentVersion(sh);
    const txt = 'Guten Tag,\n\nüber den folgenden Link stelle ich Ihnen die angeforderten Unterlagen bereit' + (sh.purpose ? ' (' + sh.purpose + ')' : '') + ':\n\n' + shareLink(sh) +
      (cur.expires ? '\n\nDer Zugriff ist bis zum ' + cur.expires + ' gültig.' : '') +
      (cur.password ? '\nDer Link ist passwortgeschützt; das Passwort erhalten Sie separat.' : '') +
      '\n\nFreundliche Grüße\n' + sh.personName;
    copyText(txt);
  },
  shareOpenEmail(el){
    const sh = shareById(el.getAttribute('data-id')); if (!sh) return;
    const cur = shareCurrentVersion(sh);
    const subject = 'Freigabe' + (sh.purpose ? ': ' + sh.purpose : '');
    const body = 'Guten Tag,\n\nüber den folgenden Link stelle ich Ihnen die angeforderten Unterlagen bereit:\n\n' + shareLink(sh) + (cur.expires ? '\n\nGültig bis ' + cur.expires + '.' : '') + '\n\nFreundliche Grüße\n' + sh.personName;
    location.href = 'mailto:?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
  },
  shareOpenRecipient(el){
    const sh = shareById(el.getAttribute('data-id')); if (!sh) return;
    location.hash = '#/f?t=' + sh.token;
  },

  /* Detail: Ablauf & Widerruf */
  shareExtend(el){
    const sh = shareById(el.getAttribute('data-id')); if (!sh) return;
    const cur = shareCurrentVersion(sh);
    openModal({ title:'Freigabe verlängern', body:
      '<div class="field" style="margin-bottom:0"><label for="se-date">Neues Ablaufdatum</label><input type="text" id="se-date" placeholder="TT.MM.JJJJ" value="' + esc(cur.expires || addDays(90)) + '" inputmode="numeric"><div class="help">Leer lassen für „ohne Ablauf“.</div><div id="se-error"></div></div>',
      confirmLabel:'Übernehmen', onConfirm(){
        const v = $('#se-date').value.trim();
        if (v){ const e = vDate(v); if (e){ $('#se-error').innerHTML = '<div class="error-text">' + esc(e) + '</div>'; return false; } }
        const wasExpired = shareStatus(sh) === 'abgelaufen';
        cur.expires = v;
        shareLog(sh, 'verlaengert', 'Freigabe verlängert — neues Ablaufdatum: ' + (v || 'ohne Ablauf') + '.' + (wasExpired ? ' Wieder aktiv.' : ''));
        addLog('Freigabe an ' + sh.recipient + ' verlängert (bis ' + (v || 'ohne Ablauf') + ').');
        toast('Freigabe verlängert.');
      } });
  },
  shareShorten(el){
    const sh = shareById(el.getAttribute('data-id')); if (!sh) return;
    const cur = shareCurrentVersion(sh);
    openModal({ title:'Ablaufdatum verkürzen', body:
      '<div class="field" style="margin-bottom:0"><label for="ss-date">Früheres Ablaufdatum</label><input type="text" id="ss-date" placeholder="TT.MM.JJJJ" value="' + esc(cur.expires || today()) + '" inputmode="numeric"><div class="help">Der Zugriff endet dann früher. „' + esc(today()) + '“ beendet den Zugriff heute.</div><div id="ss-error"></div></div>',
      confirmLabel:'Übernehmen', onConfirm(){
        const v = $('#ss-date').value.trim();
        const e = vDate(v); if (e){ $('#ss-error').innerHTML = '<div class="error-text">' + esc(e) + '</div>'; return false; }
        cur.expires = v;
        shareLog(sh, 'verlaengert', 'Ablaufdatum verkürzt auf ' + v + '.');
        addLog('Ablaufdatum der Freigabe an ' + sh.recipient + ' verkürzt (' + v + ').');
        toast('Ablaufdatum verkürzt.');
      } });
  },
  shareRevoke(el){
    const sh = shareById(el.getAttribute('data-id')); if (!sh) return;
    openModal({ title:'Freigabe widerrufen?', danger:true, confirmLabel:'Jetzt widerrufen', body:
      '<b>' + esc(sh.recipient) + '</b> verliert sofort den Zugriff auf alle freigegebenen Angaben und Dokumente. Der Link wird umgehend deaktiviert. Dies lässt sich nicht rückgängig machen.',
      onConfirm(){
        sh.status = 'widerrufen'; sh.revokedAt = today();
        shareLog(sh, 'widerrufen', 'Freigabe widerrufen — Link sofort deaktiviert, kein Zugriff mehr möglich.');
        addLog('Freigabe an ' + sh.recipient + ' widerrufen. Kein Zugriff mehr möglich.');
        toast('Freigabe widerrufen — Link deaktiviert.');
      } });
  },
  shareNewVersion(el){
    const sh = shareById(el.getAttribute('data-id')); if (!sh) return;
    if (!canWrite(personById(sh.personId))){ toast('Für dieses Profil hast du nur Leserechte.'); return; }
    wizFromShareVersion(sh, { editShareId:sh.id });
    go('freigabe-neu');
  },
  shareResumeDraft(el){
    const sh = shareById(el.getAttribute('data-id')); if (!sh) return;
    wizFromShareVersion(sh, { draftId:sh.id });
    go('freigabe-neu');
  },
  shareDeleteDraft(el){
    const sh = shareById(el.getAttribute('data-id')); if (!sh) return;
    openModal({ title:'Entwurf löschen?', danger:true, confirmLabel:'Löschen', body:'Der Freigabe-Entwurf für ' + esc(sh.recipient || 'unbekannten Empfänger') + ' wird gelöscht.',
      onConfirm(){ S.shares = S.shares.filter(x => x.id !== sh.id); toast('Entwurf gelöscht.'); location.hash = '#/freigaben'; } });
  },

  /* Empfängeransicht */
  rcptUnlock(){
    const sh = shareByToken(qp('t')); if (!sh) return;
    const cur = shareCurrentVersion(sh);
    const v = $('#rcpt-pw') ? $('#rcpt-pw').value : '';
    if (v === cur.password){
      S.ui.rcptUnlock = S.ui.rcptUnlock || {}; S.ui.rcptUnlock[sh.token] = true;
      render();
    } else {
      shareLog(sh, 'passwort-fehler', 'Fehlgeschlagener Passwortversuch bei der Empfängeransicht.');
      if (S.settings.nAccess) pushNotif('sicherheit', 'Fehlgeschlagener Passwortversuch bei deiner Freigabe an ' + sh.recipient + '.', 'freigabe?id=' + sh.id);
      save();
      const err = $('#rcpt-pw-error'); if (err) err.innerHTML = '<div class="error-text">Passwort falsch. Bitte prüfe die Angabe der freigebenden Person.</div>';
      const el = $('#rcpt-pw'); if (el){ el.value = ''; el.focus(); }
    }
  },
  async rcptPreview(el){
    const sh = shareByToken(qp('t')); if (!sh) return;
    const cur = shareCurrentVersion(sh);
    const snap = cur.docs.find(d => d.docId === el.getAttribute('data-doc')); if (!snap) return;
    const doc = docById(snap.docId);
    const vid = snap.versionId || (doc ? docCurrentVersion(doc).id : '');
    let blob = null; try { blob = vid ? await idb.get(vid) : null; } catch(e){}
    shareLog(sh, 'angesehen', '„' + snap.name + '“ angesehen.'); save();
    if (!blob){ openModal({ title:esc(snap.name), body:'<p>Für dieses Dokument ist auf diesem Gerät keine Datei hinterlegt' + (S.mode === 'demo' ? ' (Demo-Dokument)' : '') + '.</p>' }); return; }
    if ((snap.ext || '') === 'HEIC'){ openModal({ title:esc(snap.name), body:'<p>HEIC-Bilder können Browser nicht direkt anzeigen.' + (cur.permission === 'download' ? ' Bitte lade die Datei herunter.' : '') + '</p>' }); return; }
    const url = URL.createObjectURL(blob);
    const inner = (snap.ext || 'PDF') === 'PDF' ? '<embed src="' + url + '" type="application/pdf" data-objurl="1" aria-label="Dokumentvorschau">' : '<img src="' + url + '" alt="Vorschau" data-objurl="1">';
    openModal({ large:true, title:esc(snap.name), body:'<div class="preview-box">' + inner + '</div>' });
  },
  async rcptDownload(el){
    const sh = shareByToken(qp('t')); if (!sh) return;
    const cur = shareCurrentVersion(sh);
    if (cur.permission !== 'download'){ toast('Diese Freigabe erlaubt keinen Download.'); return; }
    const snap = cur.docs.find(d => d.docId === el.getAttribute('data-doc')); if (!snap) return;
    const doc = docById(snap.docId);
    const vid = snap.versionId || (doc ? docCurrentVersion(doc).id : '');
    let blob = null; try { blob = vid ? await idb.get(vid) : null; } catch(e){}
    if (!blob){ toast('Datei auf diesem Gerät nicht verfügbar.'); return; }
    dlBlob(blob, snap.name.replace(/[\\/:*?"<>|]/g, '-') + '.' + (snap.ext || 'pdf').toLowerCase());
    shareLog(sh, 'heruntergeladen', '„' + snap.name + '“ heruntergeladen.');
    if (S.settings.nAccess) pushNotif('zugriff', sh.recipient + ' hat „' + snap.name + '“ aus deiner Freigabe heruntergeladen.', 'freigabe?id=' + sh.id);
    addLog(sh.recipient + ' hat „' + snap.name + '“ heruntergeladen.');
    save();
  },
  rcptConfirm(){
    const sh = shareByToken(qp('t')); if (!sh) return;
    const cur = shareCurrentVersion(sh);
    if (cur.accepted) return;
    cur.accepted = true; cur.acceptedAt = today();
    shareLog(sh, 'bestaetigt', 'Empfänger hat den Erhalt' + (sh.versions.length > 1 ? ' von Version ' + cur.v : '') + ' bestätigt.');
    if (S.settings.nAccess) pushNotif('zugriff', sh.recipient + ' hat den Erhalt deiner Freigabe bestätigt.', 'freigabe?id=' + sh.id);
    addLog(sh.recipient + ' hat den Erhalt der Freigabe bestätigt.');
    toast('Danke — Erhalt bestätigt.');
    render();
  }
});

/* Wizard-Auswahl (Checkboxen) synchron halten, ohne Neu-Rendern */
document.addEventListener('change', e => {
  const t = e.target, w = S.ui.shareWizard;
  if (!w || !t.classList) return;
  if (t.classList.contains('wiz-field')) w.selField[t.value] = t.checked;
  else if (t.classList.contains('wiz-doc')) w.selDoc[t.value] = t.checked;

/* ---------- Verständlicher Demo-Export (lesbarer Text) ---------- */
function buildReadableExport(){
  const L = [];
  const line = (s) => L.push(s == null ? '' : String(s));
  const rule = () => line('────────────────────────────────────────────');
  line('FORMPILOT — DATENEXPORT');
  line('Erstellt am ' + today() + ' · Beta-Version · alle Daten stammen von diesem Gerät');
  rule();
  line('Dieser Export ist ein lesbarer Überblick. Die vollständige, maschinen-');
  line('lesbare Sicherung liegt in der begleitenden .json-Datei. Dokument-Dateien');
  line('selbst lädst du einzeln im Dokumentensafe herunter.');
  line('');

  line('EINWILLIGUNGEN');
  for (const def of CONSENT_DEFS){
    const rec = consentRecord(def.id);
    line('· ' + def.label + ' (v' + def.version + '): ' + (consentGiven(def.id) ? 'zugestimmt am ' + rec.acceptedAt : (rec && rec.acceptedAt ? 'ältere Fassung ' + rec.version + ' vom ' + rec.acceptedAt : 'keine Zustimmung')));
  }
  line('');

  for (const p of S.persons){
    rule();
    line('PERSON: ' + p.name + '  (' + p.relation + ' · ' + roleLabel(p.role) + (p.archived ? ' · archiviert' : '') + ')');
    if (p.vollmachtDocId){ const vd = docById(p.vollmachtDocId); if (vd) line('Vollmacht: ' + vd.name + (p.vollmachtBis ? ' · gültig bis ' + p.vollmachtBis : '')); }
    line('');
    line('  Angaben:');
    let any = false;
    for (const gid of p.groups){
      const g = GROUP_BY_ID[gid]; if (!g) continue;
      const rows = g.fields.filter(f => val(p, f.id));
      if (!rows.length) continue;
      line('  [' + g.name + ']');
      for (const f of rows){ any = true; line('    - ' + f.label + ': ' + val(p, f.id) + (f.sens ? '  (sensibel)' : '')); }
    }
    if (p.custom && p.custom.filter(c => !c.archived).length){
      line('  [Eigene Felder]');
      for (const cf of p.custom.filter(c => !c.archived)){ any = true; line('    - ' + cf.label + ': ' + cf.v + (cf.sens ? '  (sensibel)' : '') + (cf.bis ? '  (gültig bis ' + cf.bis + ')' : '')); }
    }
    if (!any) line('    (keine Angaben hinterlegt)');
    line('');
    const docs = personDocs(p.id);
    line('  Dokumente (' + docs.length + '):');
    for (const d of docs) line('    - ' + d.name + ' · ' + d.cat + ' · ' + docStatus(d) + (d.validUntil ? ' · gültig bis ' + d.validUntil : '') + ' · ' + d.versions.length + ' Version(en)');
    if (!docs.length) line('    (keine Dokumente)');
    line('');
  }

  rule();
  line('VORGÄNGE (' + S.cases.length + ')');
  for (const c of S.cases){
    line('· ' + c.title + '  [' + caseStatus(c) + ']');
    line('    Person: ' + personName(c.personId) + ' · Empfänger: ' + (c.recipient || '—') + (c.deadline ? ' · Frist ' + c.deadline : '') + (c.az ? ' · Az. ' + c.az : ''));
  }
  if (!S.cases.length) line('  (keine)');
  line('');

  rule();
  line('FREIGABEN (' + S.shares.length + ')');
  for (const sh of S.shares){
    const cur = shareCurrentVersion(sh), stats = shareAccessStats(sh);
    line('· ' + sh.recipient + '  [' + shareStatus(sh) + ']' + (sh.versions.length > 1 ? ' · Version ' + cur.v : ''));
    line('    Zweck: ' + (sh.purpose || '—') + ' · ' + (cur.permission === 'download' ? 'Ansicht & Download' : 'nur Ansicht') + ' · ' + (cur.expires ? 'bis ' + cur.expires : 'ohne Ablauf'));
    line('    Angaben: ' + (cur.fields.map(f => f.label).join(', ') || '—'));
    line('    Dokumente: ' + (cur.docs.map(d => d.name).join(', ') || '—'));
    line('    Zugriffe: ' + stats.opens + ' Öffnungen, ' + stats.downloads + ' Downloads' + (stats.last ? ' · zuletzt ' + stats.last : ''));
  }
  if (!S.shares.length) line('  (keine)');
  line('');

  rule();
  line('AKTIVITÄTSPROTOKOLL (' + S.log.length + ' Einträge)');
  for (const e of S.log.slice(0, 100)) line('· ' + e.date + '  ' + e.text);
  line('');
  rule();
  line('Ende des Exports. Bewahre diese Datei sicher auf — sie enthält persönliche Daten.');
  return L.join('\n');
}

/* Ablauf automatisch nachziehen. */
function syncOrg(){
  if (!S.org) return;
  for (const req of S.org.requests){
    if (['entwurf','uebermittelt','vollstaendig','abgelehnt','abgelaufen','widerrufen'].includes(req.status)) continue;
    if (req.deadline){ const n = daysUntil(req.deadline); if (n !== null && n < 0){ req.status = 'abgelaufen'; orgReqAccess(req, 'abgelaufen', 'Frist am ' + req.deadline + ' verstrichen.'); orgLog('anfrage', 'Anfrage „' + req.title + '“ ist abgelaufen (Frist ' + req.deadline + ').'); } }
  }
}

/* Dashboard-Kennzahlen. */
function orgAvgProcessingDays(){
  const done = S.org.requests.filter(r => r.sentAt && r.received && r.received.at);
  if (!done.length) return null;
  let sum = 0, n = 0;
  for (const r of done){ const a = parseDE(r.sentAt), b = parseDE(r.received.at); if (a && b){ sum += Math.max(0, Math.round((b - a) / 86400000)); n++; } }
  return n ? Math.round(sum / n) : null;
}
function orgMissingDocs(){
  const counts = {};
  for (const req of S.org.requests){
    if (['entwurf','uebermittelt','vollstaendig','abgelehnt','widerrufen'].includes(req.status)) continue;
    const receivedNames = req.received ? req.received.docs.map(d => d.name.toLowerCase()) : [];
    for (const it of orgReqItems(req)){
      if (it.kind !== 'doc' || it.optional) continue;
      if (!receivedNames.some(n => n.includes(it.label.toLowerCase().split(' ')[0]))) counts[it.label] = (counts[it.label] || 0) + 1;
    }
  }
  return Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 5);
}

/* Anfragen-Liste */
VIEWS['org-anfragen'] = function(){

  let list = o.requests.filter(r => filter === 'archiv' ? r.archived : (!r.archived && (groups[filter] || []).includes(r.status)));
  list = list.sort((a, b) => (parseDE(b.createdAt) || 0) - (parseDE(a.createdAt) || 0));
  let h = orgPageHead('clipboard', 'Anfragen', 'Strukturierte Daten- und Dokumentenanfragen — Status jederzeit im Blick.');
  h += '<div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:center"><div class="chips" style="margin:0">';
  const tabs = [['aktiv','Aktiv'],['abgeschlossen','Abgeschlossen'],['entwuerfe','Entwürfe'],['inaktiv','Abgelaufen/Widerrufen'],['archiv','Archiv']];
  for (const [k, lbl] of tabs) h += '<button class="chip' + (filter === k ? ' active' : '') + '" data-act="orgReqFilter" data-id="' + k + '">' + lbl + '</button>';

  if (!list.length){ h += '<div class="card" style="margin-top:20px">' + emptyState('clipboard', 'Nichts hier', filter === 'aktiv' ? 'Keine aktiven Anfragen. Erstelle eine neue strukturierte Anfrage.' : 'In dieser Ansicht liegt nichts.', filter === 'aktiv' && orgCan('requests') ? 'Neue Anfrage' : '', 'orgNewRequest') + '</div>'; return h; }
  h += '<div class="card" style="margin-top:20px;padding-top:6px;padding-bottom:6px">';
  for (const r of list){

  h += '<div class="sum-block"><div class="sum-head">Eckdaten</div>' +

    '<div class="sum-item"><span class="l">Zweck</span><span class="r">' + esc(r.purpose || '—') + '</span></div>' +
    '<div class="sum-item"><span class="l">Ansprechpartner</span><span class="r">' + esc(r.contact || '—') + '</span></div>' +
    (r.deadline ? '<div class="sum-item"><span class="l">Frist</span><span class="r mono">' + esc(r.deadline) + '</span></div>' : '') +

  /* Entwurf: senden */

    h += '<div class="card" style="border-left:4px solid var(--warn)"><h3 style="margin-bottom:4px">Entwurf</h3><p class="meta">Diese Anfrage wurde noch nicht gesendet. Prüfe die Positionen und sende sie, um einen Anforderungslink zu erzeugen.</p>' +
      (writable ? '<div class="card-actions"><button class="btn btn-secondary" data-act="orgEditRequest" data-id="' + r.id + '">Bearbeiten</button><button class="btn btn-primary" data-act="orgSendRequest" data-id="' + r.id + '">Anfrage prüfen & senden</button></div>' : '') + '</div>';
  }

  /* Link & E-Mail-Text (nach dem Senden) */
  if (r.token && st !== 'entwurf'){
    h += '<div class="card" style="margin-bottom:16px"><h3 style="margin-bottom:8px">Anforderungslink</h3>' +
      '<div class="src-text" style="max-height:none;user-select:all">' + esc(orgReqLink(r)) + '</div>' +
      '<div class="card-actions" style="justify-content:flex-start;margin-top:12px">' +
      '<button class="btn btn-secondary btn-sm" data-act="orgCopyLink" data-id="' + r.id + '">' + I.copy() + 'Link kopieren</button>' +
      '<button class="btn btn-secondary btn-sm" data-act="orgCopyEmail" data-id="' + r.id + '">' + I.mail() + 'E-Mail-Text kopieren</button>' +

      '<div class="sec-note">' + I.shieldCheck() + '<span>Der Link enthält nur einen zufälligen Token, keine Daten. Nichts wird automatisch versendet — du gibst ihn selbst weiter. Beta: Er öffnet die Anforderung nur auf diesem Gerät.</span></div></div>';
  }

  const rowP = (it) => {
    const unusual = itemUnusual(r, it);
    return '<div class="check-item"><span class="ci-status ' + (itemSensitive(it) ? 'ci-warn' : 'ci-info') + '">' + (it.kind === 'field' ? I.user() : I.file()) + '</span>' +

  if (r.received){

    if (accessEnded) h += '<div class="warn-banner">' + I.alert() + '<span><b>Zugriff beendet.</b> Die Person hat die Freigabe widerrufen oder sie ist abgelaufen — die Inhalte stehen nicht mehr zur Verfügung.</span></div>';
    else {
      h += '<p class="meta" style="margin-bottom:10px">Übermittelt am ' + r.received.at + '. Du siehst ausschließlich, was die Person ausdrücklich freigegeben hat.</p>' +

    }
    h += '</div></div>';
  }

  /* Versionsverlauf (Nachforderungen) */

/* ---------- Öffentliche Empfänger-Anfrageansicht (#/r?t=) ---------- */
function rcptReqError(title, msg){
  return '<div class="rcpt-wrap"><div class="rcpt-brand"><img src="formpilot_logo.svg" alt="FormPilot"></div>' +
    '<div class="card"><div class="empty-state"><span class="es-icon">' + I.alert() + '</span><div class="es-title">' + esc(title) + '</div><div class="es-sub">' + esc(msg) + '</div></div></div>' +
    '<div class="rcpt-footer">Über FormPilot · du entscheidest selbst, was du freigibst</div></div>';
}
VIEWS.r = function(){
  const tok = qp('t'), req = tok ? orgReqByToken(tok) : null;
  if (!req || req.status === 'entwurf') return rcptReqError('Anforderung nicht gefunden', 'Dieser Link ist ungültig. Bitte prüfe, ob du ihn vollständig kopiert hast.');
  if (req.status === 'widerrufen') return rcptReqError('Anforderung zurückgezogen', 'Das Unternehmen hat diese Anforderung zurückgezogen.');
  if (req.status === 'abgelaufen') return rcptReqError('Frist abgelaufen', 'Die Frist für diese Anforderung ist am ' + req.deadline + ' verstrichen. Bitte wende dich an das Unternehmen.');
  /* Öffnen protokollieren (einmalig je UI-Session) */
  S.ui.rReqOpened = S.ui.rReqOpened || {};
  if (!S.ui.rReqOpened[req.id]){
    S.ui.rReqOpened[req.id] = true;
    if (['gesendet'].includes(req.status)){ req.status = 'geoeffnet'; orgReqAccess(req, 'geoeffnet', ''); orgLog('anfrage', 'Anfrage „' + req.title + '“ wurde vom Empfänger geöffnet.'); }
    save();
  }
  const ver = orgReqVersion(req), items = ver.items, o = S.org;
  let h = '<div class="rcpt-wrap"><div class="rcpt-brand"><img src="formpilot_logo.svg" alt="FormPilot"></div>';
  h += '<div class="card" style="margin-bottom:14px"><span class="org-eyebrow">' + I.building() + esc(o.profile.displayName) + ' ' + (o.profile.verification === 'verified' ? verifyBadge('verified') : '') + '</span>' +
    '<h2 style="margin-bottom:4px">Anforderung von ' + esc(o.profile.displayName) + '</h2>' +
    '<p style="font-size:14.5px;color:var(--slate)">' + esc(o.profile.displayName) + ' bittet dich, die folgenden Angaben und Dokumente bereitzustellen. <b>Du entscheidest selbst, was du freigibst</b> — nichts wird automatisch übertragen.</p>' +
    '<div class="sum-block" style="margin-top:14px">' +
    '<div class="sum-item"><span class="l">Zweck</span><span class="r">' + esc(req.purpose || '—') + '</span></div>' +
    (req.contact ? '<div class="sum-item"><span class="l">Ansprechpartner</span><span class="r">' + esc(req.contact) + '</span></div>' : '') +
    (req.deadline ? '<div class="sum-item"><span class="l">Frist</span><span class="r mono">' + esc(req.deadline) + '</span></div>' : '') +
    (req.fileNumber ? '<div class="sum-item"><span class="l">Aktenzeichen</span><span class="r mono">' + esc(req.fileNumber) + '</span></div>' : '') +
    (o.profile.dpoContact ? '<div class="sum-item"><span class="l">Datenschutzkontakt</span><span class="r">' + esc(o.profile.dpoContact) + '</span></div>' : '') + '</div>' +
    (ver.consentRequired && req.versions.length > 1 ? '<div class="warn-banner" style="margin-top:12px">' + I.info() + '<span>Diese Anforderung wurde erweitert (Version ' + ver.versionNo + '). Für die zusätzlichen Positionen ist deine erneute Zustimmung nötig.</span></div>' : '') + '</div>';

  const rowR = (it) => { const unusual = itemUnusual(req, it); return '<div class="row" style="align-items:flex-start"><span class="fchip ' + (itemSensitive(it) ? 'fchip-warn' : 'fchip-marine') + '" style="width:34px;height:34px">' + (it.kind === 'field' ? I.user(16) : I.file(16)) + '</span>' +
    '<div class="grow"><div class="title" style="font-size:14.5px">' + esc(itemLabel(it)) + (it.optional ? ' <span style="color:var(--grayblue);font-weight:400;font-size:12.5px">(optional)</span>' : '') + (itemSensitive(it) ? ' ' + badge('teal', 'sensibel') : '') + '</div>' +
    '<div class="sub">Zweck: ' + esc(it.purpose || '—') + '</div>' + (unusual ? '<div class="unusual-note">' + I.info() + '<span>' + esc(unusual) + '</span></div>' : '') + '</div></div>'; };
  const rf = items.filter(i => i.kind === 'field'), rd = items.filter(i => i.kind === 'doc');
  h += '<div class="card" style="margin-bottom:14px"><h3 style="margin-bottom:6px">Angefragte Angaben (' + rf.length + ')</h3>' + (rf.length ? rf.map(rowR).join('') : '<p class="meta">Keine.</p>') + '</div>';
  h += '<div class="card" style="margin-bottom:14px"><h3 style="margin-bottom:6px">Angefragte Dokumente (' + rd.length + ')</h3>' + (rd.length ? rd.map(rowR).join('') : '<p class="meta">Keine.</p>') + '</div>';

  /* Aktionen */
  h += '<div class="card">';
  if (req.received && (!shareById(req.received.shareId) || shareStatus(shareById(req.received.shareId)) === 'aktiv')){
    h += '<div class="info-banner" style="margin-bottom:12px">' + I.check() + '<span>Du hast auf diese Anforderung bereits geantwortet. Du kannst die Freigabe in „Mein Bereich → Freigaben“ einsehen und widerrufen.</span></div>';
  }
  if (S.mode){
    h += '<p class="meta" style="margin-bottom:12px">Bearbeite die Anforderung mit FormPilot: prüfen, fehlende Angaben ergänzen, und kontrolliert freigeben.</p>' +
      '<button class="btn btn-primary" data-act="rReqProcess" data-id="' + req.id + '">' + I.logIn() + 'Mit FormPilot bearbeiten</button> ' +
      '<button class="btn btn-danger" data-act="rReqDecline" data-id="' + req.id + '">Anfrage ablehnen</button>';
  } else {
    h += '<p class="meta" style="margin-bottom:12px">Um zu antworten, öffne FormPilot. Du bestimmst dort selbst, was du freigibst.</p>' +
      '<button class="btn btn-primary" data-act="rReqToApp">FormPilot öffnen</button> ' +
      '<button class="btn btn-danger" data-act="rReqDecline" data-id="' + req.id + '">Anfrage ablehnen</button>';
  }
  h += '</div>';
  h += '<div class="rcpt-footer">Über FormPilot bereitgestellt · keine Anmeldung nötig · du entscheidest selbst, was du freigibst.<br>Datenschutzkontakt des Unternehmens: ' + esc(o.profile.dpoContact || '—') + '</div></div>';
  return h;
};

  orgBuilderTpl(el){

document.addEventListener('change', e => {
  const t = e.target;
  if (S.org && S.org.ui.builder && t.classList && t.classList.contains('ob-optional')){ const it = S.org.ui.builder.items[+t.getAttribute('data-idx')]; if (it) it.optional = t.checked; }
});

/* ---------- Verknüpfung Privatfreigabe → Unternehmensanfrage ---------- */
function orgFulfillFromShare(orgLink, sh){
  if (!S.org || !orgLink) return;
  const req = orgReqById(orgLink.requestId); if (!req) return;
  const cur = shareCurrentVersion(sh);
  req.received = { at:today(), shareId:sh.id,
    fields:cur.fields.map(f => ({ label:f.label, value:f.value, sensitive:f.sensitive })),
    docs:cur.docs.map(d => ({ name:d.name, cat:d.cat, ext:d.ext, docId:d.docId, versionId:d.versionId })) };
  req.shareId = sh.id;
  /* Vollständig, wenn alle Pflichtpositionen der aktuellen Version abgedeckt sind. */
  const needFields = orgReqItems(req).filter(i => i.kind === 'field' && !i.optional).map(i => (FIELD_DEFS[i.fieldKey] || { label:i.fieldKey }).label);
  const needDocs = orgReqItems(req).filter(i => i.kind === 'doc' && !i.optional).map(i => i.label.toLowerCase());
  const haveFields = req.received.fields.map(f => f.label);
  const haveDocs = req.received.docs.map(d => d.name.toLowerCase());
  const fieldsOk = needFields.every(l => haveFields.includes(l));
  const docsOk = needDocs.every(l => haveDocs.some(h => h.includes(l.split(' ')[0])));
  const complete = fieldsOk && docsOk;
  req.status = complete ? 'uebermittelt' : 'teilweise';
  orgReqAccess(req, complete ? 'uebermittelt' : 'teilweise', 'Antwort über Freigabe erhalten (' + req.received.fields.length + ' Angaben, ' + req.received.docs.length + ' Dokumente).');
  orgLog('anfrage', 'Antwort zu „' + req.title + '“ erhalten — ' + (complete ? 'vollständig' : 'teilweise') + '.');
}

/* ---------- Start ---------- */
purgeTrash();
render();
ensureDemoFiles().then(() => { if (S.mode === 'demo') render(); });
