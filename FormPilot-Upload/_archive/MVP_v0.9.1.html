<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FormPilot — Dokumente. Daten. Freigaben.</title>
<meta name="description" content="FormPilot ist der sichere persönliche Assistent für Daten, Dokumente und Formulare. Testversion — Feedback willkommen.">
<meta property="og:title" content="FormPilot — Dokumente. Daten. Freigaben.">
<meta property="og:description" content="Daten einmal hinterlegen, Anforderungen schneller erledigen, Freigaben behalten die Kontrolle. Beta-Test.">
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill="%2312324A" d="M12 1 3 4v7c0 6 4.5 10 9 12 4.5-2 9-6 9-12V4Z"/><path fill="none" stroke="%231FA38F" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" d="m8 12 3 3 5-6"/></svg>'>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0B1F30; --marine:#12324A; --night:#071927;
  --teal:#1FA38F; --teal-light:#58C7B4; --teal-surface:#E4F4F0;
  --bg:#F7FAFC; --line:#DCE7EF; --grayblue:#9AAFC0; --slate:#5F7485; --body:#33475B;
  --ok:#1E7D4F; --ok-bg:#E9F5EE; --warn:#9A6200; --warn-bg:#FBF3E3;
  --err:#B42318; --err-bg:#FBEDEB; --info:#22608C; --info-bg:#EAF2F8;
  --nav-active:#EAF1F6;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'Inter',-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--body);font-size:15px;line-height:1.6}
h1{font-size:28px;font-weight:700;letter-spacing:-0.5px;color:var(--ink);line-height:1.3}
h2{font-size:22px;font-weight:700;letter-spacing:-0.3px;color:var(--ink);line-height:1.3}
h3{font-size:17px;font-weight:600;color:var(--ink);line-height:1.4}
h4{font-size:14.5px;font-weight:600;color:var(--ink)}
a{color:var(--teal);text-decoration:none;cursor:pointer}
a:hover{text-decoration:underline}
svg{flex-shrink:0}
.page-head{margin-bottom:28px}
.page-sub{color:var(--slate);margin-top:4px}
.section{margin-top:36px}
.section-title{margin-bottom:14px}

/* Layout */
#sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:#fff;border-right:1px solid var(--line);padding:22px 12px 16px;display:flex;flex-direction:column;z-index:30}
.side-logo{padding:0 10px 20px;border-bottom:1px solid var(--line);margin-bottom:14px}
.side-logo img{width:172px;display:block}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:8px;color:var(--slate);font-size:14.5px;font-weight:500;cursor:pointer;border-left:3px solid transparent;margin-bottom:2px}
.nav-item svg{width:20px;height:20px}
.nav-item:hover{background:var(--bg)}
.nav-item.active{background:var(--nav-active);color:var(--marine);font-weight:600;border-left-color:var(--marine)}
.side-foot{margin-top:auto;padding:14px 12px 0;border-top:1px solid var(--line);font-size:12.5px;color:var(--grayblue)}
.side-foot a{color:var(--slate);font-size:12.5px;display:inline-block;margin-top:4px}
main{margin-left:240px;padding:36px 28px 110px}
.content{max-width:960px;margin:0 auto}
.narrow{max-width:640px}

/* Cards */
.card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:22px 24px}
.cards{display:grid;gap:16px}
.grid-2{grid-template-columns:1fr 1fr}
.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px}
.card .meta{font-size:13px;color:var(--slate)}
.card-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;flex-wrap:wrap}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:46px;padding:0 20px;border-radius:8px;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;cursor:pointer;border:1px solid transparent;white-space:nowrap}
.btn svg{width:18px;height:18px}
.btn-primary{background:var(--marine);color:#fff}
.btn-primary:hover{background:var(--night)}
.btn-primary[disabled]{opacity:.4;cursor:not-allowed}
.btn-primary[disabled]:hover{background:var(--marine)}
.btn-secondary{background:#fff;border-color:var(--line);color:var(--marine)}
.btn-secondary:hover{background:var(--bg)}
.btn-danger{background:#fff;border-color:var(--err);color:var(--err)}
.btn-danger:hover{background:var(--err-bg)}
.btn-danger-solid{background:var(--err);color:#fff}
.btn-danger-solid:hover{background:#9A1C13}
.btn-sm{height:36px;padding:0 14px;font-size:13.5px}
.link-btn{background:none;border:none;color:var(--teal);font:500 13.5px 'Inter',sans-serif;cursor:pointer;padding:0}
.link-btn:hover{text-decoration:underline}

/* Badges */
.badge{display:inline-flex;align-items:center;border-radius:999px;padding:3px 11px;font-size:12.5px;font-weight:600;white-space:nowrap}
.badge-ok{background:var(--ok-bg);color:var(--ok)}
.badge-warn{background:var(--warn-bg);color:var(--warn)}
.badge-err{background:var(--err-bg);color:var(--err)}
.badge-info{background:var(--info-bg);color:var(--info)}
.badge-neutral{background:var(--nav-active);color:var(--slate)}
.badge-teal{background:var(--teal-surface);color:#0E7A6A}

/* Forms */
.field{margin-bottom:20px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--marine);margin-bottom:6px}
input[type=text],input[type=date],select,textarea{width:100%;height:46px;border:1px solid var(--line);border-radius:8px;padding:0 12px;font-family:'Inter',sans-serif;font-size:15px;color:var(--ink);background:#fff}
textarea{height:auto;padding:12px;line-height:1.55;min-height:150px;resize:vertical}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--marine);box-shadow:0 0 0 3px rgba(18,50,74,0.12)}
input.invalid{border-color:var(--err)}
.help{font-size:13px;color:var(--slate);margin-top:6px;line-height:1.5}
.error-text{font-size:13px;font-weight:500;color:var(--err);margin-top:6px}
.check-line{display:flex;align-items:flex-start;gap:10px;font-size:14.5px;color:var(--body);cursor:pointer}
.check-line input{width:20px;height:20px;accent-color:var(--marine);margin-top:2px;flex-shrink:0}

/* Notes & banners */
.sec-note{display:flex;gap:9px;align-items:flex-start;font-size:13px;color:var(--slate);line-height:1.5;margin-top:16px}
.sec-note svg{width:16px;height:16px;color:var(--teal);margin-top:2px}
.info-banner{display:flex;gap:10px;align-items:flex-start;background:var(--info-bg);color:var(--info);padding:13px 16px;border-radius:10px;font-size:14px;line-height:1.5}
.info-banner svg{width:18px;height:18px;margin-top:2px}
.info-banner b{font-weight:600}

/* Progress */
.progress-wrap{margin:18px 0 26px}
.progress-label{display:flex;justify-content:space-between;font-size:13.5px;font-weight:600;color:var(--ink);margin-bottom:8px}
.progress{height:6px;background:var(--line);border-radius:999px;overflow:hidden}
.progress>div{height:6px;background:var(--teal);border-radius:999px;transition:width .3s}

/* Rows / lists */
.row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.row .grow{flex:1;min-width:0}
.row .title{font-weight:600;color:var(--ink);font-size:15px}
.row .sub{font-size:13px;color:var(--slate);margin-top:1px}
.doc-icon{width:40px;height:40px;border-radius:8px;background:var(--bg);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--slate);font-size:10.5px;font-weight:700;letter-spacing:.3px}
.mono{font-variant-numeric:tabular-nums}

/* Key-value (Profil) */
.kv{padding:13px 0;border-bottom:1px solid var(--line)}
.kv:last-child{border-bottom:none}
.kv-top{display:flex;align-items:flex-start;gap:12px}
.kv-label{font-size:13px;color:var(--slate);width:210px;flex-shrink:0;padding-top:2px}
.kv-value{flex:1;font-size:15px;color:var(--ink);font-weight:500;min-width:0;overflow-wrap:anywhere}
.kv-value.empty{color:var(--grayblue);font-weight:400}
.kv .icon-btn{margin-left:auto}
.kv-help{font-size:13px;color:var(--slate);margin-top:5px;line-height:1.5}
.kv-used{font-size:12.5px;color:var(--grayblue);margin-top:3px}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--slate);padding:6px;border-radius:6px;display:inline-flex}
.icon-btn:hover{background:var(--bg);color:var(--marine)}
.icon-btn svg{width:17px;height:17px}
.edit-box{margin-top:10px}
.edit-actions{display:flex;gap:10px;margin-top:12px}

/* Upload */
.upload-zone{border:1.5px dashed var(--grayblue);background:var(--bg);border-radius:10px;padding:34px 20px;text-align:center;cursor:pointer;transition:background .15s,border-color .15s}
.upload-zone:hover{background:#F0F6FA}
.upload-zone.drag{border-color:var(--teal);background:var(--teal-surface)}
.upload-zone .uz-title{font-weight:600;color:var(--ink);font-size:15px}
.upload-zone .uz-sub{font-size:13px;color:var(--slate);margin-top:4px}
.uz-secure{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#0E7A6A;font-weight:500;margin-top:12px}
.uz-secure svg{width:15px;height:15px}

/* Chips (Kategorien) */
.chips{display:flex;gap:8px;flex-wrap:wrap;margin:20px 0 8px}
.chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 14px;font-size:13.5px;font-weight:500;color:var(--slate);cursor:pointer}
.chip.active{background:var(--marine);border-color:var(--marine);color:#fff}

/* Checklist (Anforderung) */
.check-item{display:flex;align-items:flex-start;gap:14px;padding:16px 0;border-bottom:1px solid var(--line)}
.check-item:last-child{border-bottom:none}
.ci-status{width:34px;height:34px;border-radius:999px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.ci-status svg{width:17px;height:17px}
.ci-ok{background:var(--ok-bg);color:var(--ok)}
.ci-warn{background:var(--warn-bg);color:var(--warn)}
.ci-err{background:var(--err-bg);color:var(--err)}
.ci-info{background:var(--info-bg);color:var(--info)}
.ci-actions{display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap}

/* Table */
table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
th{background:var(--bg);text-align:left;font-size:13px;font-weight:600;color:var(--slate);padding:10px 14px;border-bottom:1px solid var(--line)}
td{padding:12px 14px;border-bottom:1px solid var(--line);font-size:14px;color:var(--body);vertical-align:top}
tr:last-child td{border-bottom:none}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(7,25,39,0.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px}
.modal{background:#fff;border-radius:10px;max-width:460px;width:100%;padding:26px;box-shadow:0 8px 24px rgba(7,25,39,0.12);max-height:calc(100vh - 32px);max-height:calc(100dvh - 32px);overflow-y:auto}
.modal h3{font-size:18px;margin-bottom:10px}
.modal .modal-body{font-size:14.5px;line-height:1.6;color:var(--body)}
.modal .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:24px}

/* Toast */
#toast-root{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:60;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{background:var(--ink);color:#fff;padding:12px 22px;border-radius:8px;font-size:14px;font-weight:500;box-shadow:0 8px 24px rgba(7,25,39,0.22);animation:toastin .25s ease}
@keyframes toastin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Success */
.success-panel{text-align:center;padding:44px 24px}
.success-icon{width:56px;height:56px;border-radius:999px;background:var(--teal-surface);color:var(--teal);display:inline-flex;align-items:center;justify-content:center;margin-bottom:18px}
.success-icon svg{width:26px;height:26px}

/* Summary list (Freigabe Schritt 3) */
.sum-block{border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:16px}
.sum-head{background:var(--bg);padding:10px 16px;font-size:13px;font-weight:600;color:var(--slate);border-bottom:1px solid var(--line)}
.sum-item{display:flex;justify-content:space-between;gap:14px;padding:11px 16px;border-bottom:1px solid var(--line);font-size:14.5px}
.sum-item:last-child{border-bottom:none}
.sum-item .l{color:var(--slate)}
.sum-item .r{color:var(--ink);font-weight:500;text-align:right;overflow-wrap:anywhere}

/* Bottom nav (mobile) */
#bottomnav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);z-index:40;padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10.5px;font-weight:500;color:var(--slate);padding:7px 0 5px;border-radius:8px;cursor:pointer}
.bn-item svg{width:21px;height:21px}
.bn-item.active{color:var(--marine);font-weight:600}
#mobilehead{display:none;align-items:center;justify-content:center;padding:14px 16px 4px}
#mobilehead img{width:148px}

body.gate #sidebar,body.gate #bottomnav,body.gate #mobilehead{display:none}
body.gate main{margin-left:0}
input[type=password],input[type=email]{width:100%;height:46px;border:1px solid var(--line);border-radius:8px;padding:0 12px;font-family:'Inter',sans-serif;font-size:15px;color:var(--ink);background:#fff}
.login-wrap{max-width:420px;margin:9vh auto 0}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo img{width:190px}
.person-block{margin:0 2px 14px;padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:var(--bg);cursor:pointer}
.person-block .pb-label{font-size:11.5px;font-weight:600;color:var(--grayblue);letter-spacing:.2px}
.person-block .pb-name{display:flex;align-items:center;justify-content:space-between;font-size:14px;font-weight:600;color:var(--marine);margin-top:2px}
.side-search{margin:0 2px 14px}
.side-search input{height:38px;font-size:13.5px}
.goal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.goal-grid{grid-template-columns:1fr}}
.goal-card{border:1px solid var(--line);border-radius:10px;background:#fff;padding:16px;cursor:pointer;font-weight:600;font-size:14.5px;color:var(--ink)}
.goal-card:hover{background:var(--bg)}
.goal-card.sel{border-color:var(--marine);background:var(--nav-active)}
.goal-card .sub{display:block;font-weight:400;font-size:12.5px;color:var(--slate);margin-top:3px}
.mini-progress{display:flex;align-items:center;gap:10px}
.mini-progress .progress{flex:1}
.person-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.fchip{width:40px;height:40px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.fchip svg{width:20px;height:20px}
.fchip-teal{background:var(--teal-surface);color:#0E7A6A}
.fchip-info{background:var(--info-bg);color:var(--info)}
.fchip-ok{background:var(--ok-bg);color:var(--ok)}
.fchip-marine{background:var(--nav-active);color:var(--marine)}
.fchip-solid{background:var(--marine);color:#fff}
.fchip-warn{background:var(--warn-bg);color:var(--warn)}
.fn-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:700px){.fn-grid{grid-template-columns:1fr 1fr}}
.fn-tile{border:1px solid var(--line);border-radius:10px;background:#fff;padding:16px;cursor:pointer;display:flex;flex-direction:column;gap:10px}
.fn-tile:hover{background:var(--bg)}
.fn-tile .t{font-weight:600;font-size:14.5px;color:var(--ink);line-height:1.35}
.fn-tile .s{font-size:12.5px;color:var(--slate);line-height:1.45}
.head-flex{display:flex;gap:14px;align-items:flex-start}
.head-flex .fchip{margin-top:3px}
.beta-tag{display:inline-block;background:var(--info-bg);color:var(--info);border-radius:999px;padding:2px 9px;font-size:11px;font-weight:600;letter-spacing:.3px;margin:0 2px 12px}
#mobilehead{justify-content:space-between}
#mobilehead .mh-actions{display:flex;gap:4px}
/* Tastatur-Fokus sichtbar (Maus-Klicks bleiben ohne Ring) */
button:focus-visible,a:focus-visible,[role=button]:focus-visible,.chip:focus-visible,label.check-line:focus-within input{outline:2px solid var(--marine);outline-offset:2px}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}
}
@media(max-width:900px){
  #sidebar{display:none}
  input[type=text],input[type=date],input[type=password],input[type=email],select,textarea{font-size:16px}
  main{margin-left:0;padding:20px 16px 110px}
  #bottomnav{display:flex}
  #mobilehead{display:flex}
  .grid-2{grid-template-columns:1fr}
  .kv-top{flex-wrap:wrap}
  .kv-label{width:100%;padding-top:0}
  h1{font-size:24px}
  .btn-sm{height:44px}
  .icon-btn{padding:11px}
  .card{padding:18px 16px}
  .card[style*="padding:6px 24px"]{padding:2px 16px!important}
  table{display:block;overflow-x:auto}
}
</style>
</head>
<body>
<aside id="sidebar"></aside>
<div id="mobilehead"><img src="formpilot_logo.svg" alt="FormPilot — Dokumente. Daten. Freigaben."><span class="mh-actions" id="mh-actions"></span></div>
<main><div class="content" id="view"></div></main>
<nav id="bottomnav"></nav>
<input type="file" id="extract-file" style="display:none" accept=".pdf,.jpg,.jpeg,.png,image/*">
<input type="file" id="extract-cam" style="display:none" accept="image/*" capture="environment">
<form name="feedback" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
  <input type="text" name="bot-field"><input type="text" name="verstaendlich"><input type="text" name="vertrauen">
  <input type="text" name="nutzen"><textarea name="unklar"></textarea><textarea name="fehlt"></textarea><textarea name="verbessern"></textarea>
  <input type="text" name="name"><input type="text" name="kontakt"><input type="text" name="testphase">
</form>
<div id="modal-root"></div>
<div id="toast-root" role="status" aria-live="polite"></div>
<script>
'use strict';
/* ---------- Icons (Lucide, 1.75px Strich) ---------- */
const ic = (paths, size) => '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"' + (size ? ' style="width:'+size+'px;height:'+size+'px"' : '') + '>' + paths + '</svg>';
const I = {
  home: p => ic('<path d="M3 9.5 12 3l9 6.5V20a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 20Z"/><path d="M9 21.5V12h6v9.5"/>', p),
  clipboard: p => ic('<rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="m9 14 2 2 4-4"/>', p),
  archive: p => ic('<rect x="2" y="4" width="20" height="5" rx="1"/><path d="M4 9v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9"/><path d="M10 13h4"/>', p),
  user: p => ic('<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>', p),
  send: p => ic('<path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/>', p),
  shield: p => ic('<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>', p),
  shieldCheck: p => ic('<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/>', p),
  upload: p => ic('<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m17 8-5-5-5 5"/><path d="M12 3v12"/>', p),
  file: p => ic('<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/>', p),
  check: p => ic('<path d="m20 6-11 11-5-5"/>', p),
  alert: p => ic('<path d="m21.73 18-8-14a2 2 0 0 0-3.46 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>', p),

const KEY = 'formpilot-mvp-v7';
/* State-Migration: ältere/unvollständige gespeicherte Stände werden ergänzt statt verworfen.
   Nur bei unbrauchbarer Grundstruktur wird auf die Seed-Daten zurückgesetzt. */
function migrateState(raw){
  const seed = seedState();
  if (!raw || typeof raw !== 'object' || !Array.isArray(raw.persons) || !raw.persons.length) return seed;
  for (const k of Object.keys(seed)){
    const sv = seed[k], rv = raw[k];
    if (rv === undefined || rv === null || Array.isArray(sv) !== Array.isArray(rv) || typeof sv !== typeof rv){
      raw[k] = sv;
    } else if (!Array.isArray(sv) && typeof sv === 'object'){
      for (const k2 of Object.keys(sv)) if (rv[k2] === undefined) rv[k2] = sv[k2];
    }
  }
  if (!raw.persons.some(p => p.id === raw.activePerson)) raw.activePerson = raw.persons[0].id;
  /* Transiente UI-Zustände zurücksetzen (z. B. Reload mitten in einem simulierten Upload) */
  raw.ui.upload = null; raw.ui.formUpload = null;
  if (raw.ui.analysis && Array.isArray(raw.ui.analysis.items)) raw.ui.analysis.items.forEach(i => { i.uploading = false; });
  else if (raw.ui.analysis) raw.ui.analysis = null;
  return raw;
}
let S;
try { S = migrateState(JSON.parse(localStorage.getItem(KEY))); } catch(e){ S = seedState(); }
function save(){ try { localStorage.setItem(KEY, JSON.stringify(S)); } catch(e){} }

function parseDE(d){ const m = /^(\d{2})\.(\d{2})\.(\d{4})$/.exec(d||''); return m ? new Date(+m[3], +m[2]-1, +m[1]) : null; }
function addDays(n){ const t = new Date(2026,6,3); t.setDate(t.getDate()+n); return String(t.getDate()).padStart(2,'0')+'.'+String(t.getMonth()+1).padStart(2,'0')+'.'+t.getFullYear(); }

/* Tastatur & Screenreader: div/a-Elemente mit data-act fokussier- und bedienbar machen */
function enhanceA11y(){
  for (const el of document.querySelectorAll('[data-act]')){
    const tag = el.tagName;
    if (tag === 'BUTTON' || tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA' || tag === 'LABEL') continue;
    if (!el.hasAttribute('tabindex')) el.setAttribute('tabindex','0');
    if (!el.hasAttribute('role')) el.setAttribute('role','button');
  }
  for (const el of document.querySelectorAll('.icon-btn[title]'))
    if (!el.hasAttribute('aria-label')) el.setAttribute('aria-label', el.getAttribute('title'));
}

function gatedInfoPage(){
  return '<div style="max-width:960px;margin:20px auto 40px">' +
    '<div style="margin-bottom:20px"><button class="btn btn-secondary" data-act="gateBack">Zurück zur Anmeldung</button></div>' +
    VIEWS.datenschutz() + '</div>';
}

let lastRenderedRoute = null;
function render(){
  const gated = !S.auth.loggedIn || !S.onboarding.done;
  document.body.classList.toggle('gate', gated);
  if (gated){
    $('#view').innerHTML = S.ui.gatePage === 'datenschutz' ? gatedInfoPage() : (!S.auth.loggedIn ? VIEWS.login() : VIEWS.onboarding());
    enhanceA11y(); window.scrollTo(0,0); lastRenderedRoute = null; save(); return;
  }
  document.body.style.zoom = (S.settings && S.settings.fontZoom !== 100) ? (S.settings.fontZoom / 100) : '';
  try { renderNav(); } catch(e){}
  const r = route();
  const v = VIEWS[r] || VIEWS.dashboard;
  try {
    $('#view').innerHTML = v();
  } catch(err){
    $('#view').innerHTML = '<div class="card narrow" style="margin:60px auto;text-align:center"><h3>Da ist etwas schiefgelaufen.</h3>' +
      '<p style="margin-top:8px">Deine Demo-Daten sind davon nicht betroffen. Lade die Seite neu — oder setze die Demo zurück, falls es erneut passiert.</p>' +
      '<div style="display:flex;gap:10px;justify-content:center;margin-top:20px"><button class="btn btn-secondary" data-act="resetDemo">Demo zurücksetzen</button>' +
      '<button class="btn btn-primary" onclick="location.reload()">Seite neu laden</button></div></div>';
  }
  enhanceA11y();
  if (lastRenderedRoute !== r) window.scrollTo(0,0);
  lastRenderedRoute = r;
  save();
}
let errorRendering = false;
window.addEventListener('error', () => {
  if (errorRendering) return;
  errorRendering = true;
  try { render(); } catch(e){}
  setTimeout(() => { errorRendering = false; }, 300);
});
window.addEventListener('hashchange', render);

  const items = [];
  for (const c of CATALOG){
    if (!c.rx.test(text)) continue;
    const item = { key:c.key, label:c.label, type:c.type, fieldId:c.fieldId||null, docName:c.docName||null, included:true, unusual:!!c.unusual, note:'', status:'fehlt' };
    if (c.type === 'data'){
      const f = findField(c.fieldId);
      if (!f || !f.value){ item.status = 'fehlt'; item.note = 'Diese Angabe ist in deinem Profil noch nicht hinterlegt.'; }
      else if (f.needsReview){ item.status = 'pruefen'; item.note = 'Zuletzt aktualisiert im Mai 2025. Bitte bestätige, dass die Angabe noch stimmt.'; item.value = f.value; }
      else { item.status = 'vorhanden'; item.value = f.value; }
    } else {
      const d = personDocs().find(x => x.name === c.docName);
      if (!d){ item.status = 'hochladen'; item.note = 'Dieses Dokument ist noch nicht in deinem Dokumentensafe vorhanden.'; }
      else {
        const days = d.validUntil ? daysUntil(d.validUntil) : null;
        if (days !== null && days < 0){ item.status = 'hochladen'; item.note = 'Das hinterlegte Dokument ist abgelaufen. Bitte lade eine aktuelle Version hoch.'; }
        else if (days !== null && days <= 45){ item.status = 'pruefen'; item.note = 'Das Dokument läuft am ' + d.validUntil + ' ab. Für einen Vertragsbeginn am 01.08. kann eine aktuelle Version nötig sein.'; item.docId = d.id; }
        else { item.status = 'vorhanden'; item.docId = d.id; }
      }
    }
    if (item.unusual) item.note = 'Diese Anforderung wirkt für diesen Zweck ungewöhnlich. Prüfe, ob sie wirklich erforderlich ist.' + (item.note ? ' ' + item.note : '');
    items.push(item);
  }
  let recipient = 'Unbekannter Absender';
  const rm = text.match(/([A-ZÄÖÜ][\wäöüß.\- ]{2,40}(?:GmbH|AG|KG|e\.V\.|Universität|Hochschule|Krankenkasse|Versicherung|Autovermietung|Pflegekasse|Bank))/);
  if (rm) recipient = rm[1].trim().replace(/^(MfG|Mit freundlichen Grüßen|Viele Grüße|Freundliche Grüße|Beste Grüße|Ihre?|Team)[ ,]+/i, '');
  else if (/stadt\s+\w+/i.test(text)) recipient = text.match(/Stadt\s+\w+/i)[0];
  let deadline = null;
  const dm = text.match(/bis (?:zum |spätestens )?(\d{2}\.\d{2}\.\d{4})/i);
  if (dm) deadline = dm[1];
  return { recipient, deadline, items, decided:false };
}

function simulateUpload(get, done){
  let p = 0;
  const tick = () => {
    p += 34;
    if (p >= 100){ get().uploadProgress = 100; done(); render(); }
    else { get().uploadProgress = p; render(); setTimeout(tick, 320); }
  };
  get().uploadProgress = 0; render(); setTimeout(tick, 320);
}

function validateField(f, v){
  if (!v) return 'Bitte gib einen Wert ein.';
  if (f.id === 'steuerid'){ const dg = v.replace(/\D/g,''); if (dg.length !== 11) return 'Die Steuer-ID muss 11 Ziffern haben. Aktuell sind es ' + dg.length + '.'; }
  if (f.id === 'iban'){ const c = v.replace(/\s/g,''); if (!/^DE\d{20}$/i.test(c)) return 'Eine deutsche IBAN beginnt mit DE und hat 22 Stellen. Bitte prüfe deine Eingabe.'; }
  if (f.id === 'svnr' && v.replace(/\s/g,'').length < 10) return 'Die SV-Nummer ist zu kurz. Bitte prüfe die Eingabe — sie steht auf deinem Sozialversicherungsausweis.';
  return null;
}

function ensureCase(a){
  let c = a.caseId ? S.cases.find(x => x.id === a.caseId) : null;
  if (!c) c = S.cases.find(x => x.recipient === a.recipient && x.status !== 'gesendet' && x.status !== 'abgelehnt');

    S.cases.unshift(c);
  }

function caseAnalysis(c){
  if (!c.reqText) return null;
  const keep = S.activePerson; S.activePerson = c.personId;
  const a = analyzeText(c.reqText);
  S.activePerson = keep;
  return a;
}
function computeTasks(){
  const t = [];
  for (const c of S.cases){
    if (c.status !== 'offen' && c.status !== 'teilweise') continue;
    const d = daysUntil(c.deadline);
    t.push({ prio: d !== null && d <= 14 ? 'dringend' : 'hoch', text:'Vorgang „' + c.title + '“' + (c.deadline ? ' — Frist ' + c.deadline : ''), act:'openCase', id:c.id });
  }
  for (const pp of S.persons) for (const g of pp.profile) for (const f of g.fields){
    if (!f.value && !/optional/i.test(f.label)) t.push({ prio:'mittel', text:f.label + ' fehlt (' + firstName(pp) + ')', act:'goProfil', person:pp.id });
    else if (f.needsReview) t.push({ prio:'mittel', text:f.label + ' bestätigen (' + firstName(pp) + ')', act:'goProfil', person:pp.id });
  }
  for (const k of S.conflicts) t.push({ prio:'hoch', text:'Datenkonflikt: ' + k.text.replace('deinem Profil','Profil (' + firstName(S.persons.find(x=>x.id===k.personId)) + ')'), act:'goProfil', person:k.personId });
  for (const d of S.documents){
    const dd = d.validUntil ? daysUntil(d.validUntil) : null;
    if (dd !== null && dd <= 45) t.push({ prio: dd < 0 ? 'hoch' : 'mittel', text:'„' + d.name + '“ läuft am ' + d.validUntil + ' ab', act:'nav', route:'safe' });
  }
  for (const s of S.shares){
    if (s.status !== 'aktiv') continue;
    const dd = daysUntil(s.expires);
    if (dd !== null && dd <= 14) t.push({ prio:'niedrig', text:'Freigabe an ' + s.recipient + ' läuft am ' + s.expires + ' ab', act:'nav', route:'freigaben' });
  }
  const order = { dringend:0, hoch:1, mittel:2, niedrig:3 };
  return t.sort((a,b) => order[a.prio] - order[b.prio]).slice(0,6);
}

function scenarioRows(max){
  const rows = [];
  for (const sc of SCENARIOS){
    const rel = sc.fields.filter(id => findField(id) !== null);
    if (rel.length < 3) continue;
    const filled = rel.filter(id => { const f = findField(id); return f && f.value && !f.needsReview; });
    const pct = Math.round(filled.length / rel.length * 100);
    const missing = rel.filter(id => !filled.includes(id)).map(id => findField(id).label);
    rows.push('<div class="kv"><div class="kv-top"><div class="kv-label">' + sc.name + '</div>' +
      '<div class="kv-value"><div class="mini-progress"><div class="progress"><div style="width:' + pct + '%"></div></div><span style="font-size:13px;font-weight:600;color:' + (pct === 100 ? 'var(--ok)' : 'var(--slate)') + '">' + pct + ' %</span></div>' +
      (missing.length ? '<div class="kv-help">Es fehlt: ' + esc(missing.join(', ')) + '</div>' : '') + '</div></div></div>');
    if (rows.length >= max) break;
  }
  return rows.join('') || '<p class="meta">Keine passenden Szenarien für dieses Profil.</p>';
}
function detectDoc(fname){
  const n = fname.toLowerCase();
  if (/immatrikulation|studienbescheinigung/.test(n)) return { cat:'Bildung', valid:'31.03.2027' };
  if (/ausweis|reisepass|pass\b/.test(n)) return { cat:'Ausweise', valid:'08.11.2030' };
  if (/vollmacht|betreuung|patientenverf/.test(n)) return { cat:'Familie', valid:'' };
  if (/lebenslauf|cv/.test(n)) return { cat:'Arbeit', valid:'' };
  if (/miet/.test(n)) return { cat:'Wohnen', valid:'' };
  if (/versicherung|police|haftpflicht/.test(n)) return { cat:'Versicherung', valid:'' };
  if (/pflege|bescheid|arzt/.test(n)) return { cat:'Gesundheit', valid:'' };
  if (/sozialversicherung|sv[-_ ]?ausweis|gehalt|lohn/.test(n)) return { cat:'Arbeit', valid:'' };
  if (/konto|iban|bank/.test(n)) return { cat:'Bank', valid:'' };
  return null;
}

/* ---------- Pakete ---------- */

        '<div style="font-size:14px"><span style="color:var(--slate)">Angaben:</span> ' + (pk.fieldIds.map(id => { const f = findField(id); return f ? esc(f.label) : ''; }).filter(Boolean).join(', ') || '—') + '</div>' +
        '<div class="card-actions"><button class="btn btn-secondary btn-sm" data-act="pkgPreview" data-pkg="' + pk.id + '">' + I.eye(15) + 'Vorschau</button>' +

        '<button class="btn btn-secondary btn-sm" data-act="pkgShare" data-pkg="' + pk.id + '">' + I.send(15) + 'Freigeben</button>' +

/* ---------- Suche ---------- */
VIEWS.suche = function(){
  const q = (S.ui.search || '').toLowerCase().trim();
  const searchBox = '<div class="card" style="padding:14px 16px;margin-bottom:16px"><input type="text" id="page-search" placeholder="Suchen — dann Enter drücken" value="' + esc(S.ui.search) + '"></div>';
  const chips = '<div class="chips" style="margin-top:0">' + ['Was läuft bald ab?','Steuer','Opa Pflege','Immatrikulation','IBAN'].map(x => '<button class="chip" data-act="quickSearch" data-q="' + x + '">' + x + '</button>').join('') + '</div>';
  if (!q) return '<div class="page-head"><h1>Suche</h1><p class="page-sub">Suche nach Dokumenten, Angaben, Vorgängen, Paketen und Freigaben.</p></div>' + searchBox + chips + '<div class="card"><p class="meta">Gib oben links einen Suchbegriff ein — oder wähle einen Vorschlag.</p></div>';
  if (/läuft.*ab|ablauf/.test(q)){
    const exp = S.documents.filter(d => d.validUntil && daysUntil(d.validUntil) !== null && daysUntil(d.validUntil) <= 90);
    const shs = S.shares.filter(s => s.status === 'aktiv' && daysUntil(s.expires) !== null && daysUntil(s.expires) <= 90);
    return '<div class="page-head"><h1>Suche</h1><p class="page-sub">Das läuft in den nächsten 90 Tagen ab:</p></div>' + searchBox + chips +
      '<div class="cards"><div class="card"><div class="card-head"><h3>Dokumente (' + exp.length + ')</h3></div>' +
      (exp.map(d => '<div class="row"><div class="doc-icon">' + esc(d.ext) + '</div><div class="grow"><div class="title">' + esc(d.name) + '</div><div class="sub">' + esc(personName(d.personId)) + '</div></div>' + badge('warn','Läuft ab am ' + d.validUntil) + '</div>').join('') || '<p class="meta">Nichts.</p>') + '</div>' +
      '<div class="card"><div class="card-head"><h3>Freigaben (' + shs.length + ')</h3></div>' +
      (shs.map(s => '<div class="row"><div class="grow"><div class="title">' + esc(s.recipient) + '</div></div>' + badge('warn','Läuft ab am ' + s.expires) + '</div>').join('') || '<p class="meta">Nichts.</p>') + '</div></div>';
  }
  const docs = S.documents.filter(d => (d.name + ' ' + d.cat).toLowerCase().includes(q));
  const fields = [];
  for (const pp of S.persons) for (const g of pp.profile) for (const f of g.fields)
    if ((f.label + ' ' + f.value).toLowerCase().includes(q)) fields.push({ p:pp, f });
  const cases = S.cases.filter(c => (c.title + ' ' + c.recipient + ' ' + c.purpose).toLowerCase().includes(q));
  const shares = S.shares.filter(s => (s.recipient + ' ' + s.data.join(' ') + ' ' + s.docs.join(' ')).toLowerCase().includes(q));
  const pkgs = S.packages.filter(pk => pk.name.toLowerCase().includes(q));
  const total = docs.length + fields.length + cases.length + shares.length + pkgs.length;
  let out = '<div class="page-head"><h1>Suche</h1><p class="page-sub">' + total + ' Treffer für „' + esc(S.ui.search) + '“.</p></div>' + searchBox + chips + '<div class="cards">';
  if (docs.length) out += '<div class="card"><div class="card-head"><h3>Dokumente (' + docs.length + ')</h3></div>' + docs.map(d =>
    '<div class="row" style="cursor:pointer" data-act="searchDoc" data-person="' + (d.personId||'maurice') + '"><div class="doc-icon">' + esc(d.ext) + '</div><div class="grow"><div class="title">' + esc(d.name) + '</div><div class="sub">' + esc(personName(d.personId)) + ' · ' + esc(d.cat) + '</div></div>' + I.chevron(16) + '</div>').join('') + '</div>';
  if (fields.length) out += '<div class="card"><div class="card-head"><h3>Angaben (' + fields.length + ')</h3></div>' + fields.map(x =>
    '<div class="row" style="cursor:pointer" data-act="goProfil" data-person="' + x.p.id + '"><div class="grow"><div class="title">' + esc(x.f.label) + '</div><div class="sub">' + esc(x.p.name) + (x.f.value ? ' · ' + esc(x.f.value) : ' · noch nicht hinterlegt') + '</div></div>' + I.chevron(16) + '</div>').join('') + '</div>';
  if (cases.length) out += '<div class="card"><div class="card-head"><h3>Vorgänge (' + cases.length + ')</h3></div>' + cases.map(c =>
    '<div class="row" style="cursor:pointer" data-act="openCase" data-case="' + c.id + '"><div class="grow"><div class="title">' + esc(c.title) + '</div><div class="sub">' + esc(c.recipient) + '</div></div>' + caseBadge(c) + '</div>').join('') + '</div>';
  if (pkgs.length) out += '<div class="card"><div class="card-head"><h3>Pakete (' + pkgs.length + ')</h3></div>' + pkgs.map(pk =>
    '<div class="row" style="cursor:pointer" data-act="nav" data-route="pakete"><div class="grow"><div class="title">' + esc(pk.name) + '</div><div class="sub">' + esc(personName(pk.personId)) + '</div></div>' + I.chevron(16) + '</div>').join('') + '</div>';
  if (shares.length) out += '<div class="card"><div class="card-head"><h3>Freigaben (' + shares.length + ')</h3></div>' + shares.map(s =>
    '<div class="row" style="cursor:pointer" data-act="nav" data-route="freigaben"><div class="grow"><div class="title">' + esc(s.recipient) + '</div><div class="sub">' + s.date + '</div></div>' + shareBadge(s) + '</div>').join('') + '</div>';
  if (!total) out += '<div class="card"><p class="meta">Keine Treffer. Tipp: Suche nach Dokumentname, Person, Empfänger oder Feldname — zum Beispiel „Steuer-ID“ oder „Opa Pflege“.</p></div>';
  return out + '</div>';
};

/* ---------- Neue Aktionen ---------- */
Object.assign(FP, {
  /* Login / Onboarding */
  loginSubmit(){
    const pw = $('#login-pw').value;
    if (!pw){ $('#login-error').style.display = 'block'; $('#login-pw').classList.add('invalid'); return; }
    S.ui.loginStep = 2; render();
  },
  loginCode(){
    const c = $('#login-code').value.replace(/\D/g,'');
    if (c.length !== 6){ $('#login-error').style.display = 'block'; $('#login-code').classList.add('invalid'); return; }
    S.auth.loggedIn = true; S.ui.loginStep = 1;
    S.log.unshift({ date: today(), text:'Anmeldung in der Demo (Zwei-Faktor simuliert).' });
    render();
  },
  loginBack(){ S.ui.loginStep = 1; render(); },
  forgotPw(){ openModal({ title:'Passwort zurücksetzen', body:'Du erhältst einen Link zum Zurücksetzen per E-Mail an mauricewollmer@gmail.com.<br><br><span style="color:var(--slate);font-size:13px">Demo: Der Versand ist simuliert.</span>', confirmLabel:'Link senden', onConfirm(){ closeModal(); toast('Demo: Der Versand ist simuliert — es wird keine E-Mail verschickt.'); } }); },
  registerInfo(){ openModal({ title:'Konto erstellen', body:'In der Demo ist bereits ein Konto für Maurice Wollmer eingerichtet. Die Registrierung mit E-Mail-Verifizierung ist im Prototyp simuliert.', cancelLabel:'Verstanden' }); },
  logout(){ S.auth.loggedIn = false; S.ui.loginStep = 1; closeModal(); render(); },
  onbGoal(d){ S.onboarding.goal = d.goal; render(); },
  onbNext(){ S.onboarding.step = (S.onboarding.step || 0) + 1; render(); },
  onbFinish(){ S.onboarding.done = true; S.onboarding.step = 0; go('dashboard'); render(); },
  onbExtract(d){ S.onboarding.done = true; S.onboarding.step = 0; go('profil'); render(); setTimeout(() => d.src === 'cam' ? FP.extractCam() : FP.extractFile(), 80); },

  /* Personen */
  switchPerson(d){ S.activePerson = d.person; if (d.person === 'opa') S.flags.visitedOpa = true; S.ui.editing = null; S.ui.docFilter = 'Alle'; render(); },
  goProfil(d){ if (d.person) S.activePerson = d.person; go('profil'); render(); },
  searchDoc(d){ S.activePerson = d.person; S.ui.docFilter = 'Alle'; go('safe'); },
  personMenu(){
    openModal({ title:'Person wechseln', cancelLabel:'Schließen',
      body: S.persons.map(pp => '<div class="row" style="cursor:pointer" data-act="switchPersonModal" data-person="' + pp.id + '"><div class="grow"><div class="title">' + esc(pp.name) + '</div><div class="sub">' + esc(pp.relation) + (pp.note ? ' · ' + esc(pp.note) : '') + '</div></div>' + (pp.id === S.activePerson ? badge('teal','Aktiv') : I.chevron(16)) + '</div>').join('') +
      '<div class="card-actions" style="justify-content:flex-start;margin-top:12px"><button class="btn btn-secondary btn-sm" data-act="addPerson">' + I.plus(15) + 'Person hinzufügen</button></div>' });
  },
  switchPersonModal(d){ closeModal(); FP.switchPerson(d); },
  addPerson(){
    closeModal();
    openModal({ title:'Person hinzufügen', confirmLabel:'Person anlegen',
      body:'<p style="font-size:13.5px;color:var(--slate);margin-bottom:14px">Verwalte Unterlagen für Angehörige — mit klarer Trennung, wem was gehört.</p>' +
      '<div class="field"><label for="np-name">Name</label><input type="text" id="np-name" placeholder="Vorname Nachname"></div>' +
      '<div class="field" style="margin-bottom:0"><label for="np-rel">Beziehung</label><select id="np-rel">' + ['Mutter','Vater','Kind','Großmutter','Großvater','Partner','Sonstige Person'].map(x => '<option>' + x + '</option>').join('') + '</select>' +
      '<div class="help">Für Eltern und Großeltern empfiehlt sich eine hinterlegte Vollmacht.</div></div>',
      onConfirm(){
        const name = $('#np-name').value.trim();
        if (!name){ toast('Bitte gib einen Namen an.'); return; }
        const id = 'p' + Date.now();
        S.persons.push({ id, name, relation: $('#np-rel').value, profile:[
          { id:'identitaet', name:'Identität', fields:[
            { id:'vorname', label:'Vorname', value:name.split(' ')[0], help:'' },
            { id:'nachname', label:'Nachname', value:name.split(' ').slice(1).join(' '), help:'' },
            { id:'geburtsdatum', label:'Geburtsdatum', value:'', help:'', mono:true } ]},
          { id:'kontakt', name:'Kontakt', fields:[
            { id:'adresse', label:'Adresse', value:'', help:'' },
            { id:'telefon', label:'Telefon', value:'', help:'', mono:true } ]},
          { id:'versicherung', name:'Versicherung', fields:[
            { id:'krankenkasse', label:'Krankenkasse', value:'', help:'', sensitive:true } ]}
        ]});
        S.activePerson = id;
        S.log.unshift({ date: today(), text:'Profil für „' + name + '“ angelegt.' });
        closeModal(); go('profil'); toast('Profil angelegt. Ergänze jetzt die wichtigsten Angaben.');
      } });
  },

  /* Vorgänge */
  openCase(d){ S.ui.caseId = d.case; go('vorgang'); render(); },
  openCaseReq(d){
    const c = S.cases.find(x => x.id === d.case);
    S.activePerson = c.personId; S.ui.reqText = c.reqText || ''; 
    S.ui.analysis = c.reqText ? analyzeText(c.reqText) : null;
    if (S.ui.analysis){ S.ui.analysis.caseId = c.id; S.ui.analysis.recipient = c.recipient; if (!S.ui.analysis.deadline) S.ui.analysis.deadline = c.deadline; }
    go('anforderung'); render();
  },
  newRequest(){ S.ui.analysis = null; S.ui.reqText = ''; go('anforderung'); render(); },
  saveCaseNotes(d){ const c = S.cases.find(x => x.id === d.case); c.notes = $('#case-notes').value; render(); toast('Gespeichert.'); },
  casePkg(d){
    const c = S.cases.find(x => x.id === d.case);
    S.activePerson = c.personId;
    const tplIdx = c.personId === 'opa' ? 3 : (c.purpose.toLowerCase().indexOf('miet') >= 0 ? 2 : 1);
    FP.newPkg({ tpl: String(tplIdx) });
    go('pakete'); render();
    toast('Paket-Entwurf aus dem Vorgang vorbereitet — prüfe die Auswahl.');
  },

  /* Eigene Felder */
  addCustomField(){
    openModal({ title:'Eigenes Feld hinzufügen', confirmLabel:'Feld anlegen',
      body:'<div class="field"><label for="cf-label">Bezeichnung</label><input type="text" id="cf-label" placeholder="z. B. Kundennummer Stadtwerke"></div>' +
      '<div class="field"><label for="cf-type">Feldtyp</label><select id="cf-type"><option>Text</option><option>Zahl</option><option>Datum</option><option>Ja/Nein</option></select></div>' +
      '<div class="field" style="margin-bottom:10px"><label for="cf-value">Wert (optional)</label><input type="text" id="cf-value"></div>' +
      '<label class="check-line"><input type="checkbox" id="cf-sens"><span>Als sensibel markieren — zusätzliche Bestätigung vor jeder Freigabe.</span></label>',
      onConfirm(){
        const label = $('#cf-label').value.trim();
        if (!label){ toast('Bitte gib einen Feldnamen an.'); return; }
        let grp = P().profile.find(g => g.id === 'eigene');
        if (!grp){ grp = { id:'eigene', name:'Eigene Felder', fields:[] }; P().profile.push(grp); }
        grp.fields.push({ id:'cf' + Date.now(), label: label, value: $('#cf-value').value.trim(), help:'Eigenes Feld (' + $('#cf-type').value + ')', sensitive: $('#cf-sens').checked });
        S.log.unshift({ date: today(), text:'Eigenes Feld „' + label + '“ angelegt.' });
        closeModal(); render(); toast('Feld angelegt.');
      } });
  },

  /* Pakete */
  newPkg(d){
    const i = +d.tpl;
    const t = i >= 0 ? PKG_TEMPLATES[i] : { name:'', docs:[], fields:[] };
    const docIds = personDocs().filter(x => t.docs.includes(x.name)).map(x => x.id);
    const fieldIds = t.fields.filter(id => { const f = findField(id); return f && f.value; });
    S.ui.pkgDraft = { name: t.name ? t.name + ' — ' + firstName(P()) : '', docIds, fieldIds, note:'' };
    render();
  },
  pkgToggleDoc(d){ const dr = S.ui.pkgDraft; dr.name = $('#pkg-name').value; dr.note = $('#pkg-note').value; const i = dr.docIds.indexOf(d.doc); i >= 0 ? dr.docIds.splice(i,1) : dr.docIds.push(d.doc); render(); },
  pkgToggleField(d){ const dr = S.ui.pkgDraft; dr.name = $('#pkg-name').value; dr.note = $('#pkg-note').value; const i = dr.fieldIds.indexOf(d.field); i >= 0 ? dr.fieldIds.splice(i,1) : dr.fieldIds.push(d.field); render(); },
  cancelPkg(){ S.ui.pkgDraft = null; render(); },
  savePkg(){
    const dr = S.ui.pkgDraft;
    const name = $('#pkg-name').value.trim();
    if (!name){ toast('Bitte gib einen Namen für das Paket an.'); return; }
    if (!dr.docIds.length && !dr.fieldIds.length){ toast('Wähle mindestens ein Dokument oder eine Angabe aus.'); return; }
    S.packages.unshift({ id:'pk' + Date.now(), personId:S.activePerson, name, note: $('#pkg-note').value.trim(), created: today(), docIds: dr.docIds, fieldIds: dr.fieldIds });
    S.ui.pkgDraft = null;
    S.log.unshift({ date: today(), text:'Dokumentenpaket „' + name + '“ erstellt.' });
    render(); toast('Paket erstellt.');
  },
  pkgDelete(d){
    const pk = S.packages.find(x => x.id === d.pkg);
    openModal({ title:'Paket löschen?', body:'„' + esc(pk.name) + '“ wird gelöscht. Die enthaltenen Dokumente und Angaben bleiben in Safe und Profil erhalten.', confirmLabel:'Löschen', danger:true,
      onConfirm(){ S.packages = S.packages.filter(x => x.id !== d.pkg); closeModal(); render(); toast('Paket gelöscht.'); } });
  },
  pkgPreview(d){
    const pk = S.packages.find(x => x.id === d.pkg);
    const docs = pk.docIds.map(id => S.documents.find(x => x.id === id)).filter(Boolean);
    const sens = pk.fieldIds.filter(id => { const f = findField(id); return f && f.sensitive; });
    openModal({ title:'Paketvorschau — ' + esc(pk.name), cancelLabel:'Schließen',
      body:'<div class="sum-block" style="margin-bottom:12px"><div class="sum-head">Dokumente (' + docs.length + ')</div>' + (docs.map(x => '<div class="sum-item"><span class="l">' + esc(x.name) + '</span><span class="r">' + esc(x.cat) + '</span></div>').join('') || '<div class="sum-item"><span class="l">Keine</span></div>') + '</div>' +
      '<div class="sum-block" style="margin-bottom:12px"><div class="sum-head">Angaben (' + pk.fieldIds.length + ')</div>' + pk.fieldIds.map(id => { const f = findField(id); return f ? '<div class="sum-item"><span class="l">' + esc(f.label) + '</span><span class="r mono">' + esc(f.value) + '</span></div>' : ''; }).join('') + '</div>' +
      (sens.length ? '<div class="info-banner">' + I.info(18) + '<span>Dieses Paket enthält sensible Daten. Vor jeder Freigabe wird eine zusätzliche Bestätigung verlangt.</span></div>' : '') });
  },
  pkgDownload(d){
    const pk = S.packages.find(x => x.id === d.pkg);

function detectFormTpl(fname){
  const n = fname.toLowerCase();
  if (/miet|wohnung|selbstauskunft/.test(n)) return 'mieterauskunft';
  if (/pflege|höherstufung|kasse/.test(n)) return 'pflegeantrag';
  return 'personalbogen';
}
function buildForm(tplId){
  const t = FORM_TEMPLATES.find(x => x.id === tplId);
  if (t.person && t.person !== S.activePerson) S.activePerson = t.person;
  const saved = S.formMappings.find(m => m.tplId === tplId);
  const rows = t.fields.map(f => {
    const pf = findField(f[1]);
    const value = pf && pf.value ? pf.value : '';
    return { label:f[0], map:f[1], value, sens:!!f[2],
      status: value ? (pf.needsReview ? 'check' : 'auto') : 'missing',
      source: value ? 'Aus deinem Profil übernommen' : 'Nicht im Profil hinterlegt — bitte ergänzen' };
  });
  S.ui.form = { tplId, name:t.name, org:t.org, rows, step:'map', reused:!!saved };
}

function buildExtractRows(ex){
  const rows = [];
  if (ex.fields) for (const [fid, val] of ex.fields(P())){
    const f = findField(fid);
    if (f) rows.push({ mode:'profil', fieldId:fid, label:f.label, value:val, current:f.value, sens:!!f.sensitive });
    else rows.push({ mode:'custom', label: fid, value:val, sens:false });
  }
  if (ex.customs) for (const [label, val, sens] of ex.customs){
    const existing = (P().profile.find(g => g.id === 'eigene') || { fields:[] }).fields.find(f => f.label === label);
    rows.push({ mode:'custom', label, value:val, current: existing ? existing.value : '', sens });
  }
  return rows;
}

document.addEventListener('click', e => {
  const t = e.target.closest('[data-act]');
  if (!t) return;
  const act = t.dataset.act;
  /* Backdrop schließt nur bei Klick auf den Backdrop selbst — nicht bei Klicks im Modal */
  if (act === 'closeModalBg' && e.target !== t) return;
  if (t.tagName === 'INPUT' && t.type === 'checkbox'){ if (FP[act]) FP[act](t.dataset, t); return; }
  e.preventDefault();
  if (FP[act]) FP[act](t.dataset, t);
});
document.addEventListener('change', e => {
  const t = e.target.closest('[data-act-change]');
  if (t && FP[t.dataset.actChange]) FP[t.dataset.actChange](t);
  if ((e.target.id === 'extract-file' || e.target.id === 'extract-cam') && e.target.files.length){
    const fname = e.target.files[0].name || 'Foto';
    e.target.value = '';
    runExtract(fname);
    return;
  }
  if (e.target.id === 'form-file' && e.target.files.length){
    const fname = e.target.files[0].name;
    S.ui.formUpload = { name: fname, progress: 0 };
    simulateUpload(() => { S.ui.formUpload.progress = S.ui.formUpload.uploadProgress || 0; return S.ui.formUpload; }, () => {
      S.ui.formUpload = null;
      buildForm(detectFormTpl(fname));
      render(); toast('Formularfelder erkannt. Bitte prüfe die Zuordnung.');
    });
    e.target.value = '';
    return;
  }
  if (e.target.id === 'file-input' && e.target.files.length){
    const fname = e.target.files[0].name;
    S.ui.upload = { name: fname, progress: 0 };
    simulateUpload(() => { S.ui.upload.progress = S.ui.upload.uploadProgress || 0; return S.ui.upload; }, () => {
      S.ui.upload = null;
      const guess = fname.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ');
      const det = detectDoc(fname);
      openModal({ title:'Dokument benennen', confirmLabel:'Dokument speichern',
        body:'<p style="margin-bottom:14px;font-size:13px;color:var(--slate)">Demo-Upload: Es wird keine echte Datei übertragen. Benenne und kategorisiere dein Dokument.</p>' +
        (det ? '<div class="info-banner" style="margin-bottom:14px">' + I.info(18) + '<span>FormPilot-Vorschlag: Kategorie <b>' + det.cat + '</b>' + (det.valid ? ', Ablaufdatum <b>' + det.valid + '</b>' : '') + ' erkannt — bitte prüfen und bei Bedarf ändern.</span></div>' : '') +
        '<div class="field"><label for="up-name">Name</label><input type="text" id="up-name" value="' + esc(guess) + '"></div>' +
        '<div class="field"><label for="up-cat">Kategorie</label><select id="up-cat">' + DOC_CATS.slice(1).map(c => '<option' + (det && det.cat === c ? ' selected' : '') + '>' + c + '</option>').join('') + '</select></div>' +
        '<div class="field" style="margin-bottom:0"><label for="up-valid">Gültig bis (optional)</label><input type="text" id="up-valid" value="' + (det ? det.valid : '') + '" placeholder="TT.MM.JJJJ"><div class="help">Ablaufende Dokumente werden rechtzeitig und ruhig erinnert.</div></div>' +
        '<div class="sec-note" style="margin-top:14px">' + I.shieldCheck(16) + '<span>Testversion: Bitte keine echten sensiblen Daten eingeben. Es wird keine echte Datei übertragen.</span></div>',
        onConfirm(){ FP.saveUpload(); } });
    });
    e.target.value = '';
  }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape'){ closeModal(); return; }
  if (e.key === 'Enter' && (e.target.id === 'side-search' || e.target.id === 'page-search')){ S.ui.search = e.target.value; go('suche'); render(); return; }
  if ((e.key === 'Enter' || e.key === ' ') && e.target.getAttribute && e.target.getAttribute('role') === 'button' && e.target.hasAttribute('data-act')){
    e.preventDefault(); e.target.click();
  }
});
/* Drag & Drop */
document.addEventListener('dragover', e => { const z = e.target.closest && e.target.closest('#dropzone'); if (z){ e.preventDefault(); z.classList.add('drag'); } });
document.addEventListener('dragleave', e => { const z = e.target.closest && e.target.closest('#dropzone'); if (z) z.classList.remove('drag'); });
document.addEventListener('drop', e => {
  const z = e.target.closest && e.target.closest('#dropzone');
  if (!z) return; e.preventDefault(); z.classList.remove('drag');
  const fname = (e.dataTransfer.files[0] && e.dataTransfer.files[0].name) || 'Neues Dokument.pdf';
  const fi = $('#file-input');
  const dt = new DataTransfer();
  if (e.dataTransfer.files[0]) dt.items.add(e.dataTransfer.files[0]);
  if (dt.files.length){ fi.files = dt.files; fi.dispatchEvent(new Event('change', { bubbles:true })); }
});
/* Textarea live speichern */
document.addEventListener('input', e => { if (e.target.id === 'req-text') S.ui.reqText = e.target.value; });

render();
</script>
</body>
</html>
